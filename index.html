    const { useState, useMemo, useCallback, useEffect, useRef } = React;

// ── AUTH CONTEXT ───────────────────────────────────────────────────────────────
// AuthProvider sits at the root. Any component can call useAuth() to get the
// current user, their Firestore user doc (status/role/schoolId), and derived
// convenience fields.  The Firestore listener means the screen updates in real
// time when an admin approves a pending request — no refresh needed.
//
// Multi-tenant note (future):  user docs will gain a `schools: []` array so a
// district technology coordinator can be active in multiple tenants and choose
// which one to work in via a "Switch School" menu.
const AuthContext = React.createContext(null);

function AuthProvider({ children }) {
  const [state, setState] = useState({ loading: true, user: null, userDoc: null });

  useEffect(() => {
    let unsubUser = null;
    const unsubAuth = auth.onAuthStateChanged(firebaseUser => {
      if (unsubUser) { unsubUser(); unsubUser = null; }
      if (!firebaseUser) {
        setState({ loading: false, user: null, userDoc: null });
        return;
      }
      // Real-time listener — fires immediately with cached data, then on changes
      unsubUser = db.collection("users").doc(firebaseUser.uid).onSnapshot(
        snap => setState({ loading: false, user: firebaseUser, userDoc: snap.exists ? snap.data() : null }),
        ()   => setState({ loading: false, user: firebaseUser, userDoc: null })
      );
    });
    return () => { unsubAuth(); if (unsubUser) unsubUser(); };
  }, []);

  return React.createElement(AuthContext.Provider, { value: state }, children);
}

// Drop-in replacement for the old stub — all callers (App, etc.) unchanged.
// schoolId / role / effectiveStatus are now DERIVED from the schools map so
// that admin operations at school B can never corrupt a user's session at
// school A.  A background effect keeps the top-level Firestore fields in sync.
function useAuth() {
  const ctx = React.useContext(AuthContext) ||
              { loading: false, user: null, userDoc: null };

  const { schoolId, role, effectiveStatus } = useMemo(() => {
    const ud = ctx.userDoc;
    if (!ud) return { schoolId: null, role: null, effectiveStatus: null };

    // Build a mutable copy of the schools map, then back-fill any active
    // session that isn't in it yet.  This covers two legacy scenarios:
    //
    //   (a) User has NO schools field at all — added before the map feature.
    //   (b) User HAS a schools map, but their current schoolId isn't in it —
    //       they were added to schoolId before the map feature, then later
    //       added to a second school with new code.  The map has the second
    //       school but not the first.
    //
    // Without this, case (b) causes useAuth() to silently switch the user to
    // the second school and the background healer then overwrites schoolId in
    // Firestore — "crossing the streams".
    const schoolsMap = { ...(ud.schools || {}) };
    if (ud.schoolId && ud.status === "active" && !schoolsMap[ud.schoolId]) {
      schoolsMap[ud.schoolId] = { status: "active", role: ud.role || "staff" };
    }

    const entries = Object.entries(schoolsMap);

    // Derive overall status from the map.
    let effectiveStatus;
    if      (entries.some(([, s]) => s.status === "active"))    effectiveStatus = "active";
    else if (entries.some(([, s]) => s.status === "pending"))   effectiveStatus = "pending";
    else if (entries.length > 0)                                effectiveStatus = "rejected";
    else                                                        effectiveStatus = ud.status || null;

    if (effectiveStatus !== "active") {
      return { schoolId: null, role: null, effectiveStatus };
    }

    // Prefer the stored schoolId if it's still active in the map;
    // otherwise fall back to the first active entry.
    const storedIsActive = ud.schoolId && schoolsMap[ud.schoolId]?.status === "active";
    let activeSchoolId, activeRole;
    if (storedIsActive) {
      activeSchoolId = ud.schoolId;
      activeRole     = schoolsMap[ud.schoolId].role || ud.role;
    } else {
      const entry    = entries.find(([, s]) => s.status === "active");
      activeSchoolId = entry ? entry[0] : null;
      activeRole     = entry ? entry[1].role : null;
    }

    return { schoolId: activeSchoolId, role: activeRole, effectiveStatus: "active" };
  }, [ctx.userDoc]);

  // Background heal: silently fix stale Firestore data whenever the derived
  // session or the schools map entry differs from what's stored.  Two things
  // may need fixing independently:
  //
  //   1. Top-level schoolId/role — may be stale after an admin action.
  //   2. schools.{schoolId} map entry — may be absent for legacy users who
  //      were added before the map feature (back-compat synthesis filled it
  //      in memory; now we persist it so future loads don't need synthesis).
  useEffect(() => {
    const ud = ctx.userDoc;
    const u  = ctx.user;
    if (!ud || !u || effectiveStatus !== "active") return;

    const topLevelOk = ud.schoolId === schoolId && ud.role === role;
    const mapEntryOk = !!((ud.schools || {})[schoolId]);

    if (topLevelOk && mapEntryOk) return; // Nothing to fix

    const update = { updatedAt: firebase.firestore.FieldValue.serverTimestamp() };
    if (!topLevelOk) {
      update.schoolId = schoolId;
      update.role     = role;
    }
    // Persist a missing schools map entry so the back-compat synthesis path
    // is no longer needed after this first heal.
    if (!mapEntryOk) {
      update[`schools.${schoolId}`] = { status: "active", role };
    }
    db.collection("users").doc(u.uid).update(update).catch(() => {});
  }, [ctx.userDoc]);

  return { ...ctx, schoolId, role, userId: ctx.user?.uid || null, effectiveStatus };
}

// ── FIRESTORE HELPERS ──────────────────────────────────────────────────────────
function fsCol(schoolId, col) {
  return db.collection(`schools/${schoolId}/${col}`);
}
async function fsGetAll(schoolId, col) {
  const s = await fsCol(schoolId, col).get();
  return s.docs.map(d => ({ _id: d.id, ...d.data() }));
}
async function fsGetOrdered(schoolId, col, field, dir = "desc") {
  const s = await fsCol(schoolId, col).orderBy(field, dir).get();
  return s.docs.map(d => ({ _id: d.id, ...d.data() }));
}
async function fsSave(schoolId, col, id, data) {
  await fsCol(schoolId, col).doc(id).set(data, { merge: true });
}
async function fsUpdate(schoolId, col, id, data) {
  await fsCol(schoolId, col).doc(id).update(data);
}
async function fsGetDoc(schoolId, col, id) {
  const snap = await fsCol(schoolId, col).doc(id).get();
  return snap.exists ? { _id: snap.id, ...snap.data() } : null;
}
async function fsDeleteDoc(schoolId, col, id) {
  await fsCol(schoolId, col).doc(id).delete();
}

// ── CONSTANTS ──────────────────────────────────────────────────────────────────
const ALL_PERIODS        = ["1A","1B","2A","2B","3A","3B","4A","4B","5A","5B","6A","6B"];
const CORE_CATEGORIES_7  = ["ELA 7", "Math 7", "Science 7"];
const CORE_CATEGORIES_8  = ["ELA 8", "Math 8", "Science 8"];
const CATEGORY_OVERRIDES = { "stuco": "Stuco", "culture": "German Culture" };

// ── CLASS TYPE SYSTEM ──────────────────────────────────────────────────────────
function getClassType(cls, germanDLI) {
  const n   = cls.name.toLowerCase();
  const cat = cls.category.toLowerCase();
  if (CORE_CATEGORIES_7.includes(cls.category)) return "core";
  if (CORE_CATEGORIES_8.includes(cls.category)) return "core";
  if (germanDLI && n.match(/^german\s*[123]/))  return "core";
  if (n.includes("cca") && !n.includes("digital")) return "req-year";
  if (n.includes("us history"))  return "req-year";
  if (n.includes("utah"))        return "req-sem";
  if (/health\s*[123]?$/.test(n)) return "req-sem";
  if (n.includes("digital lit")) return "req-sem";
  if (cat.includes("german culture")) return "req-sem";
  if (n.includes("stuco") || n.includes("math lab") || n.includes("reading"))      return "elective-year";
  if (n.includes("aca ach") || n.includes("academic ach"))                          return "elective-year";
  if (cat.includes("music") || n.includes("music") || n.includes("choir") ||
      n.includes("band") || n.includes("orchestra") || n.includes("study skills"))  return "elective-year";
  if (cat.includes("aca ach") || cat.includes("stuco") || cat.includes("music"))    return "elective-year";
  return "elective";
}
function locksAB(t)    { return t === "core"; }
function isFullYear(t) { return t === "core" || t === "req-year" || t === "elective-year"; }
function isGermanClass(cls) {
  const n = cls.name.toLowerCase(), cat = cls.category.toLowerCase();
  return cat.includes("german") || !!n.match(/^german\s*[123]/);
}
function getNameFamily(name)  { return name.toLowerCase().replace(/\s*[123456]$/, "").trim(); }
function getPeriodNumber(p)   { return p[0]; }
function getPairedPeriod(p)   { return p.endsWith("A") ? p.replace("A","B") : p.replace("B","A"); }

// ── EXCEL PARSER (Schedule Validation format) ──────────────────────────────────
function parseScheduleFromWorkbook(wb) {
  const ws  = wb.Sheets[wb.SheetNames[0]];
  const raw = XLSX.utils.sheet_to_json(ws, { header: 1, defval: null });
  const headerRow = raw[0] || [];
  const periodCols = [];
  for (let i = 1; i < headerRow.length; i += 3) {
    if (headerRow[i] != null) periodCols.push({ period: String(headerRow[i]), colIdx: i });
  }
  const classes = [];
  let currentCategory = null;
  for (let rowIdx = 1; rowIdx < raw.length; rowIdx++) {
    const row = raw[rowIdx];
    if (!row || row.every(c => c === null)) continue;
    if (row[0] != null) currentCategory = String(row[0]).replace(/\n/g," ").trim();
    if (!currentCategory) continue;
    for (const { period, colIdx } of periodCols) {
      const className = row[colIdx];
      const gr7 = parseFloat(row[colIdx+1]) || 0;
      const gr8 = parseFloat(row[colIdx+2]) || 0;
      const nameStr = String(className ?? "").trim();
      if (!className || !nameStr || nameStr.toUpperCase()==="PREP" || nameStr==="?" || !isNaN(Number(nameStr))) continue;
      let effectiveCategory = currentCategory;
      for (const [match, override] of Object.entries(CATEGORY_OVERRIDES)) {
        if (nameStr.toLowerCase().includes(match)) { effectiveCategory = override; break; }
      }
      classes.push({ id: classes.length, category: effectiveCategory, name: nameStr, period, gr7, gr8 });
    }
  }
  return classes;
}

  }

}

// ── REQUIREMENTS ───────────────────────────────────────────────────────────────
function getRequirements(grade, germanDLI) {
  const reqs = [];
  const coreCats = grade === 7 ? CORE_CATEGORIES_7 : CORE_CATEGORIES_8;
  for (const cat of coreCats) reqs.push({ id:cat, label:cat, type:"core", category:cat });
  if (germanDLI) reqs.push({ id:"German", label:"German 1/2/3 (full year, every day)", type:"core",
    matchFn: n => !!n.toLowerCase().match(/^german\s*[123]/) });
  if (grade === 7) {
    reqs.push({ id:"CCA", label:"CCA (full year, one day)", type:"req-year",
      matchFn: n => n.toLowerCase().includes("cca") && !n.toLowerCase().includes("digital") });
    reqs.push({ id:"Utah History", label:"Utah History (1 semester)", type:"req-sem",
      matchFn: n => n.toLowerCase().includes("utah") });
  }
  if (grade === 8) {
    reqs.push({ id:"US History", label:"US History (full year, one day)", type:"req-year",
      matchFn: n => n.toLowerCase().includes("us history") });
    reqs.push({ id:"Health", label:"Health (1 semester)", type:"req-sem",
      matchFn: n => /health\s*[123]?$/i.test(n.trim()) });
    reqs.push({ id:"Digital Lit", label:"Digital Literacy (1 semester)", type:"req-sem",
      matchFn: n => n.toLowerCase().includes("digital lit") });
  }
  if (germanDLI) reqs.push({ id:"German Culture", label:"German Culture (1 semester)", type:"req-sem",
    matchFn: n => n.toLowerCase().includes("culture") });
  return reqs;
}

function evalRequirements(reqs, s1Ids, s2Ids, schedule, germanDLI) {
  const s1Classes = [...s1Ids].map(id => schedule[id]).filter(Boolean);
  const s2Classes = [...s2Ids].map(id => schedule[id]).filter(Boolean);
  const allClasses = [...s1Classes, ...s2Classes];
  return reqs.map(req => {
    if (req.type === "core") {
      const matches = req.category
        ? allClasses.filter(c => c.category === req.category)
        : allClasses.filter(c => req.matchFn(c.name));
      const aNums = matches.filter(c => c.period.endsWith("A")).map(c => getPeriodNumber(c.period));
      const bNums = matches.filter(c => c.period.endsWith("B")).map(c => getPeriodNumber(c.period));
      const paired = aNums.filter(n => bNums.includes(n));
      if (paired.length > 0) return { ...req, status:"met",     note:`Period ${paired[0]}A & ${paired[0]}B` };
      if (matches.length > 0) return { ...req, status:"partial", note:`Have ${matches.map(c=>c.period).join(", ")} — need A+B pair` };
      return { ...req, status:"missing", note:null };
    }
    if (req.type === "req-year") {
      const match = allClasses.find(c => req.matchFn(c.name));
      if (!match) return { ...req, status:"missing", note:null };
      const s1m = s1Classes.find(c => req.matchFn(c.name));
      const s2m = s2Classes.find(c => req.matchFn(c.name));
      const where = [s1m && `S1·P${s1m.period}`, s2m && `S2·P${s2m.period}`].filter(Boolean).join(", ");
      return { ...req, status:"met", note:where };
    }
    if (req.type === "req-sem") {
      const match = allClasses.find(c => req.matchFn(c.name));
      if (!match) return { ...req, status:"missing", note:null };
      const s1m = s1Classes.find(c => req.matchFn(c.name));
      const s2m = s2Classes.find(c => req.matchFn(c.name));
      const where = [s1m && `S1·P${s1m.period}`, s2m && `S2·P${s2m.period}`].filter(Boolean).join(", ");
      return { ...req, status:"met", note:where };
    }
    return { ...req, status:"unknown" };
  });
}

// SCHEDULE VERSIONS PANEL
// ══════════════════════════════════════════════════════════════════════════════
function ScheduleVersionsPanel({ schedule, schoolId, onLoad, onClose }) {
  const [versions,    setVersions]    = useState([]);
  const [loading,     setLoading]     = useState(true);
  const [saving,      setSaving]      = useState(false);
  const [newName,     setNewName]     = useState("");
  const [newDesc,     setNewDesc]     = useState("");
  const [compareA,    setCompareA]    = useState(null);
  const [compareB,    setCompareB]    = useState(null);
  const [showCompare, setShowCompare] = useState(false);

  useEffect(() => { loadVersions(); }, [schoolId]);

  async function loadVersions() {
    setLoading(true);
    try {
      const snap = await fsCol(schoolId, "schedules").orderBy("createdAt", "desc").get();
      setVersions(snap.docs.map(d => ({ _id: d.id, ...d.data() })));
    } catch(e) { console.error("loadVersions:", e); }
    setLoading(false);
  }

  async function saveVersion() {
    if (!schedule || !newName.trim()) return;
    setSaving(true);
    try {
      await fsCol(schoolId, "schedules").add({
        name:        newName.trim(),
        description: newDesc.trim(),
        version:     versions.length + 1,
        status:      "draft",
        createdAt:   firebase.firestore.FieldValue.serverTimestamp(),
        createdBy:   "stub-user-001",
        classes:     schedule,
        classCount:  schedule.length,
      });
      setNewName(""); setNewDesc("");
      await loadVersions();
    } catch(e) { alert("Save failed: " + e.message); }
    setSaving(false);
  }

  async function promoteVersion(v) {
    const batch = db.batch();
    versions.forEach(ver => {
      const ref = fsCol(schoolId, "schedules").doc(ver._id);
      batch.update(ref, {
        status: ver._id === v._id ? "active"
               : ver.status === "active" ? "draft"
               : ver.status
      });
    });
    await batch.commit();
    await loadVersions();
  }

  async function archiveVersion(v) {
    await fsUpdate(schoolId, "schedules", v._id, { status: "archived" });
    await loadVersions();
  }

  function buildDiff(a, b) {
    const aMap = {}, bMap = {};
    (a.classes||[]).forEach(c => { aMap[`${c.period}|${c.name}`] = c; });
    (b.classes||[]).forEach(c => { bMap[`${c.period}|${c.name}`] = c; });
    const allKeys = new Set([...Object.keys(aMap), ...Object.keys(bMap)]);
    const added = [], removed = [];
    allKeys.forEach(k => {
      if ( aMap[k] && !bMap[k]) removed.push(aMap[k]);
      if (!aMap[k] &&  bMap[k]) added.push(bMap[k]);
    });
    return { added, removed };
  }

  const statusStyle = s => ({
    active:   { bg:"#d1fae5", color:"#065f46", label:"Active"   },
    draft:    { bg:"#f0f4f8", color:"#334155", label:"Draft"    },
    archived: { bg:"#ede9fe", color:"#6b21a8", label:"Archived" },
  }[s] || { bg:"#f0f4f8", color:"#334155", label: s });

  return (
    <div style={{ position:"fixed", top:0, right:0, bottom:0, width:380,
      background:"white", boxShadow:"-4px 0 24px rgba(0,0,0,0.18)",
      zIndex:200, display:"flex", flexDirection:"column" }}>

      {/* Header */}
      <div className="flb" style={{ padding:"13px 16px", background:"#1e3a5f", flexShrink:0 }}>
        <div style={{ color:"white", fontWeight:"bold", fontSize:14 }}>📁 Schedule History</div>
        <button className="btn-ghost" onClick={onClose} style={{ color:"rgba(255,255,255,0.7)" }}>×</button>
      </div>

      {/* Save new version */}
      {schedule && (
        <div style={{ padding:14, borderBottom:"1px solid #e0e8f0", background:"#f8fafc", flexShrink:0 }}>
          <div className="section-title" style={{ marginBottom:8 }}>Save Current Schedule</div>
          <input className="field-input" placeholder="Version name (e.g. Spring 2026 – Draft 2)"
            value={newName} onChange={e => setNewName(e.target.value)} style={{ marginBottom:6 }} />
          <input className="field-input" placeholder="Notes (optional)"
            value={newDesc} onChange={e => setNewDesc(e.target.value)} style={{ marginBottom:8 }} />
          <button className="btn btn-primary" style={{ width:"100%" }}
            onClick={saveVersion} disabled={saving || !newName.trim()}>
            {saving ? "Saving…" : "💾 Save Version"}
          </button>
        </div>
      )}

      {/* Version list */}
      <div style={{ flex:1, overflowY:"auto", padding:14 }}>
        {loading
          ? <div style={{ textAlign:"center", color:"#8a9aaa", fontSize:12, paddingTop:24 }}>Loading…</div>
          : versions.length === 0
          ? <div style={{ textAlign:"center", color:"#8a9aaa", fontSize:12, paddingTop:24 }}>No saved versions yet.</div>
          : versions.map(v => {
              const st   = statusStyle(v.status);
              const date = v.createdAt?.toDate?.()?.toLocaleDateString("en-US",
                { month:"short", day:"numeric", year:"numeric" }) || "—";
              return (
                <div key={v._id} className="card" style={{ marginBottom:9, cursor:"default",
                  borderLeft: `4px solid ${v.status==="active" ? "#16a34a" : v.status==="archived" ? "#a78bfa" : "#c0d0e0"}`,
                  background: v.status==="active" ? "#f0fdf4" : "white" }}>
                  <div className="flb" style={{ alignItems:"flex-start", gap:8 }}>
                    <div style={{ flex:1 }}>
                      <div style={{ fontSize:12, fontWeight:"bold", color:"#1e2a3a" }}>v{v.version} · {v.name}</div>
                      <div style={{ fontSize:10, color:"#8a9aaa", marginTop:2 }}>{date} · {v.classCount||0} classes</div>
                      {v.description && <div style={{ fontSize:10, color:"#6b7280", marginTop:2, fontStyle:"italic" }}>{v.description}</div>}
                    </div>
                    <span className="badge" style={{ background:st.bg, color:st.color }}>{st.label}</span>
                  </div>
                  <div className="fl" style={{ gap:5, marginTop:9, flexWrap:"wrap" }}>
                    <button className="btn btn-secondary" style={{ fontSize:10, padding:"3px 9px" }}
                      onClick={() => { onLoad(v.classes); onClose(); }}>↩ Load</button>
                    {v.status !== "active" && (
                      <button className="btn btn-secondary" style={{ fontSize:10, padding:"3px 9px", color:"#065f46", borderColor:"#bbf7d0" }}
                        onClick={() => promoteVersion(v)}>✓ Set Active</button>
                    )}
                    {v.status !== "archived" && (
                      <button className="btn btn-secondary" style={{ fontSize:10, padding:"3px 9px", color:"#6b21a8", borderColor:"#ddd6fe" }}
                        onClick={() => archiveVersion(v)}>Archive</button>
                    )}
                    <button className="btn btn-secondary" style={{ fontSize:10, padding:"3px 9px",
                      background: compareA?._id === v._id ? "#f0f7ff" : undefined,
                      borderColor: compareA?._id === v._id ? "#4a90d9" : undefined }}
                      onClick={() => {
                        if (!compareA) { setCompareA(v); }
                        else if (compareA._id !== v._id) { setCompareB(v); setShowCompare(true); }
                        else { setCompareA(null); }
                      }}>
                      {compareA?._id === v._id ? "✓ Base" : compareA ? "→ Compare" : "Compare"}
                    </button>
                  </div>
                </div>
              );
          })
        }
        {compareA && !showCompare && (
          <div style={{ fontSize:10, color:"#4a90d9", textAlign:"center", padding:"6px 0" }}>
            v{compareA.version} selected as base — click "→ Compare" on another version
          </div>
        )}
      </div>

      {/* Compare overlay */}
      {showCompare && compareA && compareB && (() => {
        const diff = buildDiff(compareA, compareB);
        return (
          <div style={{ position:"absolute", inset:0, background:"white", zIndex:10, display:"flex", flexDirection:"column" }}>
            <div className="flb" style={{ padding:"12px 16px", borderBottom:"1px solid #e0e8f0", flexShrink:0 }}>
              <div style={{ fontSize:13, fontWeight:"bold", color:"#1e3a5f" }}>
                v{compareA.version} → v{compareB.version}
              </div>
              <button className="btn-ghost" onClick={() => { setShowCompare(false); setCompareA(null); setCompareB(null); }}>×</button>
            </div>
            <div style={{ flex:1, overflowY:"auto", padding:14 }}>
              {diff.added.length > 0 && <>
                <div style={{ fontSize:10, fontWeight:"bold", color:"#15803d", textTransform:"uppercase", marginBottom:6 }}>
                  + Added in v{compareB.version} ({diff.added.length})
                </div>
                {diff.added.map((c,i) => (
                  <div key={i} style={{ fontSize:11, padding:"4px 9px", background:"#f0fdf4", borderRadius:3, marginBottom:3, borderLeft:"3px solid #16a34a" }}>
                    {c.period} · {c.name}
                  </div>
                ))}
              </>}
              {diff.removed.length > 0 && <>
                <div style={{ fontSize:10, fontWeight:"bold", color:"#b91c1c", textTransform:"uppercase", marginBottom:6, marginTop:14 }}>
                  − Removed from v{compareA.version} ({diff.removed.length})
                </div>
                {diff.removed.map((c,i) => (
                  <div key={i} style={{ fontSize:11, padding:"4px 9px", background:"#fff5f5", borderRadius:3, marginBottom:3, borderLeft:"3px solid #dc2626" }}>
                    {c.period} · {c.name}
                  </div>
                ))}
              </>}
              {diff.added.length === 0 && diff.removed.length === 0 && (
                <div style={{ textAlign:"center", color:"#8a9aaa", fontSize:12, paddingTop:24 }}>
                  These versions are identical.
                </div>
              )}
            </div>
          </div>
        );
      })()}
    </div>
  );
}

// SCHOOL CONFIGURATION
// ══════════════════════════════════════════════════════════════════════════════
const SCHEDULE_TYPES = ["traditional","block","core-block","hybrid"];
const EMPTY_SCHOOL_CONFIG = {
  name:"", address:"",
  calendarYearStart: new Date().getFullYear(),
  calendarYearEnd:   new Date().getFullYear() + 1,
  scheduleType:"core-block",
  immersion:false, immersionLanguages:[],
  grades:[7,8], blocks:{ A:6, B:6 }, semesters:["Fall","Spring"],
  gradeEnrollment:{}, gradeImmersionEnrollment:{},
};

function SchoolConfig({ schoolId, onConfigSaved }) {
  const [config,      setConfig]      = useState(EMPTY_SCHOOL_CONFIG);
  const [saving,      setSaving]      = useState(false);
  const [saved,       setSaved]       = useState(false);
  const [newBlockKey, setNewBlockKey] = useState("");

  useEffect(() => {
    fsGetDoc(schoolId, "config", "school").then(doc => {
      if (doc) { const { _id, ...rest } = doc; setConfig({ ...EMPTY_SCHOOL_CONFIG, ...rest }); }
    });
  }, [schoolId]);

  function fld(k, v) { setConfig(c => ({ ...c, [k]: v })); setSaved(false); }
  function toggleArr(key, val) {
    setConfig(c => {
      const arr = c[key] || [];
      return { ...c, [key]: arr.includes(val) ? arr.filter(x => x !== val) : [...arr, val] };
    });
    setSaved(false);
  }

  async function save() {
    if (!config.name.trim()) { alert("School name is required."); return; }
    setSaving(true);
    try {
      const { _id, ...data } = config;
      await fsSave(schoolId, "config", "school", data);
      // Keep the top-level schools/{schoolId} index doc in sync so
      // SchoolPickerScreen can list this school for new users.
      await db.collection("schools").doc(schoolId).set(
        { name: config.name.trim(), active: true },
        { merge: true }
      );
      onConfigSaved && onConfigSaved(config);
      setSaved(true);
    } catch(e) { alert("Save failed: " + e.message); }
    setSaving(false);
  }

  function addBlock() {
    const key = newBlockKey.trim().toUpperCase().slice(0,3);
    if (!key || config.blocks[key] !== undefined) return;
    fld("blocks", { ...config.blocks, [key]: 6 });
    setNewBlockKey("");
  }

  const blockKeys = Object.keys(config.blocks || {}).sort();

  return (
    <div style={{ overflowY:"auto", height:"calc(100vh - 48px)" }}>
      <div style={{ maxWidth:700, margin:"0 auto", padding:28 }}>
        <div style={{ fontSize:18, fontWeight:"bold", color:"#1e3a5f", marginBottom:4 }}>School Configuration</div>
        <div style={{ fontSize:12, color:"#8a9aaa", marginBottom:24 }}>
          Block types, grades, and semesters defined here drive field options throughout the app — especially teacher capacity settings.
        </div>

        {/* School info */}
        <div style={{ background:"white", borderRadius:8, border:"1px solid #e0e8f0", padding:20, marginBottom:16 }}>
          <div className="section-title" style={{ marginBottom:14 }}>School Information</div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
            <div style={{ gridColumn:"1 / -1" }}>
              <label className="field-label">School Name *</label>
              <input className="field-input" value={config.name}
                onChange={e => fld("name", e.target.value)} placeholder="Summit Academy Independence" />
            </div>
            <div style={{ gridColumn:"1 / -1" }}>
              <label className="field-label">Address</label>
              <input className="field-input" value={config.address||""}
                onChange={e => fld("address", e.target.value)} placeholder="123 Main St, City, ST 84065" />
            </div>
            <div>
              <label className="field-label">Calendar Year Start</label>
              <input className="field-input" type="number" min={2020} max={2040}
                value={config.calendarYearStart}
                onChange={e => fld("calendarYearStart", parseInt(e.target.value)||2026)} />
            </div>
            <div>
              <label className="field-label">Calendar Year End</label>
              <input className="field-input" type="number" min={2020} max={2041}
                value={config.calendarYearEnd}
                onChange={e => fld("calendarYearEnd", parseInt(e.target.value)||2027)} />
            </div>
            <div>
              <label className="field-label">Schedule Type</label>
              <select className="field-input" value={config.scheduleType}
                onChange={e => fld("scheduleType", e.target.value)}>
                {SCHEDULE_TYPES.map(t => <option key={t} value={t}>{t}</option>)}
              </select>
            </div>
          </div>
        </div>

        {/* Academic structure */}
        <div style={{ background:"white", borderRadius:8, border:"1px solid #e0e8f0", padding:20, marginBottom:16 }}>
          <div className="section-title" style={{ marginBottom:14 }}>Academic Structure</div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:20 }}>
            <div>
              <label className="field-label" style={{ marginBottom:8 }}>Grades Served</label>
              <div className="fl" style={{ gap:12, flexWrap:"wrap" }}>
                {[5,6,7,8,9,10,11,12].map(g => (
                  <label key={g} className="toggle">
                    <input type="checkbox" checked={(config.grades||[]).includes(g)}
                      onChange={() => toggleArr("grades", g)} />
                    Grade {g}
                  </label>
                ))}
              </div>
            </div>
            <div>
              <label className="field-label" style={{ marginBottom:8 }}>Semesters</label>
              <div className="fl" style={{ gap:12, flexWrap:"wrap" }}>
                {["Fall","Spring","Summer"].map(s => (
                  <label key={s} className="toggle">
                    <input type="checkbox" checked={(config.semesters||[]).includes(s)}
                      onChange={() => toggleArr("semesters", s)} />
                    {s}
                  </label>
                ))}
              </div>
            </div>
          </div>
          {(config.grades||[]).length > 0 && (
            <div style={{ gridColumn:"1 / -1", marginTop:8 }}>
              <label className="field-label" style={{ marginBottom:4 }}>Expected Enrollment per Grade</label>
              <div style={{ fontSize:11, color:"#8a9aaa", marginBottom:8 }}>
                Total students expected per grade — used for seat capacity checking.
              </div>
              <div className="fl" style={{ gap:10, flexWrap:"wrap" }}>
                {[...(config.grades||[])].sort((a,b) => a-b).map(g => (
                  <div key={g} style={{ minWidth:90 }}>
                    <label className="field-label" style={{ fontSize:10, marginBottom:3 }}>Grade {g}</label>
                    <div className="fl" style={{ alignItems:"center", gap:4 }}>
                      <input className="field-input" type="number" min={0} max={2000}
                        value={(config.gradeEnrollment||{})[g] ?? ""}
                        onChange={e => fld("gradeEnrollment", {
                          ...(config.gradeEnrollment||{}),
                          [g]: parseInt(e.target.value) || 0
                        })}
                        placeholder="0"
                        style={{ width:72 }} />
                      <span style={{ fontSize:11, color:"#8a9aaa" }}>students</span>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>

        {/* Day types / blocks */}
        <div style={{ background:"white", borderRadius:8, border:"1px solid #e0e8f0", padding:20, marginBottom:16 }}>
          <div className="section-title" style={{ marginBottom:6 }}>Day Types (Blocks)</div>
          <div style={{ fontSize:11, color:"#8a9aaa", marginBottom:14 }}>
            Define the block/day types in your schedule (e.g. A days, B days). The period count per block is used to set teacher capacity limits.
          </div>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))", gap:10, marginBottom:14 }}>
            {blockKeys.map(key => (
              <div key={key} style={{ background:"#f8fafc", borderRadius:6, border:"1px solid #e0e8f0", padding:"10px 12px" }}>
                <div className="flb" style={{ marginBottom:8 }}>
                  <span style={{ fontWeight:"bold", fontSize:14, fontFamily:"monospace", color:"#1e3a5f" }}>{key} days</span>
                  {blockKeys.length > 1 && (
                    <button onClick={() => { const b={...config.blocks}; delete b[key]; fld("blocks",b); }}
                      style={{ background:"none", border:"none", cursor:"pointer", color:"#b91c1c", fontSize:15, lineHeight:1 }}>×</button>
                  )}
                </div>
                <label className="field-label" style={{ fontSize:9, marginBottom:4 }}>Periods per day</label>
                <input className="field-input" type="number" min={1} max={12}
                  value={config.blocks[key]||6}
                  onChange={e => fld("blocks", { ...config.blocks, [key]: parseInt(e.target.value)||6 })} />
              </div>
            ))}
          </div>
          <div className="fl" style={{ gap:7, alignItems:"center" }}>
            <input className="field-input" value={newBlockKey} style={{ width:70 }}
              onChange={e => setNewBlockKey(e.target.value.toUpperCase().slice(0,3))}
              onKeyDown={e => e.key==="Enter" && addBlock()}
              placeholder="C" />
            <button className="btn btn-secondary" onClick={addBlock} style={{ fontSize:11 }}>+ Add Block Type</button>
          </div>
        </div>

        {/* Immersion */}
        <div style={{ background:"white", borderRadius:8, border:"1px solid #e0e8f0", padding:20, marginBottom:24 }}>
          <div className="section-title" style={{ marginBottom:12 }}>Immersion Program</div>
          <label className="toggle" style={{ marginBottom:10, display:"flex" }}>
            <input type="checkbox" checked={!!config.immersion}
              onChange={e => fld("immersion", e.target.checked)} />
            School has an immersion program
          </label>
          {config.immersion && (
            <div style={{ marginTop:10 }}>
              <label className="field-label">Immersion Languages (comma-separated)</label>
              <input className="field-input"
                value={(config.immersionLanguages||[]).join(", ")}
                onChange={e => fld("immersionLanguages", e.target.value.split(",").map(s=>s.trim()).filter(Boolean))}
                placeholder="German, Spanish" />
              {(config.grades||[]).length > 0 && (
                <div style={{ marginTop:14 }}>
                  <label className="field-label" style={{ marginBottom:4 }}>Expected Immersion Students per Grade</label>
                  <div style={{ fontSize:11, color:"#8a9aaa", marginBottom:8 }}>
                    Immersion-track students per grade (subset of total enrollment above).
                  </div>
                  <div className="fl" style={{ gap:10, flexWrap:"wrap" }}>
                    {[...(config.grades||[])].sort((a,b) => a-b).map(g => (
                      <div key={g} style={{ minWidth:90 }}>
                        <label className="field-label" style={{ fontSize:10, marginBottom:3 }}>Grade {g}</label>
                        <div className="fl" style={{ alignItems:"center", gap:4 }}>
                          <input className="field-input" type="number" min={0} max={2000}
                            value={(config.gradeImmersionEnrollment||{})[g] ?? ""}
                            onChange={e => fld("gradeImmersionEnrollment", {
                              ...(config.gradeImmersionEnrollment||{}),
                              [g]: parseInt(e.target.value) || 0
                            })}
                            placeholder="0"
                            style={{ width:72 }} />
                          <span style={{ fontSize:11, color:"#8a9aaa" }}>students</span>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
          )}
        </div>

        <div style={{ position:"sticky", bottom:0, background:"white",
          borderTop:"1px solid #e0e8f0", padding:"14px 0 12px", marginTop:16 }}>
          <div className="fl" style={{ gap:10, alignItems:"center" }}>
            <button className="btn btn-primary" onClick={save} disabled={saving}>
              {saving ? "Saving…" : "Save Configuration"}
            </button>
            {saved && <span style={{ fontSize:12, color:"#15803d" }}>✓ Saved</span>}
          </div>
        </div>
      </div>
    </div>
  );
}

// COURSE SETUP
// ══════════════════════════════════════════════════════════════════════════════
const TOP_CATS       = ["core", "required-electives", "electives"];
const TOP_CAT_LABELS = { core:"Core", "required-electives":"Required Electives", electives:"Electives" };
const TOP_CAT_COLORS = { core:"#1e3a5f", "required-electives":"#7c3aed", electives:"#0891b2" };
const BLOCK_OPTIONS  = ["both","either","A","B"];
const EMPTY_COURSE   = {
  code:"", name:"", topCategory:"electives", subcategory:"", blocks:"either",
  grades:[7], semesters:["Fall","Spring"], semestersRequired:1,
  fullYear:false, changeAtSemester:false, repeatable:false,
  seats:28, approvalRequired:false, immersionLanguage:"", prerequisites:[], active:true,
};

function CourseSetup({ schoolId }) {
  const [courses,    setCourses]    = useState([]);
  const [teachers,   setTeachers]   = useState([]);
  const [loading,    setLoading]    = useState(true);
  const [selTop,     setSelTop]     = useState("core");
  const [selSub,     setSelSub]     = useState(null);
  const [editId,     setEditId]     = useState(null);   // null | "new" | docId
  const [form,       setForm]       = useState(EMPTY_COURSE);
  const [saving,     setSaving]     = useState(false);
  const [importMsg,  setImportMsg]  = useState("");
  const [viewMode,   setViewMode]   = useState("cards"); // "cards" | "list"
  const [showAll,    setShowAll]    = useState(false);
  const [inlineEdit, setInlineEdit] = useState(null);    // { id, field, val } | null

  useEffect(() => { loadCourses(); }, [schoolId]);

  async function loadCourses() {
    setLoading(true);
    try {
      const [cs, ts] = await Promise.all([
        fsGetAll(schoolId, "courses"),
        fsGetAll(schoolId, "teachers"),
      ]);
      setCourses(cs);
      setTeachers(ts);
    } catch(e) { console.error(e); }
    setLoading(false);
  }

  // Map course code → array of teacher names assigned to it
  const courseTeachers = useMemo(() => {
    const map = {};
    teachers.forEach(t => {
      (t.assignedCourses || t.qualifiedCourses || []).forEach(code => {
        if (!map[code]) map[code] = [];
        map[code].push(t.name);
      });
    });
    return map;
  }, [teachers]);

  const subcategories = useMemo(() =>
    [...new Set(courses.filter(c => c.topCategory === selTop).map(c => c.subcategory).filter(Boolean))].sort(),
    [courses, selTop]
  );

  const visibleCourses = useMemo(() => {
    const filtered = showAll
      ? courses.slice()
      : courses.filter(c => c.topCategory === selTop && (selSub === null || c.subcategory === selSub));
    return filtered.sort((a, b) => {
      if (showAll) {
        const ci = TOP_CATS.indexOf(a.topCategory) - TOP_CATS.indexOf(b.topCategory);
        if (ci !== 0) return ci;
        const si = (a.subcategory||"").localeCompare(b.subcategory||"");
        if (si !== 0) return si;
      }
      return a.name.localeCompare(b.name);
    });
  }, [courses, selTop, selSub, showAll]);

  function fld(k, v) { setForm(f => ({ ...f, [k]: v })); }
  function toggleArr(key, val) {
    setForm(f => {
      const arr = f[key] || [];
      return { ...f, [key]: arr.includes(val) ? arr.filter(x => x !== val) : [...arr, val] };
    });
  }

  function openNew() {
    setForm({ ...EMPTY_COURSE, topCategory: selTop, subcategory: selSub || "" });
    setEditId("new");
  }
  function openEdit(c) { setForm({ ...EMPTY_COURSE, ...c }); setEditId(c._id); }

  async function saveCourse() {
    if (!form.code.trim() || !form.name.trim()) { alert("Code and name are required."); return; }
    setSaving(true);
    try {
      const id = form.code.trim().toUpperCase();
      await fsSave(schoolId, "courses", id, { ...form, code: id });
      await loadCourses();
      setEditId(null);
    } catch(e) { alert("Save failed: " + e.message); }
    setSaving(false);
  }

  async function toggleActive(c) {
    await fsUpdate(schoolId, "courses", c._id, { active: !c.active });
    setCourses(cs => cs.map(x => x._id === c._id ? { ...x, active: !x.active } : x));
  }

  async function deleteCourse(id) {
    if (!confirm(`Delete course ${id}? This cannot be undone.`)) return;
    try {
      await fsDeleteDoc(schoolId, "courses", id);
      setCourses(cs => cs.filter(c => c._id !== id));
      setEditId(null);
    } catch(e) { alert("Delete failed: " + e.message); }
  }

  async function saveInline(id, field, val) {
    try {
      await fsUpdate(schoolId, "courses", id, { [field]: val });
      setCourses(cs => cs.map(c => c._id === id ? { ...c, [field]: val } : c));
    } catch(e) { console.error("Inline save failed", e); }
    setInlineEdit(null);
  }

  // Build display groups for both cards and list views
  function buildGroups(coursesArr) {
    const singleColor = TOP_CAT_COLORS[selTop];
    if (showAll) {
      const groups = [];
      TOP_CATS.forEach(cat => {
        const catCs = coursesArr.filter(c => c.topCategory === cat);
        if (!catCs.length) return;
        const col = TOP_CAT_COLORS[cat];
        const subs = [...new Set(catCs.map(c => c.subcategory).filter(Boolean))].sort();
        const noSub = catCs.filter(c => !c.subcategory);
        if (noSub.length) groups.push({ header: TOP_CAT_LABELS[cat], courses: noSub, color: col });
        subs.forEach(sub => groups.push({
          header: `${TOP_CAT_LABELS[cat]} · ${sub}`,
          courses: catCs.filter(c => c.subcategory === sub),
          color: col,
        }));
      });
      return groups;
    }
    // Single-category: group by subcategory when no sub filter
    if (selSub !== null) return [{ header: null, courses: coursesArr, color: singleColor }];
    const subs = [...new Set(coursesArr.map(c => c.subcategory).filter(Boolean))].sort();
    if (subs.length <= 1) return [{ header: null, courses: coursesArr, color: singleColor }];
    const groups = [];
    const noSub = coursesArr.filter(c => !c.subcategory);
    if (noSub.length) groups.push({ header: TOP_CAT_LABELS[selTop], courses: noSub, color: singleColor });
    subs.forEach(sub => groups.push({
      header: sub,
      courses: coursesArr.filter(c => c.subcategory === sub),
      color: singleColor,
    }));
    return groups;
  }

  const thStyle = { padding:"7px 10px", textAlign:"left", fontSize:10, fontWeight:"bold",
    color:"#4a6080", textTransform:"uppercase", letterSpacing:0.4, whiteSpace:"nowrap" };
  const tdStyle = { padding:"5px 10px", verticalAlign:"middle", fontSize:11 };

  function exportCourses() {
    const hdr = ["Code","Name","Top Category","Subcategory","Blocks","Grades","Semesters",
                 "Sem Required","Full Year","Change At Semester","Repeatable","Seats",
                 "Approval Required","Immersion Language","Prerequisites","Active"];
    const rows = [hdr, ...courses.map(c => [
      c.code, c.name, c.topCategory, c.subcategory||"", c.blocks,
      (c.grades||[]).join(","), (c.semesters||[]).join(","),
      c.semestersRequired||1, c.fullYear?"yes":"no", c.changeAtSemester?"yes":"no",
      c.repeatable?"yes":"no", c.seats, c.approvalRequired?"yes":"no",
      c.immersionLanguage||"", (c.prerequisites||[]).join(","), c.active?"yes":"no"
    ])];
    const ws = XLSX.utils.aoa_to_sheet(rows);
    ws["!cols"] = hdr.map(() => ({ wch: 18 }));
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Courses");
    XLSX.writeFile(wb, "courses-export.xlsx");
  }

  async function importCourses(e) {
    const file = e.target.files?.[0]; if (!file) return;
    setImportMsg("Importing…");
    const reader = new FileReader();
    reader.onload = async (evt) => {
      try {
        const wb   = XLSX.read(evt.target.result, { type:"array" });
        const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { defval:"" });
        const batch = db.batch(); let count = 0;
        rows.forEach(row => {
          const code = String(row["Code"]||"").trim().toUpperCase(); if (!code) return;
          const data = {
            code, name: String(row["Name"]||""),
            topCategory: String(row["Top Category"]||"electives"),
            subcategory: String(row["Subcategory"]||""),
            blocks:      String(row["Blocks"]||"either"),
            grades:      String(row["Grades"]||"7,8").split(",").map(Number).filter(n=>!isNaN(n)),
            semesters:   String(row["Semesters"]||"Fall,Spring").split(","),
            semestersRequired: parseInt(row["Sem Required"])||1,
            fullYear:         String(row["Full Year"]||"").toLowerCase()==="yes",
            changeAtSemester: String(row["Change At Semester"]||"").toLowerCase()==="yes",
            repeatable:       String(row["Repeatable"]||"").toLowerCase()==="yes",
            seats:            parseInt(row["Seats"])||28,
            approvalRequired: String(row["Approval Required"]||"").toLowerCase()==="yes",
            immersionLanguage:String(row["Immersion Language"]||""),
            prerequisites:    String(row["Prerequisites"]||"").split(",").map(s=>s.trim().toUpperCase()).filter(Boolean),
            active:           String(row["Active"]||"yes").toLowerCase()!=="no",
          };
          batch.set(fsCol(schoolId,"courses").doc(code), data, { merge:true });
          count++;
        });
        await batch.commit(); await loadCourses();
        setImportMsg(`✓ Imported ${count} courses.`);
      } catch(err) { setImportMsg("Import failed: " + err.message); }
    };
    reader.readAsArrayBuffer(file); e.target.value = "";
  }

  const color = TOP_CAT_COLORS[selTop];

  return (
    <div style={{ display:"flex", height:"calc(100vh - 48px)", overflow:"hidden" }}>

      {/* LEFT: Category tree */}
      <div style={{ width:200, background:"white", borderRight:"1px solid #e0e8f0", overflowY:"auto", flexShrink:0 }}>
        <div style={{ padding:"10px 14px 8px", borderBottom:"1px solid #e0e8f0" }}>
          <div className="section-title">Categories</div>
        </div>
        {TOP_CATS.map(top => {
          const tc   = TOP_CAT_COLORS[top];
          const subs = [...new Set(courses.filter(c=>c.topCategory===top).map(c=>c.subcategory).filter(Boolean))].sort();
          const active = selTop === top;
          return (
            <div key={top}>
              <button onClick={() => { setSelTop(top); setSelSub(null); setEditId(null); }}
                style={{ width:"100%", textAlign:"left", padding:"8px 14px", border:"none", cursor:"pointer",
                  borderLeft: `3px solid ${active && selSub===null ? tc : "transparent"}`,
                  background: active && selSub===null ? tc+"15" : "white",
                  fontSize:12, fontWeight:700, color:tc }}>
                {TOP_CAT_LABELS[top]}
                <span style={{ fontSize:9, color:"#aab", marginLeft:5 }}>
                  ({courses.filter(c=>c.topCategory===top).length})
                </span>
              </button>
              {active && subs.map(sub => (
                <button key={sub} onClick={() => { setSelSub(sub); setEditId(null); }}
                  style={{ width:"100%", textAlign:"left", padding:"5px 14px 5px 26px", border:"none", cursor:"pointer",
                    borderLeft: `3px solid ${selSub===sub ? tc : "transparent"}`,
                    background: selSub===sub ? tc+"0e" : "white",
                    fontSize:11, color: selSub===sub ? tc : "#6b7280" }}>
                  {sub}
                  <span style={{ fontSize:9, color:"#b0bec8", marginLeft:4 }}>
                    ({courses.filter(c=>c.topCategory===top&&c.subcategory===sub).length})
                  </span>
                </button>
              ))}
            </div>
          );
        })}
      </div>

      {/* CENTER: Course list */}
      <div style={{ flex:1, overflowY:"auto", padding:18, background:"#f8fafc" }}>

        {/* ── Toolbar ── */}
        <div className="flb" style={{ marginBottom:14, flexWrap:"wrap", gap:8, alignItems:"center" }}>
          <div>
            <div style={{ fontSize:15, fontWeight:"bold", color:"#1e3a5f" }}>
              {showAll ? "All Courses" : `${TOP_CAT_LABELS[selTop]}${selSub ? ` · ${selSub}` : ""}`}
            </div>
            <div style={{ fontSize:11, color:"#8a9aaa" }}>{visibleCourses.length} course{visibleCourses.length!==1?"s":""}</div>
          </div>
          <div className="fla" style={{ gap:7, flexWrap:"wrap", alignItems:"center" }}>

            {/* Show All toggle */}
            <button onClick={() => setShowAll(v => !v)}
              className={showAll ? "btn btn-primary" : "btn btn-secondary"}
              style={{ fontSize:11 }}>
              {showAll ? "✓ All" : "Show All"}
            </button>

            {/* Cards / List toggle */}
            <div style={{ display:"flex", border:"1px solid #c0d0e0", borderRadius:5, overflow:"hidden" }}>
              {[["cards","⊞ Cards"],["list","≡ List"]].map(([m, label], i) => (
                <button key={m} onClick={() => setViewMode(m)}
                  style={{ padding:"4px 11px", fontSize:11, border:"none", cursor:"pointer",
                    borderLeft: i > 0 ? "1px solid #c0d0e0" : "none",
                    background: viewMode === m ? "#1e3a5f" : "white",
                    color:      viewMode === m ? "white"   : "#6b7280" }}>
                  {label}
                </button>
              ))}
            </div>

            <button className="btn btn-secondary" style={{ fontSize:11 }} onClick={exportCourses}>⬇ Export XLSX</button>
            <label className="btn btn-secondary" style={{ fontSize:11, cursor:"pointer" }}>
              ⬆ Import XLSX
              <input type="file" accept=".xlsx,.xls" onChange={importCourses} style={{ display:"none" }} />
            </label>
            <button className="btn btn-primary" style={{ fontSize:11 }} onClick={openNew}>+ Add Course</button>
          </div>
        </div>

        {importMsg && (
          <div style={{ marginBottom:12, fontSize:11, padding:"5px 10px", borderRadius:4,
            background: importMsg.startsWith("✓") ? "#f0fdf4" : "#fff5f5",
            color:      importMsg.startsWith("✓") ? "#15803d" : "#b91c1c",
            border:    `1px solid ${importMsg.startsWith("✓") ? "#bbf7d0" : "#fecaca"}` }}>
            {importMsg} <button style={{ background:"none", border:"none", cursor:"pointer", marginLeft:8, fontSize:11 }} onClick={() => setImportMsg("")}>✕</button>
          </div>
        )}

        {loading
          ? <div style={{ textAlign:"center", color:"#8a9aaa", fontSize:12, paddingTop:48 }}>Loading courses…</div>
          : visibleCourses.length === 0
          ? <div style={{ textAlign:"center", color:"#8a9aaa", fontSize:13, paddingTop:48 }}>
              No courses in this category yet.
              <div style={{ marginTop:12 }}><button className="btn btn-primary" onClick={openNew}>+ Add First Course</button></div>
            </div>

          : viewMode === "list"
          /* ── LIST / SPREADSHEET VIEW ─────────────────────────────── */
          ? (() => {
              const groups = buildGroups(visibleCourses);
              return (
                <div style={{ background:"white", borderRadius:8, border:"1px solid #e0e8f0", overflow:"hidden" }}>
                  <table style={{ width:"100%", borderCollapse:"collapse", fontSize:11 }}>
                    <thead>
                      <tr style={{ background:"#f0f4f8", borderBottom:"2px solid #c8d4e0" }}>
                        <th style={thStyle}>Code</th>
                        <th style={{ ...thStyle, minWidth:180 }}>Name</th>
                        {showAll && <th style={thStyle}>Category</th>}
                        <th style={thStyle}>Subcategory</th>
                        <th style={thStyle}>Gr</th>
                        <th style={thStyle}>Teachers</th>
                        <th style={thStyle}>Blk</th>
                        <th style={{ ...thStyle, width:62 }}>Seats</th>
                        <th style={thStyle}>Active</th>
                        <th style={{ ...thStyle, width:32 }}></th>
                        <th style={{ ...thStyle, width:32 }}></th>
                      </tr>
                    </thead>
                    <tbody>
                      {groups.map(({ header, courses: grpCs, color: grpColor }) => (
                        <React.Fragment key={header || "all"}>
                          {header && (
                            <tr>
                              <td colSpan={showAll ? 11 : 10}
                                style={{ padding:"7px 12px", fontSize:10, fontWeight:"bold",
                                  textTransform:"uppercase", letterSpacing:0.5,
                                  color: grpColor, background: grpColor + "0d",
                                  borderBottom:"1px solid " + grpColor + "33" }}>
                                {header}
                                <span style={{ fontWeight:"normal", marginLeft:6, color:"#aab" }}>({grpCs.length})</span>
                              </td>
                            </tr>
                          )}
                          {grpCs.map((c, i) => {
                            const rowColor = TOP_CAT_COLORS[c.topCategory] || "#333";
                            return (
                              <tr key={c._id} style={{
                                background: editId === c._id ? "#eef3ff" : i % 2 === 0 ? "white" : "#fafcff",
                                opacity: c.active ? 1 : 0.52,
                                borderBottom:"1px solid #eef2f6" }}>

                                {/* Code */}
                                <td style={{ ...tdStyle, fontFamily:"monospace", fontWeight:"bold",
                                  color: rowColor, cursor:"pointer", whiteSpace:"nowrap" }}
                                  onClick={() => openEdit(c)}>
                                  {c.code}
                                </td>

                                {/* Name — inline editable */}
                                <td style={{ ...tdStyle, minWidth:180 }}
                                  onClick={() => inlineEdit?.id !== c._id && setInlineEdit({ id:c._id, field:"name", val:c.name })}>
                                  {inlineEdit?.id === c._id && inlineEdit.field === "name"
                                    ? <input autoFocus value={inlineEdit.val}
                                        onChange={e => setInlineEdit(ie => ({ ...ie, val:e.target.value }))}
                                        onBlur={() => saveInline(c._id, "name", inlineEdit.val)}
                                        onKeyDown={e => {
                                          if (e.key === "Enter")  saveInline(c._id, "name", inlineEdit.val);
                                          if (e.key === "Escape") setInlineEdit(null);
                                        }}
                                        style={{ width:"100%", border:"1px solid #4a90d9", borderRadius:3,
                                          padding:"2px 5px", fontSize:11, background:"#f0f7ff", outline:"none" }} />
                                    : <span style={{ cursor:"text", display:"block" }}>{c.name}</span>
                                  }
                                </td>

                                {/* Category badge (show-all only) */}
                                {showAll && (
                                  <td style={tdStyle}>
                                    <span style={{ fontSize:10, padding:"1px 6px", borderRadius:3, whiteSpace:"nowrap",
                                      background: rowColor + "18", color: rowColor, fontWeight:600 }}>
                                      {TOP_CAT_LABELS[c.topCategory]}
                                    </span>
                                  </td>
                                )}

                                {/* Subcategory — inline editable */}
                                <td style={{ ...tdStyle, color:"#6b7280" }}
                                  onClick={() => inlineEdit?.id !== c._id && setInlineEdit({ id:c._id, field:"subcategory", val:c.subcategory||"" })}>
                                  {inlineEdit?.id === c._id && inlineEdit.field === "subcategory"
                                    ? <input autoFocus value={inlineEdit.val}
                                        onChange={e => setInlineEdit(ie => ({ ...ie, val:e.target.value }))}
                                        onBlur={() => saveInline(c._id, "subcategory", inlineEdit.val)}
                                        onKeyDown={e => {
                                          if (e.key === "Enter")  saveInline(c._id, "subcategory", inlineEdit.val);
                                          if (e.key === "Escape") setInlineEdit(null);
                                        }}
                                        style={{ width:"100%", border:"1px solid #4a90d9", borderRadius:3,
                                          padding:"2px 5px", fontSize:11, background:"#f0f7ff", outline:"none" }} />
                                    : <span style={{ cursor:"text", display:"block", color: c.subcategory ? "#6b7280" : "#c0c8d0" }}>
                                        {c.subcategory || "—"}
                                      </span>
                                  }
                                </td>

                                {/* Grades */}
                                <td style={{ ...tdStyle, whiteSpace:"nowrap", color:"#5a7a9a" }}>
                                  {(c.grades||[]).join(", ")}
                                </td>

                                {/* Teachers */}
                                <td style={tdStyle}>
                                  <div className="fl" style={{ gap:3, flexWrap:"wrap" }}>
                                    {(courseTeachers[c.code]||[]).map(name => (
                                      <span key={name} className="badge"
                                        style={{ background:"#e0f2fe", color:"#0369a1", fontSize:9, whiteSpace:"nowrap" }}>
                                        {name}
                                      </span>
                                    ))}
                                  </div>
                                </td>

                                {/* Blocks — inline select */}
                                <td style={tdStyle}>
                                  <select value={c.blocks||"either"}
                                    onChange={e => saveInline(c._id, "blocks", e.target.value)}
                                    style={{ border:"1px solid #e0e8f0", borderRadius:3, fontSize:11,
                                      padding:"1px 3px", background:"transparent", color:"#5a7a9a", cursor:"pointer" }}>
                                    {BLOCK_OPTIONS.map(b => <option key={b} value={b}>{b}</option>)}
                                  </select>
                                </td>

                                {/* Seats — inline editable */}
                                <td style={{ ...tdStyle, width:62 }}
                                  onClick={() => inlineEdit?.id !== c._id && setInlineEdit({ id:c._id, field:"seats", val:c.seats })}>
                                  {inlineEdit?.id === c._id && inlineEdit.field === "seats"
                                    ? <input autoFocus type="number" min={1} value={inlineEdit.val}
                                        onChange={e => setInlineEdit(ie => ({ ...ie, val:e.target.value }))}
                                        onBlur={() => saveInline(c._id, "seats", parseInt(inlineEdit.val)||28)}
                                        onKeyDown={e => {
                                          if (e.key === "Enter")  saveInline(c._id, "seats", parseInt(inlineEdit.val)||28);
                                          if (e.key === "Escape") setInlineEdit(null);
                                        }}
                                        style={{ width:50, border:"1px solid #4a90d9", borderRadius:3,
                                          padding:"2px 4px", fontSize:11, background:"#f0f7ff", outline:"none" }} />
                                    : <span style={{ cursor:"text", display:"block" }}>{c.seats}</span>
                                  }
                                </td>

                                {/* Active toggle */}
                                <td style={{ ...tdStyle, textAlign:"center" }}>
                                  <button onClick={() => toggleActive(c)}
                                    style={{ fontSize:10, padding:"1px 7px", borderRadius:3, cursor:"pointer", border:"1px solid",
                                      background:   c.active ? "#d1fae5" : "#f3f4f6",
                                      color:        c.active ? "#065f46" : "#6b7280",
                                      borderColor:  c.active ? "#a7f3d0" : "#d1d5db" }}>
                                    {c.active ? "On" : "Off"}
                                  </button>
                                </td>

                                {/* Open detail editor */}
                                <td style={{ ...tdStyle, textAlign:"center" }}>
                                  <button onClick={() => openEdit(c)}
                                    title="Open full editor"
                                    style={{ background:"none", border:"none", cursor:"pointer", fontSize:14,
                                      color: editId === c._id ? "#4a90d9" : "#c0ccd8", padding:"0 2px" }}>
                                    ✎
                                  </button>
                                </td>
                                {/* Delete */}
                                <td style={{ ...tdStyle, textAlign:"center" }}>
                                  <button onClick={() => deleteCourse(c._id)}
                                    title="Delete course"
                                    style={{ background:"none", border:"none", cursor:"pointer", fontSize:13,
                                      color:"#d0c0c0", padding:"0 2px" }}
                                    onMouseEnter={e => e.currentTarget.style.color="#b91c1c"}
                                    onMouseLeave={e => e.currentTarget.style.color="#d0c0c0"}>
                                    🗑
                                  </button>
                                </td>
                              </tr>
                            );
                          })}
                        </React.Fragment>
                      ))}
                    </tbody>
                  </table>
                </div>
              );
            })()

          /* ── CARDS VIEW ──────────────────────────────────────────── */
          : (() => {
              const groups = buildGroups(visibleCourses);
              return groups.map(({ header, courses: grpCs, color: grpColor }) => (
                <div key={header || "all"} style={{ marginBottom: header ? 24 : 0 }}>
                  {header && (
                    <div style={{ fontSize:11, fontWeight:"bold", color: grpColor,
                      textTransform:"uppercase", letterSpacing:0.7,
                      marginBottom:10, paddingBottom:6,
                      borderBottom:`2px solid ${grpColor}30` }}>
                      {header}
                      <span style={{ fontSize:10, fontWeight:"normal", color:"#aab", marginLeft:6 }}>({grpCs.length})</span>
                    </div>
                  )}
                  <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(230px,1fr))", gap:10 }}>
                    {grpCs.map(c => (
                      <div key={c._id} className="card" onClick={() => openEdit(c)}
                        style={{ cursor:"pointer", borderLeft:`4px solid ${c.active ? grpColor : "#d0d0d0"}`,
                          opacity: c.active ? 1 : 0.58, background: c.active ? "white" : "#fafafa" }}>
                        <div className="flb">
                          <div>
                            <div style={{ fontSize:10, fontWeight:"bold", color:grpColor, fontFamily:"monospace" }}>{c.code}</div>
                            <div style={{ fontSize:12, fontWeight:"bold", color:"#1e2a3a", marginTop:1, lineHeight:1.3 }}>{c.name}</div>
                          </div>
                          <button onClick={e => { e.stopPropagation(); toggleActive(c); }}
                            className="badge" style={{ cursor:"pointer", border:"none",
                              background: c.active ? "#d1fae5" : "#f0f0f0",
                              color:      c.active ? "#065f46" : "#888" }}>
                            {c.active ? "Active" : "Off"}
                          </button>
                        </div>
                        <div className="fl" style={{ gap:5, marginTop:8, flexWrap:"wrap" }}>
                          <span className="badge" style={{ background:"#f0f4f8", color:"#5a7a9a" }}>Gr {(c.grades||[]).join(",")}</span>
                          <span className="badge" style={{ background:"#f0f4f8", color:"#5a7a9a" }}>{c.blocks}</span>
                          <span className="badge" style={{ background:"#f0f4f8", color:"#5a7a9a" }}>{c.seats} seats</span>
                          {c.approvalRequired && <span className="badge" style={{ background:"#fef3c7", color:"#92400e" }}>Approval ✓</span>}
                          {c.immersionLanguage && <span className="badge" style={{ background:"#fee2e2", color:"#991b1b" }}>{c.immersionLanguage}</span>}
                        </div>
                        {(courseTeachers[c.code]||[]).length > 0 && (
                          <div className="fl" style={{ gap:4, marginTop:5, flexWrap:"wrap" }}>
                            {courseTeachers[c.code].map(name => (
                              <span key={name} className="badge"
                                style={{ background:"#e0f2fe", color:"#0369a1", fontSize:9 }}>
                                👤 {name}
                              </span>
                            ))}
                          </div>
                        )}
                      </div>
                    ))}
                  </div>
                </div>
              ));
            })()
        }
      </div>

      {/* RIGHT: Edit panel */}
      {editId && (
        <div style={{ width:310, borderLeft:"1px solid #e0e8f0", background:"white", overflowY:"auto", padding:16, flexShrink:0 }}>
          <div className="flb" style={{ marginBottom:14 }}>
            <div style={{ fontSize:13, fontWeight:"bold", color:"#1e3a5f" }}>
              {editId === "new" ? "New Course" : `Edit · ${form.code}`}
            </div>
            <button className="btn-ghost" onClick={() => setEditId(null)}>×</button>
          </div>
          <div className="fld" style={{ gap:10 }}>
            <div>
              <label className="field-label">Course Code *</label>
              <input className="field-input" value={form.code}
                onChange={e => fld("code", e.target.value.toUpperCase())}
                placeholder="e.g. ENG7H" disabled={editId !== "new"} />
            </div>
            <div>
              <label className="field-label">Course Name *</label>
              <input className="field-input" value={form.name}
                onChange={e => fld("name", e.target.value)} placeholder="e.g. English 7 Honors" />
            </div>
            <div>
              <label className="field-label">Top Category</label>
              <select className="field-input" value={form.topCategory} onChange={e => fld("topCategory", e.target.value)}>
                {TOP_CATS.map(t => <option key={t} value={t}>{TOP_CAT_LABELS[t]}</option>)}
              </select>
            </div>
            <div>
              <label className="field-label">Subcategory</label>
              <input className="field-input" value={form.subcategory}
                onChange={e => fld("subcategory", e.target.value)} placeholder="e.g. language-arts" />
            </div>
            <div>
              <label className="field-label">Blocks</label>
              <select className="field-input" value={form.blocks} onChange={e => fld("blocks", e.target.value)}>
                {BLOCK_OPTIONS.map(b => <option key={b} value={b}>{b}</option>)}
              </select>
            </div>
            <div>
              <label className="field-label">Grades</label>
              <div className="fl" style={{ gap:14 }}>
                {[7,8].map(g => (
                  <label key={g} className="toggle">
                    <input type="checkbox" checked={(form.grades||[]).includes(g)}
                      onChange={() => toggleArr("grades", g)} />
                    Grade {g}
                  </label>
                ))}
              </div>
            </div>
            <div>
              <label className="field-label">Semesters</label>
              <div className="fl" style={{ gap:14 }}>
                {["Fall","Spring"].map(s => (
                  <label key={s} className="toggle">
                    <input type="checkbox" checked={(form.semesters||[]).includes(s)}
                      onChange={() => toggleArr("semesters", s)} />
                    {s}
                  </label>
                ))}
              </div>
            </div>
            <div>
              <label className="field-label">Semesters Required</label>
              <select className="field-input" value={form.semestersRequired}
                onChange={e => fld("semestersRequired", parseInt(e.target.value))}>
                <option value={1}>1 semester</option>
                <option value={2}>2 semesters (full year)</option>
              </select>
            </div>
            <div>
              <label className="field-label">Seats</label>
              <input className="field-input" type="number" min={1}
                value={form.seats} onChange={e => fld("seats", parseInt(e.target.value)||0)} />
            </div>
            <div>
              <label className="field-label">Prerequisites (comma-separated codes)</label>
              <input className="field-input" value={(form.prerequisites||[]).join(",")}
                onChange={e => fld("prerequisites", e.target.value.split(",").map(s=>s.trim().toUpperCase()).filter(Boolean))}
                placeholder="e.g. SPAN1" />
            </div>
            <div>
              <label className="field-label">Immersion Language</label>
              <input className="field-input" value={form.immersionLanguage||""}
                onChange={e => fld("immersionLanguage", e.target.value)} placeholder="e.g. German" />
            </div>
            <div className="fld" style={{ gap:7, paddingTop:8, borderTop:"1px solid #e0e8f0" }}>
              {[["fullYear","Full Year"],["changeAtSemester","Change at Semester"],
                ["repeatable","Repeatable"],["approvalRequired","Approval Required"],["active","Active"]
              ].map(([k,label]) => (
                <label key={k} className="toggle">
                  <input type="checkbox" checked={!!form[k]} onChange={e => fld(k, e.target.checked)} />
                  {label}
                </label>
              ))}
            </div>
            <div className="fl" style={{ gap:7, paddingTop:4 }}>
              <button className="btn btn-primary" onClick={saveCourse} disabled={saving} style={{ flex:1 }}>
                {saving ? "Saving…" : "Save Course"}
              </button>
              <button className="btn btn-secondary" onClick={() => setEditId(null)}>Cancel</button>
              {editId !== "new" && (
                <button className="btn btn-secondary"
                  style={{ color:"#b91c1c", borderColor:"#fecaca" }}
                  onClick={() => deleteCourse(editId)}>
                  🗑
                </button>
              )}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// TEACHER SETUP
// ══════════════════════════════════════════════════════════════════════════════
const EMPTY_TEACHER = {
  teacherId:"", name:"", title:"", email:"", assignedCourses:[],
  maxSectionsPerBlock:{}, blocksAvailable:["A","B"], semestersAvailable:["Fall","Spring"],
  unavailable:[], lunchAssignment:{}, active:true,
};

function TeacherSetup({ schoolId, schoolConfig }) {
  const [teachers,      setTeachers]      = useState([]);
  const [courses,       setCourses]       = useState([]);
  const [loading,       setLoading]       = useState(true);
  const [selId,         setSelId]         = useState(null);
  const [form,          setForm]          = useState(EMPTY_TEACHER);
  const [saving,        setSaving]        = useState(false);
  const [courseSearch,  setCourseSearch]  = useState("");
  const [importMsg,     setImportMsg]     = useState("");
  const [viewMode,      setViewMode]      = useState("cards");
  const [search,        setSearch]        = useState("");

  const visibleTeachers = useMemo(() => {
    const q = search.toLowerCase();
    return teachers
      .filter(t => !q
        || t.name.toLowerCase().includes(q)
        || (t.title||"").toLowerCase().includes(q)
        || (t.assignedCourses||[]).some(c => c.toLowerCase().includes(q)))
      .sort((a, b) => a.name.localeCompare(b.name));
  }, [teachers, search]);

  useEffect(() => {
    Promise.all([
      fsGetAll(schoolId, "teachers"),
      fsCol(schoolId, "courses").where("active","==",true).get()
        .then(s => s.docs.map(d => ({ _id:d.id, ...d.data() })))
    ]).then(([t, c]) => { setTeachers(t); setCourses(c); setLoading(false); })
      .catch(e => { console.error(e); setLoading(false); });
  }, [schoolId]);

  function fld(k, v) { setForm(f => ({ ...f, [k]: v })); }
  function toggleArr(key, val) {
    setForm(f => {
      const arr = f[key]||[];
      return { ...f, [key]: arr.includes(val) ? arr.filter(x=>x!==val) : [...arr, val] };
    });
  }

  function openNew() { setForm({ ...EMPTY_TEACHER }); setCourseSearch(""); setSelId("new"); }
  function openEdit(t) {
    // Normalize legacy lunchAssignment: integer → per-block map
    let lunchAssignment = t.lunchAssignment || {};
    if (typeof lunchAssignment === "number") {
      const blockKeys = Object.keys(schoolConfig?.blocks || { A:1, B:1 }).sort();
      lunchAssignment = Object.fromEntries(blockKeys.map(b => [b, lunchAssignment]));
    }
    setForm({
      ...EMPTY_TEACHER, ...t,
      assignedCourses: t.assignedCourses || t.qualifiedCourses || [],
      lunchAssignment,
    });
    setCourseSearch("");
    setSelId(t._id);
  }

  async function saveTeacher() {
    if (!form.teacherId.trim() || !form.name.trim()) { alert("Teacher ID and name required."); return; }
    setSaving(true);
    try {
      const id = form.teacherId.trim().toLowerCase().replace(/\s+/g, ".");
      await fsSave(schoolId, "teachers", id, { ...form, teacherId: id });
      setTeachers(await fsGetAll(schoolId, "teachers"));
      setSelId(null);
    } catch(e) { alert("Save failed: " + e.message); }
    setSaving(false);
  }

  async function toggleActive(t) {
    await fsUpdate(schoolId, "teachers", t._id, { active: !t.active });
    setTeachers(ts => ts.map(x => x._id === t._id ? { ...x, active: !t.active } : x));
  }

  function exportTeachers() {
    const blockKeys = Object.keys(schoolConfig?.blocks || { A:1, B:1 }).sort();
    const hdr = ["Teacher ID","Name","Title","Email","Assigned Courses",
                 ...blockKeys.map(b => `Max Sections (${b} days)`),
                 ...blockKeys.map(b => `Lunch (${b} days)`),
                 "Blocks Available","Semesters Available","Unavailable Periods","Active"];
    const rows = [hdr, ...teachers.map(t => {
      // Normalize legacy integer lunchAssignment for export
      const la = (typeof t.lunchAssignment === "number")
        ? Object.fromEntries(blockKeys.map(b => [b, t.lunchAssignment]))
        : (t.lunchAssignment || {});
      return [
        t.teacherId, t.name, t.title||"", t.email||"",
        (t.assignedCourses || t.qualifiedCourses || []).join(","),
        ...blockKeys.map(b => (t.maxSectionsPerBlock||{})[b] ?? 5),
        ...blockKeys.map(b => la[b] ?? 1),
        (t.blocksAvailable||[]).join(","), (t.semestersAvailable||[]).join(","),
        (t.unavailable||[]).join(","), t.active?"yes":"no",
      ];
    })];
    const ws = XLSX.utils.aoa_to_sheet(rows);
    ws["!cols"] = hdr.map(() => ({ wch: 20 }));
    const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Teachers");
    XLSX.writeFile(wb, "teachers-export.xlsx");
  }

  async function importTeachers(e) {
    const file = e.target.files?.[0]; if (!file) return;
    e.target.value = "";
    setImportMsg("Importing…");
    try {
      const buf = await file.arrayBuffer();
      const wb  = XLSX.read(buf, { type: "array" });
      const ws  = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { defval: "" });

      if (!rows.length) { setImportMsg("No data rows found."); return; }

      // Detect block columns from the header: "Max Sections (X days)"
      const blockKeys = Object.keys(rows[0])
        .map(h => { const m = h.match(/^Max Sections \((\w+) days\)$/); return m ? m[1] : null; })
        .filter(Boolean);

      const split = v => String(v||"").split(",").map(s=>s.trim()).filter(Boolean);

      const batch = db.batch();
      let count = 0;
      rows.forEach(r => {
        const id = String(r["Teacher ID"]||"").trim().toLowerCase().replace(/\s+/g,".");
        if (!id) return;

        const maxSectionsPerBlock = {};
        blockKeys.forEach(b => {
          const val = parseInt(r[`Max Sections (${b} days)`]);
          maxSectionsPerBlock[b] = isNaN(val) ? 5 : val;
        });

        // Build per-block lunch map; fall back to legacy "Lunch Assignment" column
        const lunchAssignment = {};
        const legacyLunch = parseInt(r["Lunch Assignment"]) || 1;
        blockKeys.forEach(b => {
          const col = `Lunch (${b} days)`;
          lunchAssignment[b] = r[col] !== undefined && r[col] !== ""
            ? (parseInt(r[col]) || 1)
            : legacyLunch;
        });

        const teacher = {
          teacherId:          id,
          name:               String(r["Name"]||"").trim(),
          title:              String(r["Title"]||"").trim(),
          email:              String(r["Email"]||"").trim(),
          assignedCourses:    split(r["Assigned Courses"]),
          maxSectionsPerBlock,
          lunchAssignment,
          blocksAvailable:    split(r["Blocks Available"]),
          semestersAvailable: split(r["Semesters Available"]),
          unavailable:        split(r["Unavailable Periods"]),
          active:             String(r["Active"]||"yes").trim().toLowerCase() !== "no",
