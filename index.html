// COURSE SETUP
// ══════════════════════════════════════════════════════════════════════════════
const TOP_CATS       = ["core", "required-electives", "electives"];
const TOP_CAT_LABELS = { core:"Core", "required-electives":"Required Electives", electives:"Electives" };
const TOP_CAT_COLORS = { core:"#1e3a5f", "required-electives":"#7c3aed", electives:"#0891b2" };
const BLOCK_OPTIONS  = ["both","either","A","B"];
const EMPTY_COURSE   = {
  code:"", name:"", topCategory:"electives", subcategory:"", blocks:"either",
  grades:[7], semesters:["Fall","Spring"], semestersRequired:1,
  fullYear:false, changeAtSemester:false, repeatable:false,
  seats:28, approvalRequired:false, immersionLanguage:"", prerequisites:[], active:true,
};

function CourseSetup({ schoolId }) {
  const [courses,    setCourses]    = useState([]);
  const [loading,    setLoading]    = useState(true);
  const [selTop,     setSelTop]     = useState("core");
  const [selSub,     setSelSub]     = useState(null);
  const [editId,     setEditId]     = useState(null);   // null | "new" | docId
  const [form,       setForm]       = useState(EMPTY_COURSE);
  const [saving,     setSaving]     = useState(false);
  const [importMsg,  setImportMsg]  = useState("");
  const [viewMode,   setViewMode]   = useState("cards"); // "cards" | "list"
  const [showAll,    setShowAll]    = useState(false);
  const [inlineEdit, setInlineEdit] = useState(null);    // { id, field, val } | null

  useEffect(() => { loadCourses(); }, [schoolId]);

  async function loadCourses() {
    setLoading(true);
    try { setCourses(await fsGetAll(schoolId, "courses")); }
    catch(e) { console.error(e); }
    setLoading(false);
  }

  const subcategories = useMemo(() =>
    [...new Set(courses.filter(c => c.topCategory === selTop).map(c => c.subcategory).filter(Boolean))].sort(),
    [courses, selTop]
  );

  const visibleCourses = useMemo(() => {
    const filtered = showAll
      ? courses.slice()
      : courses.filter(c => c.topCategory === selTop && (selSub === null || c.subcategory === selSub));
    return filtered.sort((a, b) => {
      if (showAll) {
        const ci = TOP_CATS.indexOf(a.topCategory) - TOP_CATS.indexOf(b.topCategory);
        if (ci !== 0) return ci;
        const si = (a.subcategory||"").localeCompare(b.subcategory||"");
        if (si !== 0) return si;
      }
      return a.name.localeCompare(b.name);
    });
  }, [courses, selTop, selSub, showAll]);

  function fld(k, v) { setForm(f => ({ ...f, [k]: v })); }
  function toggleArr(key, val) {
    setForm(f => {
      const arr = f[key] || [];
      return { ...f, [key]: arr.includes(val) ? arr.filter(x => x !== val) : [...arr, val] };
    });
  }

  function openNew() {
    setForm({ ...EMPTY_COURSE, topCategory: selTop, subcategory: selSub || "" });
    setEditId("new");
  }
  function openEdit(c) { setForm({ ...EMPTY_COURSE, ...c }); setEditId(c._id); }

  async function saveCourse() {
    if (!form.code.trim() || !form.name.trim()) { alert("Code and name are required."); return; }
    setSaving(true);
    try {
      const id = form.code.trim().toUpperCase();
      await fsSave(schoolId, "courses", id, { ...form, code: id });
      await loadCourses();
      setEditId(null);
    } catch(e) { alert("Save failed: " + e.message); }
    setSaving(false);
  }

  async function toggleActive(c) {
    await fsUpdate(schoolId, "courses", c._id, { active: !c.active });
    setCourses(cs => cs.map(x => x._id === c._id ? { ...x, active: !x.active } : x));
  }

  async function deleteCourse(id) {
    if (!confirm(`Delete course ${id}? This cannot be undone.`)) return;
    try {
      await fsDeleteDoc(schoolId, "courses", id);
      setCourses(cs => cs.filter(c => c._id !== id));
      setEditId(null);
    } catch(e) { alert("Delete failed: " + e.message); }
  }

  async function saveInline(id, field, val) {
    try {
      await fsUpdate(schoolId, "courses", id, { [field]: val });
      setCourses(cs => cs.map(c => c._id === id ? { ...c, [field]: val } : c));
    } catch(e) { console.error("Inline save failed", e); }
    setInlineEdit(null);
  }

  // Build display groups for both cards and list views
  function buildGroups(coursesArr) {
    const singleColor = TOP_CAT_COLORS[selTop];
    if (showAll) {
      const groups = [];
      TOP_CATS.forEach(cat => {
        const catCs = coursesArr.filter(c => c.topCategory === cat);
        if (!catCs.length) return;
        const col = TOP_CAT_COLORS[cat];
        const subs = [...new Set(catCs.map(c => c.subcategory).filter(Boolean))].sort();
        const noSub = catCs.filter(c => !c.subcategory);
        if (noSub.length) groups.push({ header: TOP_CAT_LABELS[cat], courses: noSub, color: col });
        subs.forEach(sub => groups.push({
          header: `${TOP_CAT_LABELS[cat]} · ${sub}`,
          courses: catCs.filter(c => c.subcategory === sub),
          color: col,
        }));
      });
      return groups;
    }
    // Single-category: group by subcategory when no sub filter
    if (selSub !== null) return [{ header: null, courses: coursesArr, color: singleColor }];
    const subs = [...new Set(coursesArr.map(c => c.subcategory).filter(Boolean))].sort();
    if (subs.length <= 1) return [{ header: null, courses: coursesArr, color: singleColor }];
    const groups = [];
    const noSub = coursesArr.filter(c => !c.subcategory);
    if (noSub.length) groups.push({ header: TOP_CAT_LABELS[selTop], courses: noSub, color: singleColor });
    subs.forEach(sub => groups.push({
      header: sub,
      courses: coursesArr.filter(c => c.subcategory === sub),
      color: singleColor,
    }));
    return groups;
  }

  const thStyle = { padding:"7px 10px", textAlign:"left", fontSize:10, fontWeight:"bold",
    color:"#4a6080", textTransform:"uppercase", letterSpacing:0.4, whiteSpace:"nowrap" };
  const tdStyle = { padding:"5px 10px", verticalAlign:"middle", fontSize:11 };

  function exportCourses() {
    const hdr = ["Code","Name","Top Category","Subcategory","Blocks","Grades","Semesters",
                 "Sem Required","Full Year","Change At Semester","Repeatable","Seats",
                 "Approval Required","Immersion Language","Prerequisites","Active"];
    const rows = [hdr, ...courses.map(c => [
      c.code, c.name, c.topCategory, c.subcategory||"", c.blocks,
      (c.grades||[]).join(","), (c.semesters||[]).join(","),
      c.semestersRequired||1, c.fullYear?"yes":"no", c.changeAtSemester?"yes":"no",
      c.repeatable?"yes":"no", c.seats, c.approvalRequired?"yes":"no",
      c.immersionLanguage||"", (c.prerequisites||[]).join(","), c.active?"yes":"no"
    ])];
    const ws = XLSX.utils.aoa_to_sheet(rows);
    ws["!cols"] = hdr.map(() => ({ wch: 18 }));
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Courses");
    XLSX.writeFile(wb, "courses-export.xlsx");
  }

  async function importCourses(e) {
    const file = e.target.files?.[0]; if (!file) return;
    setImportMsg("Importing…");
    const reader = new FileReader();
    reader.onload = async (evt) => {
      try {
        const wb   = XLSX.read(evt.target.result, { type:"array" });
        const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { defval:"" });
        const batch = db.batch(); let count = 0;
        rows.forEach(row => {
          const code = String(row["Code"]||"").trim().toUpperCase(); if (!code) return;
          const data = {
            code, name: String(row["Name"]||""),
            topCategory: String(row["Top Category"]||"electives"),
            subcategory: String(row["Subcategory"]||""),
            blocks:      String(row["Blocks"]||"either"),
            grades:      String(row["Grades"]||"7,8").split(",").map(Number).filter(n=>!isNaN(n)),
            semesters:   String(row["Semesters"]||"Fall,Spring").split(","),
            semestersRequired: parseInt(row["Sem Required"])||1,
            fullYear:         String(row["Full Year"]||"").toLowerCase()==="yes",
            changeAtSemester: String(row["Change At Semester"]||"").toLowerCase()==="yes",
            repeatable:       String(row["Repeatable"]||"").toLowerCase()==="yes",
            seats:            parseInt(row["Seats"])||28,
            approvalRequired: String(row["Approval Required"]||"").toLowerCase()==="yes",
            immersionLanguage:String(row["Immersion Language"]||""),
            prerequisites:    String(row["Prerequisites"]||"").split(",").map(s=>s.trim().toUpperCase()).filter(Boolean),
            active:           String(row["Active"]||"yes").toLowerCase()!=="no",
          };
          batch.set(fsCol(schoolId,"courses").doc(code), data, { merge:true });
          count++;
        });
        await batch.commit(); await loadCourses();
        setImportMsg(`✓ Imported ${count} courses.`);
      } catch(err) { setImportMsg("Import failed: " + err.message); }
    };
    reader.readAsArrayBuffer(file); e.target.value = "";
  }

  const color = TOP_CAT_COLORS[selTop];

  return (
    <div style={{ display:"flex", height:"calc(100vh - 48px)", overflow:"hidden" }}>

      {/* LEFT: Category tree */}
      <div style={{ width:200, background:"white", borderRight:"1px solid #e0e8f0", overflowY:"auto", flexShrink:0 }}>
        <div style={{ padding:"10px 14px 8px", borderBottom:"1px solid #e0e8f0" }}>
          <div className="section-title">Categories</div>
        </div>
        {TOP_CATS.map(top => {
          const tc   = TOP_CAT_COLORS[top];
          const subs = [...new Set(courses.filter(c=>c.topCategory===top).map(c=>c.subcategory).filter(Boolean))].sort();
          const active = selTop === top;
          return (
            <div key={top}>
              <button onClick={() => { setSelTop(top); setSelSub(null); setEditId(null); }}
                style={{ width:"100%", textAlign:"left", padding:"8px 14px", border:"none", cursor:"pointer",
                  borderLeft: `3px solid ${active && selSub===null ? tc : "transparent"}`,
                  background: active && selSub===null ? tc+"15" : "white",
                  fontSize:12, fontWeight:700, color:tc }}>
                {TOP_CAT_LABELS[top]}
                <span style={{ fontSize:9, color:"#aab", marginLeft:5 }}>
                  ({courses.filter(c=>c.topCategory===top).length})
                </span>
              </button>
              {active && subs.map(sub => (
                <button key={sub} onClick={() => { setSelSub(sub); setEditId(null); }}
                  style={{ width:"100%", textAlign:"left", padding:"5px 14px 5px 26px", border:"none", cursor:"pointer",
                    borderLeft: `3px solid ${selSub===sub ? tc : "transparent"}`,
                    background: selSub===sub ? tc+"0e" : "white",
                    fontSize:11, color: selSub===sub ? tc : "#6b7280" }}>
                  {sub}
                  <span style={{ fontSize:9, color:"#b0bec8", marginLeft:4 }}>
                    ({courses.filter(c=>c.topCategory===top&&c.subcategory===sub).length})
                  </span>
                </button>
              ))}
            </div>
          );
        })}
      </div>

      {/* CENTER: Course list */}
      <div style={{ flex:1, overflowY:"auto", padding:18, background:"#f8fafc" }}>

        {/* ── Toolbar ── */}
        <div className="flb" style={{ marginBottom:14, flexWrap:"wrap", gap:8, alignItems:"center" }}>
          <div>
            <div style={{ fontSize:15, fontWeight:"bold", color:"#1e3a5f" }}>
              {showAll ? "All Courses" : `${TOP_CAT_LABELS[selTop]}${selSub ? ` · ${selSub}` : ""}`}
            </div>
            <div style={{ fontSize:11, color:"#8a9aaa" }}>{visibleCourses.length} course{visibleCourses.length!==1?"s":""}</div>
          </div>
          <div className="fla" style={{ gap:7, flexWrap:"wrap", alignItems:"center" }}>

            {/* Show All toggle */}
            <button onClick={() => setShowAll(v => !v)}
              className={showAll ? "btn btn-primary" : "btn btn-secondary"}
              style={{ fontSize:11 }}>
              {showAll ? "✓ All" : "Show All"}
            </button>

            {/* Cards / List toggle */}
            <div style={{ display:"flex", border:"1px solid #c0d0e0", borderRadius:5, overflow:"hidden" }}>
              {[["cards","⊞ Cards"],["list","≡ List"]].map(([m, label], i) => (
                <button key={m} onClick={() => setViewMode(m)}
                  style={{ padding:"4px 11px", fontSize:11, border:"none", cursor:"pointer",
                    borderLeft: i > 0 ? "1px solid #c0d0e0" : "none",
                    background: viewMode === m ? "#1e3a5f" : "white",
                    color:      viewMode === m ? "white"   : "#6b7280" }}>
                  {label}
                </button>
              ))}
            </div>

            <button className="btn btn-secondary" style={{ fontSize:11 }} onClick={exportCourses}>⬇ Export XLSX</button>
            <label className="btn btn-secondary" style={{ fontSize:11, cursor:"pointer" }}>
              ⬆ Import XLSX
              <input type="file" accept=".xlsx,.xls" onChange={importCourses} style={{ display:"none" }} />
            </label>
            <button className="btn btn-primary" style={{ fontSize:11 }} onClick={openNew}>+ Add Course</button>
          </div>
        </div>

        {importMsg && (
          <div style={{ marginBottom:12, fontSize:11, padding:"5px 10px", borderRadius:4,
            background: importMsg.startsWith("✓") ? "#f0fdf4" : "#fff5f5",
            color:      importMsg.startsWith("✓") ? "#15803d" : "#b91c1c",
            border:    `1px solid ${importMsg.startsWith("✓") ? "#bbf7d0" : "#fecaca"}` }}>
            {importMsg} <button style={{ background:"none", border:"none", cursor:"pointer", marginLeft:8, fontSize:11 }} onClick={() => setImportMsg("")}>✕</button>
          </div>
        )}

        {loading
          ? <div style={{ textAlign:"center", color:"#8a9aaa", fontSize:12, paddingTop:48 }}>Loading courses…</div>
          : visibleCourses.length === 0
          ? <div style={{ textAlign:"center", color:"#8a9aaa", fontSize:13, paddingTop:48 }}>
              No courses in this category yet.
              <div style={{ marginTop:12 }}><button className="btn btn-primary" onClick={openNew}>+ Add First Course</button></div>
            </div>

          : viewMode === "list"
          /* ── LIST / SPREADSHEET VIEW ─────────────────────────────── */
          ? (() => {
              const groups = buildGroups(visibleCourses);
              return (
                <div style={{ background:"white", borderRadius:8, border:"1px solid #e0e8f0", overflow:"hidden" }}>
                  <table style={{ width:"100%", borderCollapse:"collapse", fontSize:11 }}>
                    <thead>
                      <tr style={{ background:"#f0f4f8", borderBottom:"2px solid #c8d4e0" }}>
                        <th style={thStyle}>Code</th>
                        <th style={{ ...thStyle, minWidth:180 }}>Name</th>
                        {showAll && <th style={thStyle}>Category</th>}
                        <th style={thStyle}>Subcategory</th>
                        <th style={thStyle}>Gr</th>
                        <th style={thStyle}>Blk</th>
                        <th style={{ ...thStyle, width:62 }}>Seats</th>
                        <th style={thStyle}>Active</th>
                        <th style={{ ...thStyle, width:32 }}></th>
                        <th style={{ ...thStyle, width:32 }}></th>
                      </tr>
                    </thead>
                    <tbody>
                      {groups.map(({ header, courses: grpCs, color: grpColor }) => (
                        <React.Fragment key={header || "all"}>
                          {header && (
                            <tr>
                              <td colSpan={showAll ? 10 : 9}
                                style={{ padding:"7px 12px", fontSize:10, fontWeight:"bold",
                                  textTransform:"uppercase", letterSpacing:0.5,
                                  color: grpColor, background: grpColor + "0d",
                                  borderBottom:"1px solid " + grpColor + "33" }}>
                                {header}
                                <span style={{ fontWeight:"normal", marginLeft:6, color:"#aab" }}>({grpCs.length})</span>
                              </td>
                            </tr>
                          )}
                          {grpCs.map((c, i) => {
                            const rowColor = TOP_CAT_COLORS[c.topCategory] || "#333";
                            return (
                              <tr key={c._id} style={{
                                background: editId === c._id ? "#eef3ff" : i % 2 === 0 ? "white" : "#fafcff",
                                opacity: c.active ? 1 : 0.52,
                                borderBottom:"1px solid #eef2f6" }}>

                                {/* Code */}
                                <td style={{ ...tdStyle, fontFamily:"monospace", fontWeight:"bold",
                                  color: rowColor, cursor:"pointer", whiteSpace:"nowrap" }}
                                  onClick={() => openEdit(c)}>
                                  {c.code}
                                </td>

                                {/* Name — inline editable */}
                                <td style={{ ...tdStyle, minWidth:180 }}
                                  onClick={() => inlineEdit?.id !== c._id && setInlineEdit({ id:c._id, field:"name", val:c.name })}>
                                  {inlineEdit?.id === c._id && inlineEdit.field === "name"
                                    ? <input autoFocus value={inlineEdit.val}
                                        onChange={e => setInlineEdit(ie => ({ ...ie, val:e.target.value }))}
                                        onBlur={() => saveInline(c._id, "name", inlineEdit.val)}
                                        onKeyDown={e => {
                                          if (e.key === "Enter")  saveInline(c._id, "name", inlineEdit.val);
                                          if (e.key === "Escape") setInlineEdit(null);
                                        }}
                                        style={{ width:"100%", border:"1px solid #4a90d9", borderRadius:3,
                                          padding:"2px 5px", fontSize:11, background:"#f0f7ff", outline:"none" }} />
                                    : <span style={{ cursor:"text", display:"block" }}>{c.name}</span>
                                  }
                                </td>

                                {/* Category badge (show-all only) */}
                                {showAll && (
                                  <td style={tdStyle}>
                                    <span style={{ fontSize:10, padding:"1px 6px", borderRadius:3, whiteSpace:"nowrap",
                                      background: rowColor + "18", color: rowColor, fontWeight:600 }}>
                                      {TOP_CAT_LABELS[c.topCategory]}
                                    </span>
                                  </td>
                                )}

                                {/* Subcategory — inline editable */}
                                <td style={{ ...tdStyle, color:"#6b7280" }}
                                  onClick={() => inlineEdit?.id !== c._id && setInlineEdit({ id:c._id, field:"subcategory", val:c.subcategory||"" })}>
                                  {inlineEdit?.id === c._id && inlineEdit.field === "subcategory"
                                    ? <input autoFocus value={inlineEdit.val}
                                        onChange={e => setInlineEdit(ie => ({ ...ie, val:e.target.value }))}
                                        onBlur={() => saveInline(c._id, "subcategory", inlineEdit.val)}
                                        onKeyDown={e => {
                                          if (e.key === "Enter")  saveInline(c._id, "subcategory", inlineEdit.val);
                                          if (e.key === "Escape") setInlineEdit(null);
                                        }}
                                        style={{ width:"100%", border:"1px solid #4a90d9", borderRadius:3,
                                          padding:"2px 5px", fontSize:11, background:"#f0f7ff", outline:"none" }} />
                                    : <span style={{ cursor:"text", display:"block", color: c.subcategory ? "#6b7280" : "#c0c8d0" }}>
                                        {c.subcategory || "—"}
                                      </span>
                                  }
                                </td>

                                {/* Grades */}
                                <td style={{ ...tdStyle, whiteSpace:"nowrap", color:"#5a7a9a" }}>
                                  {(c.grades||[]).join(", ")}
                                </td>

                                {/* Blocks — inline select */}
                                <td style={tdStyle}>
                                  <select value={c.blocks||"either"}
                                    onChange={e => saveInline(c._id, "blocks", e.target.value)}
                                    style={{ border:"1px solid #e0e8f0", borderRadius:3, fontSize:11,
                                      padding:"1px 3px", background:"transparent", color:"#5a7a9a", cursor:"pointer" }}>
                                    {BLOCK_OPTIONS.map(b => <option key={b} value={b}>{b}</option>)}
                                  </select>
                                </td>

                                {/* Seats — inline editable */}
                                <td style={{ ...tdStyle, width:62 }}
                                  onClick={() => inlineEdit?.id !== c._id && setInlineEdit({ id:c._id, field:"seats", val:c.seats })}>
                                  {inlineEdit?.id === c._id && inlineEdit.field === "seats"
                                    ? <input autoFocus type="number" min={1} value={inlineEdit.val}
                                        onChange={e => setInlineEdit(ie => ({ ...ie, val:e.target.value }))}
                                        onBlur={() => saveInline(c._id, "seats", parseInt(inlineEdit.val)||28)}
                                        onKeyDown={e => {
                                          if (e.key === "Enter")  saveInline(c._id, "seats", parseInt(inlineEdit.val)||28);
                                          if (e.key === "Escape") setInlineEdit(null);
                                        }}
                                        style={{ width:50, border:"1px solid #4a90d9", borderRadius:3,
                                          padding:"2px 4px", fontSize:11, background:"#f0f7ff", outline:"none" }} />
                                    : <span style={{ cursor:"text", display:"block" }}>{c.seats}</span>
                                  }
                                </td>

                                {/* Active toggle */}
                                <td style={{ ...tdStyle, textAlign:"center" }}>
                                  <button onClick={() => toggleActive(c)}
                                    style={{ fontSize:10, padding:"1px 7px", borderRadius:3, cursor:"pointer", border:"1px solid",
                                      background:   c.active ? "#d1fae5" : "#f3f4f6",
                                      color:        c.active ? "#065f46" : "#6b7280",
                                      borderColor:  c.active ? "#a7f3d0" : "#d1d5db" }}>
                                    {c.active ? "On" : "Off"}
                                  </button>
                                </td>

                                {/* Open detail editor */}
                                <td style={{ ...tdStyle, textAlign:"center" }}>
                                  <button onClick={() => openEdit(c)}
                                    title="Open full editor"
                                    style={{ background:"none", border:"none", cursor:"pointer", fontSize:14,
                                      color: editId === c._id ? "#4a90d9" : "#c0ccd8", padding:"0 2px" }}>
                                    ✎
                                  </button>
                                </td>
                                {/* Delete */}
                                <td style={{ ...tdStyle, textAlign:"center" }}>
                                  <button onClick={() => deleteCourse(c._id)}
                                    title="Delete course"
                                    style={{ background:"none", border:"none", cursor:"pointer", fontSize:13,
                                      color:"#d0c0c0", padding:"0 2px" }}
                                    onMouseEnter={e => e.currentTarget.style.color="#b91c1c"}
                                    onMouseLeave={e => e.currentTarget.style.color="#d0c0c0"}>
                                    🗑
                                  </button>
                                </td>
                              </tr>
                            );
                          })}
                        </React.Fragment>
                      ))}
                    </tbody>
                  </table>
                </div>
              );
            })()

          /* ── CARDS VIEW ──────────────────────────────────────────── */
          : (() => {
              const groups = buildGroups(visibleCourses);
              return groups.map(({ header, courses: grpCs, color: grpColor }) => (
                <div key={header || "all"} style={{ marginBottom: header ? 24 : 0 }}>
                  {header && (
                    <div style={{ fontSize:11, fontWeight:"bold", color: grpColor,
                      textTransform:"uppercase", letterSpacing:0.7,
                      marginBottom:10, paddingBottom:6,
                      borderBottom:`2px solid ${grpColor}30` }}>
                      {header}
                      <span style={{ fontSize:10, fontWeight:"normal", color:"#aab", marginLeft:6 }}>({grpCs.length})</span>
                    </div>
                  )}
                  <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(230px,1fr))", gap:10 }}>
                    {grpCs.map(c => (
                      <div key={c._id} className="card" onClick={() => openEdit(c)}
                        style={{ cursor:"pointer", borderLeft:`4px solid ${c.active ? grpColor : "#d0d0d0"}`,
                          opacity: c.active ? 1 : 0.58, background: c.active ? "white" : "#fafafa" }}>
                        <div className="flb">
                          <div>
                            <div style={{ fontSize:10, fontWeight:"bold", color:grpColor, fontFamily:"monospace" }}>{c.code}</div>
                            <div style={{ fontSize:12, fontWeight:"bold", color:"#1e2a3a", marginTop:1, lineHeight:1.3 }}>{c.name}</div>
                          </div>
                          <button onClick={e => { e.stopPropagation(); toggleActive(c); }}
                            className="badge" style={{ cursor:"pointer", border:"none",
                              background: c.active ? "#d1fae5" : "#f0f0f0",
                              color:      c.active ? "#065f46" : "#888" }}>
                            {c.active ? "Active" : "Off"}
                          </button>
                        </div>
                        <div className="fl" style={{ gap:5, marginTop:8, flexWrap:"wrap" }}>
                          <span className="badge" style={{ background:"#f0f4f8", color:"#5a7a9a" }}>Gr {(c.grades||[]).join(",")}</span>
                          <span className="badge" style={{ background:"#f0f4f8", color:"#5a7a9a" }}>{c.blocks}</span>
                          <span className="badge" style={{ background:"#f0f4f8", color:"#5a7a9a" }}>{c.seats} seats</span>
                          {c.approvalRequired && <span className="badge" style={{ background:"#fef3c7", color:"#92400e" }}>Approval ✓</span>}
                          {c.immersionLanguage && <span className="badge" style={{ background:"#fee2e2", color:"#991b1b" }}>{c.immersionLanguage}</span>}
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              ));
            })()
        }
      </div>

      {/* RIGHT: Edit panel */}
      {editId && (
        <div style={{ width:310, borderLeft:"1px solid #e0e8f0", background:"white", overflowY:"auto", padding:16, flexShrink:0 }}>
          <div className="flb" style={{ marginBottom:14 }}>
            <div style={{ fontSize:13, fontWeight:"bold", color:"#1e3a5f" }}>
              {editId === "new" ? "New Course" : `Edit · ${form.code}`}
            </div>
            <button className="btn-ghost" onClick={() => setEditId(null)}>×</button>
          </div>
          <div className="fld" style={{ gap:10 }}>
            <div>
              <label className="field-label">Course Code *</label>
              <input className="field-input" value={form.code}
                onChange={e => fld("code", e.target.value.toUpperCase())}
                placeholder="e.g. ENG7H" disabled={editId !== "new"} />
            </div>
            <div>
              <label className="field-label">Course Name *</label>
              <input className="field-input" value={form.name}
                onChange={e => fld("name", e.target.value)} placeholder="e.g. English 7 Honors" />
            </div>
            <div>
              <label className="field-label">Top Category</label>
              <select className="field-input" value={form.topCategory} onChange={e => fld("topCategory", e.target.value)}>
                {TOP_CATS.map(t => <option key={t} value={t}>{TOP_CAT_LABELS[t]}</option>)}
              </select>
            </div>
            <div>
              <label className="field-label">Subcategory</label>
              <input className="field-input" value={form.subcategory}
                onChange={e => fld("subcategory", e.target.value)} placeholder="e.g. language-arts" />
            </div>
            <div>
              <label className="field-label">Blocks</label>
              <select className="field-input" value={form.blocks} onChange={e => fld("blocks", e.target.value)}>
                {BLOCK_OPTIONS.map(b => <option key={b} value={b}>{b}</option>)}
              </select>
            </div>
            <div>
              <label className="field-label">Grades</label>
              <div className="fl" style={{ gap:14 }}>
                {[7,8].map(g => (
                  <label key={g} className="toggle">
                    <input type="checkbox" checked={(form.grades||[]).includes(g)}
                      onChange={() => toggleArr("grades", g)} />
                    Grade {g}
                  </label>
                ))}
              </div>
            </div>
            <div>
              <label className="field-label">Semesters</label>
              <div className="fl" style={{ gap:14 }}>
                {["Fall","Spring"].map(s => (
                  <label key={s} className="toggle">
                    <input type="checkbox" checked={(form.semesters||[]).includes(s)}
                      onChange={() => toggleArr("semesters", s)} />
                    {s}
                  </label>
                ))}
              </div>
            </div>
            <div>
              <label className="field-label">Semesters Required</label>
              <select className="field-input" value={form.semestersRequired}
                onChange={e => fld("semestersRequired", parseInt(e.target.value))}>
                <option value={1}>1 semester</option>
                <option value={2}>2 semesters (full year)</option>
              </select>
            </div>
            <div>
              <label className="field-label">Seats</label>
              <input className="field-input" type="number" min={1}
                value={form.seats} onChange={e => fld("seats", parseInt(e.target.value)||0)} />
            </div>
            <div>
              <label className="field-label">Prerequisites (comma-separated codes)</label>
              <input className="field-input" value={(form.prerequisites||[]).join(",")}
                onChange={e => fld("prerequisites", e.target.value.split(",").map(s=>s.trim().toUpperCase()).filter(Boolean))}
                placeholder="e.g. SPAN1" />
            </div>
            <div>
              <label className="field-label">Immersion Language</label>
              <input className="field-input" value={form.immersionLanguage||""}
                onChange={e => fld("immersionLanguage", e.target.value)} placeholder="e.g. German" />
            </div>
            <div className="fld" style={{ gap:7, paddingTop:8, borderTop:"1px solid #e0e8f0" }}>
              {[["fullYear","Full Year"],["changeAtSemester","Change at Semester"],
                ["repeatable","Repeatable"],["approvalRequired","Approval Required"],["active","Active"]
              ].map(([k,label]) => (
                <label key={k} className="toggle">
                  <input type="checkbox" checked={!!form[k]} onChange={e => fld(k, e.target.checked)} />
                  {label}
                </label>
              ))}
            </div>
            <div className="fl" style={{ gap:7, paddingTop:4 }}>
              <button className="btn btn-primary" onClick={saveCourse} disabled={saving} style={{ flex:1 }}>
                {saving ? "Saving…" : "Save Course"}
              </button>
              <button className="btn btn-secondary" onClick={() => setEditId(null)}>Cancel</button>
              {editId !== "new" && (
                <button className="btn btn-secondary"
                  style={{ color:"#b91c1c", borderColor:"#fecaca" }}
                  onClick={() => deleteCourse(editId)}>
                  🗑
                </button>
              )}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// TEACHER SETUP
// ══════════════════════════════════════════════════════════════════════════════
const EMPTY_TEACHER = {
  teacherId:"", name:"", title:"", email:"", assignedCourses:[],
  maxSectionsPerBlock:{}, blocksAvailable:["A","B"], semestersAvailable:["Fall","Spring"],
  unavailable:[], lunchAssignment:1, active:true,
};

function TeacherSetup({ schoolId, schoolConfig }) {
  const [teachers,      setTeachers]      = useState([]);
  const [courses,       setCourses]       = useState([]);
  const [loading,       setLoading]       = useState(true);
  const [selId,         setSelId]         = useState(null);
  const [form,          setForm]          = useState(EMPTY_TEACHER);
  const [saving,        setSaving]        = useState(false);
  const [courseSearch,  setCourseSearch]  = useState("");

  useEffect(() => {
    Promise.all([
      fsGetAll(schoolId, "teachers"),
      fsCol(schoolId, "courses").where("active","==",true).get()
        .then(s => s.docs.map(d => ({ _id:d.id, ...d.data() })))
    ]).then(([t, c]) => { setTeachers(t); setCourses(c); setLoading(false); })
      .catch(e => { console.error(e); setLoading(false); });
  }, [schoolId]);

  function fld(k, v) { setForm(f => ({ ...f, [k]: v })); }
  function toggleArr(key, val) {
    setForm(f => {
      const arr = f[key]||[];
      return { ...f, [key]: arr.includes(val) ? arr.filter(x=>x!==val) : [...arr, val] };
    });
  }

  function openNew() { setForm({ ...EMPTY_TEACHER }); setCourseSearch(""); setSelId("new"); }
  function openEdit(t) {
    setForm({
      ...EMPTY_TEACHER, ...t,
      // migrate legacy field name
      assignedCourses: t.assignedCourses || t.qualifiedCourses || [],
    });
    setCourseSearch("");
    setSelId(t._id);
  }

  async function saveTeacher() {
    if (!form.teacherId.trim() || !form.name.trim()) { alert("Teacher ID and name required."); return; }
    setSaving(true);
    try {
      const id = form.teacherId.trim().toLowerCase().replace(/\s+/g, ".");
      await fsSave(schoolId, "teachers", id, { ...form, teacherId: id });
      setTeachers(await fsGetAll(schoolId, "teachers"));
      setSelId(null);
    } catch(e) { alert("Save failed: " + e.message); }
    setSaving(false);
  }

  function exportTeachers() {
    const blockKeys = Object.keys(schoolConfig?.blocks || { A:1, B:1 }).sort();
    const hdr = ["Teacher ID","Name","Title","Email","Assigned Courses",
                 ...blockKeys.map(b => `Max Sections (${b} days)`),
                 "Blocks Available","Semesters Available","Unavailable Periods","Lunch Assignment","Active"];
    const rows = [hdr, ...teachers.map(t => [
      t.teacherId, t.name, t.title||"", t.email||"",
      (t.assignedCourses || t.qualifiedCourses || []).join(","),
      ...blockKeys.map(b => (t.maxSectionsPerBlock||{})[b] ?? 5),
      (t.blocksAvailable||[]).join(","), (t.semestersAvailable||[]).join(","),
      (t.unavailable||[]).join(","), t.lunchAssignment||1, t.active?"yes":"no"
    ])];
    const ws = XLSX.utils.aoa_to_sheet(rows);
    ws["!cols"] = hdr.map(() => ({ wch: 20 }));
    const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Teachers");
    XLSX.writeFile(wb, "teachers-export.xlsx");
  }

  return (
    <div style={{ display:"flex", height:"calc(100vh - 48px)", overflow:"hidden" }}>

      {/* LEFT: Teacher list */}
      <div style={{ width:290, background:"white", borderRight:"1px solid #e0e8f0", display:"flex", flexDirection:"column", flexShrink:0 }}>
        <div className="flb" style={{ padding:"11px 14px", borderBottom:"1px solid #e0e8f0" }}>
          <div style={{ fontSize:13, fontWeight:"bold", color:"#1e3a5f" }}>
            Teachers <span style={{ fontSize:11, color:"#8a9aaa", fontWeight:"normal" }}>({teachers.length})</span>
          </div>
          <div className="fl" style={{ gap:6 }}>
            <button className="btn btn-secondary" style={{ fontSize:10, padding:"3px 8px" }} onClick={exportTeachers}>⬇ Export</button>
            <button className="btn btn-primary"   style={{ fontSize:11, padding:"4px 10px" }} onClick={openNew}>+ Add</button>
          </div>
        </div>
        <div style={{ flex:1, overflowY:"auto" }}>
          {loading
            ? <div style={{ padding:20, color:"#8a9aaa", fontSize:12, textAlign:"center" }}>Loading…</div>
            : teachers.length === 0
            ? <div style={{ padding:20, color:"#8a9aaa", fontSize:12, textAlign:"center" }}>No teachers yet.</div>
            : teachers.map(t => (
                <div key={t._id} onClick={() => openEdit(t)}
                  style={{ padding:"10px 14px", borderBottom:"1px solid #f0f4f8", cursor:"pointer",
                    borderLeft: `3px solid ${selId===t._id ? "#4a90d9" : "transparent"}`,
                    background: selId===t._id ? "#f0f7ff" : "white" }}>
                  <div style={{ fontSize:12, fontWeight:"bold", color:"#1e2a3a" }}>{t.name}</div>
                  <div style={{ fontSize:10, color:"#8a9aaa", marginTop:1 }}>
                    {t.title||"—"} · {(t.assignedCourses||t.qualifiedCourses||[]).length} assigned courses
                  </div>
                  <div className="fl" style={{ gap:4, marginTop:5, flexWrap:"wrap" }}>
                    {(t.assignedCourses||t.qualifiedCourses||[]).slice(0,6).map(c => (
                      <span key={c} className="badge" style={{ background:"#f0f4f8", color:"#5a7a9a", fontFamily:"monospace" }}>{c}</span>
                    ))}
                    {(t.assignedCourses||t.qualifiedCourses||[]).length > 6 && (
                      <span style={{ fontSize:9, color:"#8a9aaa" }}>+{(t.assignedCourses||t.qualifiedCourses).length-6}</span>
                    )}
                  </div>
                </div>
              ))
          }
        </div>
      </div>

      {/* RIGHT: Edit form */}
      <div style={{ flex:1, overflowY:"auto", padding:24, background:"#f8fafc" }}>
        {!selId
          ? <div className="flc fld" style={{ height:"100%", gap:12, color:"#8a9aaa" }}>
              <div style={{ fontSize:36 }}>👩‍🏫</div>
              <div style={{ fontSize:14 }}>Select a teacher to edit, or add a new one.</div>
              <button className="btn btn-primary" onClick={openNew}>+ Add Teacher</button>
            </div>
          : <div style={{ maxWidth:560 }}>
              <div className="flb" style={{ marginBottom:18 }}>
                <div style={{ fontSize:16, fontWeight:"bold", color:"#1e3a5f" }}>
                  {selId === "new" ? "New Teacher" : form.name}
                </div>
                <button className="btn btn-secondary" onClick={() => setSelId(null)}>Cancel</button>
              </div>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
                <div>
                  <label className="field-label">Teacher ID *</label>
                  <input className="field-input" value={form.teacherId}
                    onChange={e => fld("teacherId", e.target.value)}
                    placeholder="e.g. jane.doe" disabled={selId !== "new"} />
                </div>
                <div>
                  <label className="field-label">Full Name *</label>
                  <input className="field-input" value={form.name}
                    onChange={e => fld("name", e.target.value)} placeholder="Jane Doe" />
                </div>
                <div>
                  <label className="field-label">Title</label>
                  <input className="field-input" value={form.title||""}
                    onChange={e => fld("title", e.target.value)} placeholder="English 7 Teacher" />
                </div>
                <div>
                  <label className="field-label">Email</label>
                  <input className="field-input" type="email" value={form.email||""}
                    onChange={e => fld("email", e.target.value)} />
                </div>
                <div style={{ gridColumn:"1 / -1" }}>
                  <label className="field-label" style={{ marginBottom:6 }}>Max Sections per Block</label>
                  {(() => {
                    const blockKeys = Object.keys(schoolConfig?.blocks || { A:1, B:1 }).sort();
                    return (
                      <div className="fl" style={{ gap:10 }}>
                        {blockKeys.map(blk => (
                          <div key={blk} style={{ flex:1, minWidth:80 }}>
                            <label className="field-label" style={{ fontSize:9, marginBottom:3 }}>{blk} days</label>
                            <input className="field-input" type="number" min={0} max={12} step={0.5}
                              value={(form.maxSectionsPerBlock||{})[blk] ?? 5}
                              onChange={e => fld("maxSectionsPerBlock", {
                                ...(form.maxSectionsPerBlock||{}),
                                [blk]: parseFloat(e.target.value) || 0
                              })} />
                          </div>
                        ))}
                      </div>
                    );
                  })()}
                </div>
                <div>
                  <label className="field-label">Lunch Assignment</label>
                  <select className="field-input" value={form.lunchAssignment||1}
                    onChange={e => fld("lunchAssignment", parseInt(e.target.value))}>
                    <option value={1}>Lunch 1</option>
                    <option value={2}>Lunch 2</option>
                  </select>
                </div>
              </div>

              <div style={{ marginTop:14 }}>
                <label className="field-label">Unavailable Periods (e.g. A1, B5)</label>
                <input className="field-input"
                  value={(form.unavailable||[]).join(",")}
                  onChange={e => fld("unavailable", e.target.value.split(",").map(s=>s.trim().toUpperCase()).filter(Boolean))}
                  placeholder="A5,A6,B5,B6" />
              </div>

              <div style={{ marginTop:14 }}>
                <label className="field-label" style={{ marginBottom:8 }}>Assigned Courses</label>

                {/* Selected chips */}
                {(form.assignedCourses||[]).length > 0 && (
                  <div className="fl" style={{ flexWrap:"wrap", gap:4, marginBottom:8 }}>
                    {(form.assignedCourses||[]).map(code => {
                      const c = courses.find(x => x.code === code);
                      return (
                        <span key={code} style={{ display:"flex", alignItems:"center", gap:3,
                          background:"#e8f0fe", border:"1px solid #4a90d9", borderRadius:4,
                          padding:"2px 7px", fontSize:11 }}>
                          <span style={{ fontFamily:"monospace", fontWeight:"bold", color:"#1e5fa0", fontSize:10 }}>{code}</span>
                          {c && <span style={{ color:"#8a9aaa", fontSize:10 }}> {c.name}</span>}
                          <button onClick={() => toggleArr("assignedCourses", code)}
                            style={{ background:"none", border:"none", cursor:"pointer",
                              color:"#4a90d9", fontSize:14, padding:"0 0 0 2px", lineHeight:1 }}>×</button>
                        </span>
                      );
                    })}
                  </div>
                )}

                {courses.length === 0
                  ? <div style={{ fontSize:11, color:"#8a9aaa", fontStyle:"italic" }}>
                      No active courses found — add courses in the Courses tab first.
                    </div>
                  : <>
                      <input className="field-input" placeholder="Search courses to add…"
                        value={courseSearch} onChange={e => setCourseSearch(e.target.value)}
                        style={{ marginBottom:6 }} />
                      {(() => {
                        const q = courseSearch.toLowerCase();
                        const all = courses.slice().sort((a,b)=>a.code.localeCompare(b.code));
                        const filtered = q
                          ? all.filter(c => c.code.toLowerCase().includes(q) || c.name.toLowerCase().includes(q))
                          : all;
                        const assigned   = filtered.filter(c =>  (form.assignedCourses||[]).includes(c.code));
                        const unassigned = filtered.filter(c => !(form.assignedCourses||[]).includes(c.code));
                        const show = [...assigned, ...unassigned];
                        if (!show.length) return <div style={{ fontSize:11, color:"#8a9aaa", fontStyle:"italic" }}>No matching courses.</div>;
                        return (
                          <div style={{ maxHeight:220, overflowY:"auto", border:"1px solid #e0e8f0", borderRadius:6 }}>
                            {show.map((c, i) => {
                              const checked = (form.assignedCourses||[]).includes(c.code);
                              return (
                                <label key={c.code} style={{ display:"flex", alignItems:"center", gap:8,
                                  padding:"6px 10px", cursor:"pointer", fontSize:11,
                                  background: checked ? "#f0f7ff" : i%2===0 ? "white" : "#fafcff",
                                  borderBottom: i < show.length-1 ? "1px solid #f0f4f8" : "none" }}>
                                  <input type="checkbox" checked={checked}
                                    onChange={() => toggleArr("assignedCourses", c.code)}
                                    style={{ margin:0, width:13, height:13, flexShrink:0 }} />
                                  <span style={{ fontFamily:"monospace", fontWeight:"bold", fontSize:10,
                                    color: checked ? "#1e5fa0" : "#5a7a9a", minWidth:65 }}>{c.code}</span>
                                  <span style={{ color:"#6b7280", flex:1 }}>{c.name}</span>
                                  <span style={{ fontSize:9, color:"#b0bec8", whiteSpace:"nowrap" }}>
                                    {TOP_CAT_LABELS[c.topCategory] || c.topCategory}
                                  </span>
                                </label>
                              );
                            })}
                          </div>
                        );
                      })()}
                    </>
                }
              </div>

              <div style={{ marginTop:14 }}>
                <label className="toggle">
                  <input type="checkbox" checked={!!form.active} onChange={e => fld("active", e.target.checked)} />
                  Active
                </label>
              </div>

              <div className="fl" style={{ gap:8, marginTop:20 }}>
                <button className="btn btn-primary" onClick={saveTeacher} disabled={saving}>
                  {saving ? "Saving…" : "Save Teacher"}
                </button>
                <button className="btn btn-secondary" onClick={() => setSelId(null)}>Cancel</button>
              </div>
            </div>
        }
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// SCHEDULER (Schedule Validation) — existing logic, versions panel added
// ══════════════════════════════════════════════════════════════════════════════
function Scheduler({ schoolId }) {
  const [schedule,       setSchedule]       = useState(null);
  const [loadError,      setLoadError]      = useState(null);
  const [grade,          setGrade]          = useState(7);
  const [germanDLI,      setGermanDLI]      = useState(false);
  const [studentName,    setStudentName]    = useState("");
  const [s1Ids,          setS1Ids]          = useState(new Set());
  const [s2Ids,          setS2Ids]          = useState(new Set());
  const [s2Touched,      setS2Touched]      = useState(false);
  const [activeSemester, setActiveSemester] = useState(1);
  const [filterCat,      setFilterCat]      = useState("All");
  const [hoveredId,      setHoveredId]      = useState(null);
  const [showVersions,   setShowVersions]   = useState(false);

  const handleFile = useCallback((e) => {
    const file = e.target.files?.[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = (evt) => {
      try {
        const wb = XLSX.read(evt.target.result, { type:"array" });
        const parsed = parseScheduleFromWorkbook(wb);
        if (!parsed.length) { setLoadError("No class data found."); return; }
        setSchedule(parsed); setLoadError(null);
        setS1Ids(new Set()); setS2Ids(new Set()); setS2Touched(false);
      } catch(err) { setLoadError("Could not parse file: " + err.message); }
    };
    reader.readAsArrayBuffer(file);
  }, []);

  function loadVersion(classes) {
    setSchedule(classes); setLoadError(null);
    setS1Ids(new Set()); setS2Ids(new Set()); setS2Touched(false);
  }

  const requirements = useMemo(() => getRequirements(grade, germanDLI), [grade, germanDLI]);

  const annotated = useMemo(() => {
    if (!schedule) return [];
    return schedule.map(cls => ({ ...cls, classType: getClassType(cls, germanDLI) }));
  }, [schedule, germanDLI]);

  const byId = useMemo(() => {
    const map = {};
    for (const cls of annotated) map[cls.id] = cls;
    return map;
  }, [annotated]);

  // ── S2 PRE-SELECTION ────────────────────────────────────────────────────────
  const s2PreselectedIds = useMemo(() => {
    const ids = new Set();
    for (const id of s1Ids) {
      const cls = byId[id]; if (!cls) continue;
      if (isFullYear(cls.classType)) {
        ids.add(id);
        if (locksAB(cls.classType)) {
          const pair = annotated.find(c => c.period === getPairedPeriod(cls.period) && c.name === cls.name);
          if (pair) ids.add(pair.id);
        }
      }
    }
    return ids;
  }, [s1Ids, byId, annotated]);

  const effectiveS2Ids = useMemo(() => {
    if (s2Touched) return s2Ids;
    const merged = new Set([...s2Ids]);
    for (const id of s2PreselectedIds) merged.add(id);
    return merged;
  }, [s2Ids, s2PreselectedIds, s2Touched]);

  const activeIds     = activeSemester === 1 ? s1Ids : effectiveS2Ids;
  const setActiveIds  = activeSemester === 1 ? setS1Ids : setS2Ids;

  const activeLockedPeriods = useMemo(() => {
    const locked = new Set();
    for (const id of activeIds) {
      const cls = byId[id]; if (!cls) continue;
      locked.add(cls.period);
      if (locksAB(cls.classType)) locked.add(getPairedPeriod(cls.period));
    }
    return locked;
  }, [activeIds, byId]);

  const takenFamilies = useMemo(() => {
    const fams = new Set();
    for (const id of activeIds) {
      const cls = byId[id]; if (!cls) continue;
      fams.add(getNameFamily(cls.name));
    }
    return fams;
  }, [activeIds, byId]);

  const activeFilledCoreCategories = useMemo(() => {
    const cats = new Set();
    for (const id of activeIds) {
      const cls = byId[id]; if (!cls) continue;
      if (locksAB(cls.classType)) cats.add(cls.category);
    }
    return cats;
  }, [activeIds, byId]);

  function findCorePair(cls) {
    if (!locksAB(cls.classType)) return null;
    const pairedPeriod = getPairedPeriod(cls.period);
    return annotated.find(c => c.period === pairedPeriod && c.category === cls.category) || null;
  }

  function isVisible(cls) {
    if (filterCat !== "All" && cls.category !== filterCat) return false;
    const seats = cls[grade===7?"gr7":"gr8"];
    return seats > 0;
  }

  function getStatus(cls) {
    const seats = cls[grade===7?"gr7":"gr8"];
    if (seats === 0) return "grade-na";
    const otherIds = activeSemester === 1 ? effectiveS2Ids : s1Ids;
    if (otherIds.has(cls.id)) return "other-sem";
    if (activeIds.has(cls.id)) return activeSemester===2 && s2PreselectedIds.has(cls.id) && !s2Touched ? "preselected" : "selected";
    if (activeSemester===2 && !s2Touched && s2PreselectedIds.has(cls.id)) return "preselected";
    if (activeLockedPeriods.has(cls.period)) {
      const occupantId = [...activeIds].find(id => {
        const c = byId[id]; if (!c) return false;
        if (c.period === cls.period) return true;
        if (locksAB(c.classType) && getPairedPeriod(c.period) === cls.period) return true;
        return false;
      });
      if (occupantId !== undefined) return "blocked";
    }
    if (locksAB(cls.classType) && activeFilledCoreCategories.has(cls.category)) return "category-taken";
    const family = getNameFamily(cls.name);
    const n = getPeriodNumber(cls.period);
    if (takenFamilies.has(family)) {
      const occupant = [...activeIds].map(id=>byId[id]).filter(Boolean).find(c => getNameFamily(c.name)===family);
      if (occupant && getPeriodNumber(occupant.period) !== n) return "family-taken";
    }
    return "available";
  }

  function toggleClass(cls) {
    const status = getStatus(cls);
    if (status === "blocked" || status === "category-taken" || status === "grade-na" || status === "other-sem") return;

    if (activeSemester === 2 && !s2Touched) {
      setS2Touched(true);
      const initialized = new Set(s2PreselectedIds);
      const pair = findCorePair(cls);
      if (status === "preselected") {
        initialized.delete(cls.id);
        if (pair) initialized.delete(pair.id);
        setS2Ids(initialized); return;
      }
      if (status === "family-taken") return;
      initialized.add(cls.id);
      if (pair) {
        const fam = getNameFamily(cls.name);
        const n = getPeriodNumber(pair.period);
        const pairBlocked = [...initialized].some(id => {
          const c = byId[id]; if (!c) return false;
          return c.period === pair.period || (locksAB(c.classType) && getPairedPeriod(c.period)===pair.period);
        });
        if (!pairBlocked) initialized.add(pair.id);
      }
      setS2Ids(initialized); return;
    }

    const next = new Set(activeIds);
    const pair = findCorePair(cls);
    if (next.has(cls.id)) {
      next.delete(cls.id);
      if (pair) next.delete(pair.id);
    } else {
      if (status === "family-taken") return;
      next.add(cls.id);
      if (pair) {
        const fam = getNameFamily(cls.name);
        const n = getPeriodNumber(pair.period);
        const pairBlocked = [...next].some(id => {
          const c = byId[id]; if (!c) return false;
          return c.period === pair.period || (locksAB(c.classType) && getPairedPeriod(c.period)===pair.period);
        });
        if (!pairBlocked) next.add(pair.id);
      }
    }
    setActiveIds(next);
  }

  function changeGrade(g) {
    setGrade(g); setS1Ids(new Set()); setS2Ids(new Set()); setS2Touched(false);
  }

  const reqResults    = useMemo(() => evalRequirements(requirements, s1Ids, effectiveS2Ids, byId, germanDLI), [requirements, s1Ids, effectiveS2Ids, byId, germanDLI]);
  const s1Classes     = [...s1Ids].map(id => byId[id]).filter(Boolean);
  const s2Classes     = [...effectiveS2Ids].map(id => byId[id]).filter(Boolean);
  const s2Needs       = useMemo(() => requirements.filter(r => {
    if (r.type !== "req-sem" && r.type !== "req-year") return false;
    const inS2 = s2Classes.some(c => r.matchFn ? r.matchFn(c.name) : c.category === r.category);
    return !inS2;
  }).map(r => r.label), [requirements, s2Classes]);
  const stillAvailable = annotated.filter(c => isVisible(c) && getStatus(c) === "available");
  const metCount  = reqResults.filter(r => r.status === "met").length;
  const totalReqs = reqResults.length;

  const categories = useMemo(() => {
    if (!annotated.length) return ["All"];
    const cats = [...new Set(annotated.map(c=>c.category))].sort();
    return ["All", ...cats];
  }, [annotated]);

  const grouped = useMemo(() => {
    const g = {};
    for (const cls of annotated) {
      if (!isVisible(cls)) continue;
      if (!g[cls.category]) g[cls.category] = {};
      g[cls.category][cls.period] = cls;
    }
    return g;
  }, [annotated, filterCat, grade]);

  function typeBadge(cls) {
    const t = cls.classType;
    if (t === "core")          return { label:"Core · A+B",          color:"#2563eb" };
    if (t === "req-year")      return { label:"Required · full year", color:"#7c3aed" };
    if (t === "req-sem")       return { label:"Required · 1 sem",    color:"#d97706" };
    if (t === "elective-year") return { label:"Elective · full year", color:"#0891b2" };
    return                            { label:"Elective · 1 sem",    color:"#6b7280" };
  }

  // ── RENDER ─────────────────────────────────────────────────────────────────
  return (
    <div style={{ fontFamily:"'Palatino Linotype',Palatino,'Book Antiqua',serif", minHeight:"calc(100vh - 48px)", background:"#f4f6f9", color:"#1e2a3a" }}>

      {/* TOP BAR */}
      <div style={{ background:"#fff", borderBottom:"1px solid #dde3ec", padding:"11px 24px",
        display:"flex", alignItems:"center", gap:14, flexWrap:"wrap",
        boxShadow:"0 1px 4px rgba(0,0,0,0.05)" }}>

        <div>
          <div style={{ fontSize:14, fontWeight:"bold", color:"#1e3a5f" }}>Validate Schedule</div>
          <div style={{ fontSize:10, color:"#8a9aaa" }}>Lincoln Middle School</div>
        </div>
        <div style={{ flex:1 }} />

        <label style={{ cursor:"pointer", padding:"5px 12px", borderRadius:6,
          border:"1px dashed #4a90d9", background:"#f0f7ff", fontSize:11, color:"#1e5fa0",
          display:"flex", alignItems:"center", gap:6 }}>
          📂 {schedule ? "Reload Schedule" : "Load Schedule (.xlsx)"}
          <input type="file" accept=".xlsx,.xls" onChange={handleFile} style={{ display:"none" }} />
        </label>

        <button onClick={() => setShowVersions(v => !v)}
          style={{ padding:"5px 12px", borderRadius:6, fontSize:11, fontWeight:600,
            border: showVersions ? "1.5px solid #4a90d9" : "1px solid #c0d0e0",
            background: showVersions ? "#f0f7ff" : "white",
            color: showVersions ? "#1e5fa0" : "#5a7a9a", cursor:"pointer" }}>
          📁 History
        </button>

        {schedule && <>
          <div style={{ display:"flex", borderRadius:6, overflow:"hidden", border:"1px solid #c0d0e0" }}>
            {[7,8].map(g => (
              <button key={g} onClick={() => changeGrade(g)}
                style={{ padding:"5px 16px", background:grade===g?"#1e3a5f":"#f8fafc",
                  color:grade===g?"white":"#5a7a9a", border:"none", cursor:"pointer",
                  fontWeight:"bold", fontSize:12 }}>
                Grade {g}
              </button>
            ))}
          </div>

          <div style={{ display:"flex", borderRadius:6, overflow:"hidden", border:"2px solid #4a90d9" }}>
            {[1,2].map(s => (
              <button key={s} onClick={() => setActiveSemester(s)}
                style={{ padding:"5px 18px",
                  background:activeSemester===s?"#4a90d9":"#f0f7ff",
                  color:activeSemester===s?"white":"#1e5fa0",
                  border:"none", cursor:"pointer", fontSize:12, fontWeight:"bold" }}>
                Semester {s}
              </button>
            ))}
          </div>

          <label style={{ display:"flex", alignItems:"center", gap:5, fontSize:11, color:"#5a7a9a", cursor:"pointer" }}>
            <input type="checkbox" checked={germanDLI}
              onChange={e => { setGermanDLI(e.target.checked); setS1Ids(new Set()); setS2Ids(new Set()); setS2Touched(false); }}
              style={{ accentColor:"#dc2626" }} />
            German DLI
          </label>

          <input placeholder="Student name" value={studentName}
            onChange={e => setStudentName(e.target.value)}
            style={{ padding:"5px 10px", borderRadius:6, border:"1px solid #c0d0e0",
              background:"#f8fafc", color:"#1e2a3a", fontSize:12, width:160 }} />
        </>}
      </div>

      {loadError && (
        <div style={{ background:"#fff0f0", color:"#b91c1c", padding:"8px 24px", fontSize:12, borderBottom:"1px solid #fecaca" }}>
          ⚠ {loadError}
        </div>
      )}

      {/* S2 banner */}
      {schedule && activeSemester === 2 && (
        <div style={{ background:"#fffbeb", borderBottom:"1px solid #fde68a", padding:"7px 24px",
          fontSize:11, color:"#92400e", display:"flex", gap:16, alignItems:"center", flexWrap:"wrap" }}>
          <span>↩ <strong>Full-year classes from S1</strong> are pre-selected here. You can freely change, drop, or replace any of them.</span>
          {s2Needs.length > 0 && <span style={{ color:"#dc2626" }}>· Still needed in S2: <strong>{s2Needs.join(", ")}</strong></span>}
          {s2Needs.length === 0 && s1Classes.length > 0 && <span style={{ color:"#16a34a" }}>· All semester requirements covered ✓</span>}
        </div>
      )}

      {!schedule && !loadError && (
        <div style={{ display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", height:"70vh", gap:18 }}>
          <div style={{ fontSize:44 }}>📅</div>
          <div style={{ fontSize:20, color:"#1e3a5f" }}>Load a master schedule to begin</div>
          <div style={{ fontSize:12, color:"#8a9aaa", maxWidth:400, textAlign:"center" }}>
            Upload your Excel file, or load a saved version from History.
          </div>
          <label style={{ cursor:"pointer", padding:"10px 24px", borderRadius:8,
            border:"2px solid #4a90d9", background:"#f0f7ff", fontSize:13, color:"#1e5fa0" }}>
            📂 Choose Excel File
            <input type="file" accept=".xlsx,.xls" onChange={handleFile} style={{ display:"none" }} />
          </label>
        </div>
      )}

      {schedule && (
        <div style={{ display:"grid", gridTemplateColumns:"1fr 290px", minHeight:"calc(100vh - 100px)" }}>

          {/* LEFT */}
          <div style={{ padding:"14px 14px 14px 22px", overflowX:"auto", overflowY:"auto" }}>

            {/* Filter pills */}
            <div style={{ display:"flex", gap:5, flexWrap:"wrap", marginBottom:12 }}>
              {categories.map(cat => {
                const color  = catColor(cat);
                const active = filterCat === cat;
                return (
                  <button key={cat} onClick={() => setFilterCat(cat)}
                    style={{ padding:"2px 9px", borderRadius:20,
                      border: `1.5px solid ${active ? color : "#d0dae6"}`,
                      background: active ? color : "white",
                      color: active ? "white" : "#5a7a9a",
                      cursor:"pointer", fontSize:10, fontWeight:600 }}>
                    {cat}
                  </button>
                );
              })}
            </div>

            {/* Period headers */}
            <div style={{ display:"grid", gridTemplateColumns:"150px repeat(12, minmax(62px,1fr))", gap:2, marginBottom:4 }}>
              <div />
              {ALL_PERIODS.map(p => {
                const takenActive = activeLockedPeriods.has(p);
                const isA = p.endsWith("A");
                return (
                  <div key={p} style={{ textAlign:"center", padding:"4px 1px", borderRadius:3,
                    background: takenActive?"#fee2e2":isA?"#eff6ff":"#f0f9ff",
                    border:`1px solid ${takenActive?"#fca5a5":isA?"#bfdbfe":"#bae6fd"}`,
                    fontSize:10, fontWeight:"bold",
                    color: takenActive?"#dc2626":isA?"#1d4ed8":"#0369a1" }}>
                    <div>P{getPeriodNumber(p)}{isA?"A":"B"}</div>
                    {takenActive ? <div style={{ fontSize:8 }}>✗</div> : <div style={{ fontSize:8, opacity:0.4 }}>✓</div>}
                  </div>
                );
              })}
            </div>

            {/* Class rows */}
            {Object.entries(grouped).map(([cat, byPeriod]) => {
              const color    = catColor(cat);
              const isCoreRow   = CORE_CATEGORIES_7.includes(cat) || CORE_CATEGORIES_8.includes(cat);
              const isGermanRow = cat.toLowerCase().includes("german") && !cat.toLowerCase().includes("culture");
              return (
                <div key={cat} style={{ display:"grid", gridTemplateColumns:"150px repeat(12, minmax(62px,1fr))", gap:2, marginBottom:2, alignItems:"stretch" }}>
                  <div style={{ display:"flex", alignItems:"center", paddingRight:7, borderRight:`3px solid ${color}`, minHeight:54 }}>
                    <div>
                      <div style={{ fontSize:11, fontWeight:"bold", color, lineHeight:1.2 }}>{cat}</div>
                      {(isCoreRow || (isGermanRow && germanDLI)) &&
                        <span style={{ fontSize:8, background:color+"18", color, borderRadius:3, padding:"1px 4px", border:`1px solid ${color}33` }}>CORE · A+B</span>}
                      {cat==="German Culture" &&
                        <span style={{ fontSize:8, background:"#fef2f2", color:"#dc2626", borderRadius:3, padding:"1px 4px", border:"1px solid #fecaca" }}>DLI · 1 sem</span>}
                    </div>

                    const pair         = findCorePair(cls);

                    const isCore       = locksAB(cls.classType);

                    const s = {
                      available:        { bg:"white",     border:`1.5px solid ${color}`,     text:color,       cursor:"pointer"     },
                      selected:         { bg:color,       border:`1.5px solid ${color}`,     text:"white",     cursor:"pointer"     },

                    return (
                      <div key={period}

                        title={

                        {status==="other-sem"   && <div style={{ fontSize:8, color:s.text, marginTop:1 }}>{otherSemLabel}✓</div>}
                        {status==="family-taken"&& <div style={{ fontSize:7, color:s.text, marginTop:1 }}>duplicate</div>}
                      </div>
                    );
                  })}
                </div>
