                onChange={e => fld("subcategory", e.target.value)} placeholder="e.g. language-arts" />
            </div>
            {showBlocks && (
            <div>
              <label className="field-label">Blocks</label>
              <select className="field-input" value={form.blocks} onChange={e => fld("blocks", e.target.value)}>
                {blockOptions.map(b => <option key={b} value={b}>{b}</option>)}
              </select>
            </div>
            )}
            <div>
              <label className="field-label">Grades</label>
              <div className="fl" style={{ gap:14 }}>
                {[7,8].map(g => (
                  <label key={g} className="toggle">
                    <input type="checkbox" checked={(form.grades||[]).includes(g)}
                      onChange={() => toggleArr("grades", g)} />
                    Grade {g}
                  </label>
                ))}
              </div>
            </div>
            <div>
              <label className="field-label">Semesters</label>
              <div className="fl" style={{ gap:14 }}>
                {["Fall","Spring"].map(s => (
                  <label key={s} className="toggle">
                    <input type="checkbox" checked={(form.semesters||[]).includes(s)}
                      onChange={() => toggleArr("semesters", s)} />
                    {s}
                  </label>
                ))}
              </div>
            </div>
            <div>
              <label className="field-label">Seats</label>
              <input className="field-input" type="number" min={1}
                value={form.seats} onChange={e => fld("seats", parseInt(e.target.value)||0)} />
            </div>
            <div>
              <label className="field-label">Prerequisites (comma-separated codes)</label>
              <input className="field-input" value={(form.prerequisites||[]).join(",")}
                onChange={e => fld("prerequisites", e.target.value.split(",").map(s=>s.trim().toUpperCase()).filter(Boolean))}
                placeholder="e.g. SPAN1" />
            </div>
            <div>
              <label className="field-label">Immersion Language</label>
              <input className="field-input" value={form.immersionLanguage||""}
                onChange={e => fld("immersionLanguage", e.target.value)} placeholder="e.g. German" />
            </div>
            <div className="fld" style={{ gap:7, paddingTop:8, borderTop:"1px solid #e0e8f0" }}>
              {[["fullYear","Full Year"],["changeAtSemester","Change at Semester"],
                ["repeatable","Repeatable"],["approvalRequired","Approval Required"],["active","Active"]
              ].map(([k,label]) => (
                <label key={k} className="toggle">
                  <input type="checkbox" checked={!!form[k]} onChange={e => fld(k, e.target.checked)} />
                  {label}
                </label>
              ))}
            </div>
            <div className="fl" style={{ gap:7, paddingTop:4 }}>
              <button className="btn btn-primary" onClick={saveCourse} disabled={saving} className="flex-1">
                {saving ? "Saving…" : "Save Course"}
              </button>
              <button className="btn btn-secondary" onClick={() => setEditId(null)}>Cancel</button>
              {editId !== "new" && (
                <button className="btn btn-secondary"
                  style={{ color:"#b91c1c", borderColor:"#fecaca" }}
                  onClick={() => deleteCourse(editId)}>
                  🗑
                </button>
              )}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// TEACHER SETUP
// ══════════════════════════════════════════════════════════════════════════════
const EMPTY_TEACHER = {
  teacherId:"", name:"", title:"", email:"", assignedCourses:[],
  maxSectionsPerBlock:{}, blocksAvailable:["A","B"], semestersAvailable:["Fall","Spring"],
  unavailable:[], lunchAssignment:{}, hasPrepPeriod:true, active:true,
};

function TeacherSetup({ schoolId, schoolConfig }) {
  const [teachers,      setTeachers]      = useState([]);
  const [courses,       setCourses]       = useState([]);
  const [loading,       setLoading]       = useState(true);
  const [selId,         setSelId]         = useState(null);
  const [form,          setForm]          = useState(EMPTY_TEACHER);
  const [saving,        setSaving]        = useState(false);
  const [courseSearch,  setCourseSearch]  = useState("");
  const [importMsg,     setImportMsg]     = useState("");
  const [viewMode,      setViewMode]      = useState("cards");
  const [search,        setSearch]        = useState("");

  const visibleTeachers = useMemo(() => {
    const q = search.toLowerCase();
    return teachers
      .filter(t => !q
        || t.name.toLowerCase().includes(q)
        || (t.title||"").toLowerCase().includes(q)
        || (t.assignedCourses||[]).some(c => c.toLowerCase().includes(q)))
      .sort((a, b) => a.name.localeCompare(b.name));
  }, [teachers, search]);

  useEffect(() => {
    Promise.all([
      fsGetAll(schoolId, "teachers"),
      fsCol(schoolId, "courses").where("active","==",true).get()
        .then(s => s.docs.map(d => ({ _id:d.id, ...d.data() })))
    ]).then(([t, c]) => { setTeachers(t); setCourses(c); setLoading(false); })
      .catch(e => { console.error(e); setLoading(false); });
  }, [schoolId]);

  function fld(k, v) { setForm(f => ({ ...f, [k]: v })); }
  function toggleArr(key, val) {
    setForm(f => {
      const arr = f[key]||[];
      return { ...f, [key]: arr.includes(val) ? arr.filter(x=>x!==val) : [...arr, val] };
    });
  }

  function openNew() { setForm({ ...EMPTY_TEACHER }); setCourseSearch(""); setSelId("new"); }
  function openEdit(t) {
    // Normalize legacy lunchAssignment: integer → per-block map
    let lunchAssignment = t.lunchAssignment || {};
    if (typeof lunchAssignment === "number") {
      const blockKeys = Object.keys(schoolConfig?.blocks || { A:1, B:1 }).sort();
      lunchAssignment = Object.fromEntries(blockKeys.map(b => [b, lunchAssignment]));
    }
    setForm({
      ...EMPTY_TEACHER, ...t,
      assignedCourses: t.assignedCourses || t.qualifiedCourses || [],
      lunchAssignment,
    });
    setCourseSearch("");
    setSelId(t._id);
  }

  async function saveTeacher() {
    if (!form.teacherId.trim() || !form.name.trim()) { alert("Teacher ID and name required."); return; }
    setSaving(true);
    try {
      const id = form.teacherId.trim().toLowerCase().replace(/\s+/g, ".");
      await fsSave(schoolId, "teachers", id, { ...form, teacherId: id });
      setTeachers(await fsGetAll(schoolId, "teachers"));
      setSelId(null);
    } catch(e) { alert("Save failed: " + e.message); }
    setSaving(false);
  }

  async function toggleActive(t) {
    await fsUpdate(schoolId, "teachers", t._id, { active: !t.active });
    setTeachers(ts => ts.map(x => x._id === t._id ? { ...x, active: !t.active } : x));
  }

  function exportTeachers() {
    const blockKeys = Object.keys(schoolConfig?.blocks || { A:1, B:1 }).sort();
    const hdr = ["Teacher ID","Name","Title","Email","Assigned Courses",
                 ...blockKeys.map(b => `Max Sections (${b} days)`),
                 ...blockKeys.map(b => `Lunch (${b} days)`),
                 "Blocks Available","Semesters Available","Unavailable Periods","Has Prep Period","Active"];
    const rows = [hdr, ...teachers.map(t => {
      // Normalize legacy integer lunchAssignment for export
      const la = (typeof t.lunchAssignment === "number")
        ? Object.fromEntries(blockKeys.map(b => [b, t.lunchAssignment]))
        : (t.lunchAssignment || {});
      return [
        t.teacherId, t.name, t.title||"", t.email||"",
        (t.assignedCourses || t.qualifiedCourses || []).join(","),
        ...blockKeys.map(b => (t.maxSectionsPerBlock||{})[b] ?? 5),
        ...blockKeys.map(b => la[b] ?? 1),
        (t.blocksAvailable||[]).join(","), (t.semestersAvailable||[]).join(","),
        (t.unavailable||[]).join(","), t.hasPrepPeriod !== false ? "yes" : "no", t.active?"yes":"no",
      ];
    })];
    const ws = XLSX.utils.aoa_to_sheet(rows);
    ws["!cols"] = hdr.map(() => ({ wch: 20 }));
    const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Teachers");
    XLSX.writeFile(wb, "teachers-export.xlsx");
  }

  async function importTeachers(e) {
    const file = e.target.files?.[0]; if (!file) return;
    e.target.value = "";
    setImportMsg("Importing…");
    try {
      const buf = await file.arrayBuffer();
      const wb  = XLSX.read(buf, { type: "array" });
      const ws  = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { defval: "" });

      if (!rows.length) { setImportMsg("No data rows found."); return; }

      // Detect block columns from the header: "Max Sections (X days)"
      const blockKeys = Object.keys(rows[0])
        .map(h => { const m = h.match(/^Max Sections \((\w+) days\)$/); return m ? m[1] : null; })
        .filter(Boolean);

      const split = v => String(v||"").split(",").map(s=>s.trim()).filter(Boolean);

      const batch = db.batch();
      let count = 0;
      rows.forEach(r => {
        const id = String(r["Teacher ID"]||"").trim().toLowerCase().replace(/\s+/g,".");
        if (!id) return;

        const maxSectionsPerBlock = {};
        blockKeys.forEach(b => {
          const val = parseInt(r[`Max Sections (${b} days)`]);
          maxSectionsPerBlock[b] = isNaN(val) ? 5 : val;
        });

        // Build per-block lunch map; fall back to legacy "Lunch Assignment" column
        const lunchAssignment = {};
        const legacyLunch = parseInt(r["Lunch Assignment"]) || 1;
        blockKeys.forEach(b => {
          const col = `Lunch (${b} days)`;
          lunchAssignment[b] = r[col] !== undefined && r[col] !== ""
            ? (parseInt(r[col]) || 1)
            : legacyLunch;
        });

        const teacher = {
          teacherId:          id,
          name:               String(r["Name"]||"").trim(),
          title:              String(r["Title"]||"").trim(),
          email:              String(r["Email"]||"").trim(),
          assignedCourses:    split(r["Assigned Courses"]),
          maxSectionsPerBlock,
          lunchAssignment,
          blocksAvailable:    split(r["Blocks Available"]),
          semestersAvailable: split(r["Semesters Available"]),
          unavailable:        split(r["Unavailable Periods"]),
          hasPrepPeriod:      String(r["Has Prep Period"]||"yes").trim().toLowerCase() !== "no",
          active:             String(r["Active"]||"yes").trim().toLowerCase() !== "no",
        };
        batch.set(fsCol(schoolId, "teachers").doc(id), teacher, { merge: true });
        count++;
      });

      await batch.commit();
      await fsGetAll(schoolId, "teachers").then(setTeachers);
      setImportMsg(`✓ Imported ${count} teacher${count !== 1 ? "s" : ""}.`);
    } catch(err) { setImportMsg("Import failed: " + err.message); }
  }

  const thStyle = { padding:"7px 10px", textAlign:"left", fontSize:10, fontWeight:"bold",
    color:"#5a7a9a", textTransform:"uppercase", letterSpacing:0.4, whiteSpace:"nowrap" };
  const tdStyle = { padding:"5px 10px", verticalAlign:"middle", fontSize:11 };

  return (
    <div className="page-fill" style={{ flexDirection:"row" }}>

      {/* CENTER: cards / list */}
      <div style={{ flex:1, overflowY:"auto", padding:18, background:"#f8fafc" }}>

        {/* ── Toolbar ── */}
        <div className="flb" style={{ marginBottom:14, flexWrap:"wrap", gap:8, alignItems:"center" }}>
          <div>
            <div style={{ fontSize:15, fontWeight:"bold", color:"#1e3a5f" }}>Teachers</div>
            <div style={{ fontSize:11, color:"#8a9aaa" }}>
              {visibleTeachers.length} teacher{visibleTeachers.length !== 1 ? "s" : ""}
              {search ? ` matching "${search}"` : ` (${teachers.length} total)`}
            </div>
          </div>
          <div className="fla" style={{ gap:7, flexWrap:"wrap", alignItems:"center" }}>
            <input className="field-input"
              style={{ width:180, fontSize:11, padding:"4px 9px" }}
              placeholder="Search name, title, course…"
              value={search}
              onChange={e => setSearch(e.target.value)} />
            <div style={{ display:"flex", border:"1px solid #c0d0e0", borderRadius:5, overflow:"hidden" }}>
              {[["cards","⊞ Cards"],["list","≡ List"]].map(([m, label], i) => (
                <button key={m} onClick={() => setViewMode(m)}
                  style={{ padding:"4px 11px", fontSize:11, border:"none", cursor:"pointer",
                    borderLeft: i > 0 ? "1px solid #c0d0e0" : "none",
                    background: viewMode === m ? "#1e3a5f" : "white",
                    color:      viewMode === m ? "white"   : "#6b7280" }}>
                  {label}
                </button>
              ))}
            </div>
            <button className="btn btn-secondary" style={{ fontSize:11 }} onClick={exportTeachers}>⬇ Export</button>
            <label className="btn btn-secondary" style={{ fontSize:11, cursor:"pointer" }}>
              ⬆ Import
              <input type="file" accept=".xlsx,.xls" onChange={importTeachers} style={{ display:"none" }} />
            </label>
            <button className="btn btn-primary" style={{ fontSize:11 }} onClick={openNew}>+ Add Teacher</button>
          </div>
        </div>

        {importMsg && (
          <div style={{ marginBottom:12, fontSize:11, padding:"5px 10px", borderRadius:4,
            background: importMsg.startsWith("✓") ? "#f0fdf4" : importMsg === "Importing…" ? "#f0f7ff" : "#fff5f5",
            color:      importMsg.startsWith("✓") ? "#15803d" : importMsg === "Importing…" ? "#1e3a5f" : "#b91c1c",
            border: `1px solid ${importMsg.startsWith("✓") ? "#bbf7d0" : importMsg === "Importing…" ? "#bfdbfe" : "#fecaca"}` }}>
          {importMsg}
          {importMsg !== "Importing…" &&
            <button style={{ background:"none", border:"none", cursor:"pointer", marginLeft:8, fontSize:11 }} onClick={() => setImportMsg("")}>✕</button>}
          </div>
        )}

        {loading
          ? <div className="text-center-muted" style={{ paddingTop:"3rem" }}>Loading teachers…</div>
          : visibleTeachers.length === 0
          ? <div style={{ textAlign:"center", color:"#8a9aaa", fontSize:13, paddingTop:48 }}>
              {search ? `No teachers match "${search}".` : "No teachers yet."}
              {!search && <div style={{ marginTop:12 }}><button className="btn btn-primary" onClick={openNew}>+ Add First Teacher</button></div>}
            </div>

          : viewMode === "list"
          /* ── LIST VIEW ─────────────────────────────────────────── */
          ? (
            <div style={{ background:"white", borderRadius:8, border:"1px solid #e0e8f0", overflow:"hidden" }}>
              <table style={{ width:"100%", borderCollapse:"collapse", fontSize:11 }}>
                <thead>
                  <tr style={{ background:"#f0f4f8", borderBottom:"2px solid #c8d4e0" }}>
                    <th style={thStyle}>ID</th>
                    <th style={{ ...thStyle, minWidth:160 }}>Name</th>
                    <th style={thStyle}>Title</th>
                    <th style={thStyle}>Assigned Courses</th>
                    <th style={thStyle}>Blocks</th>
                    <th style={{ ...thStyle, width:64 }}>Active</th>
                    <th style={{ ...thStyle, width:32 }}></th>
                  </tr>
                </thead>
                <tbody>
                  {visibleTeachers.map((t, i) => (
                    <tr key={t._id} style={{
                      background: selId===t._id ? "#eef3ff" : i%2===0 ? "white" : "#fafcff",
                      opacity: t.active ? 1 : 0.52,
                      borderBottom:"1px solid #eef2f6" }}>
                      <td style={{ ...tdStyle, fontFamily:"monospace", fontWeight:"bold", color:"#4a90d9", cursor:"pointer", whiteSpace:"nowrap" }}
                        onClick={() => openEdit(t)}>
                        {t.teacherId}
                      </td>
                      <td style={{ ...tdStyle, minWidth:160, fontWeight:"bold", color:"#1e2a3a", cursor:"pointer" }}
                        onClick={() => openEdit(t)}>
                        {t.name}
                      </td>
                      <td style={{ ...tdStyle, color:"#6b7280" }}>{t.title||"—"}</td>
                      <td style={tdStyle}>
                        <div className="fl" style={{ gap:3, flexWrap:"wrap" }}>
                          {(t.assignedCourses||t.qualifiedCourses||[]).slice(0,6).map(code => (
                            <span key={code} className="badge"
                              style={{ background:"#f0f4f8", color:"#5a7a9a", fontFamily:"monospace", padding:"1px 5px" }}>
                              {code}
                            </span>
                          ))}
                          {(t.assignedCourses||t.qualifiedCourses||[]).length > 6 &&
                            <span style={{ fontSize:9, color:"#8a9aaa" }}>+{(t.assignedCourses||t.qualifiedCourses||[]).length-6}</span>}
                        </div>
                      </td>
                      <td style={{ ...tdStyle, color:"#5a7a9a", whiteSpace:"nowrap" }}>
                        {(t.blocksAvailable||[]).join(", ")}
                      </td>
                      <td style={{ ...tdStyle, textAlign:"center" }}>
                        <button onClick={() => toggleActive(t)}
                          style={{ fontSize:10, padding:"1px 7px", borderRadius:3, cursor:"pointer", border:"1px solid",
                            background:   t.active ? "#d1fae5" : "#f3f4f6",
                            color:        t.active ? "#065f46" : "#6b7280",
                            borderColor:  t.active ? "#a7f3d0" : "#d1d5db" }}>
                          {t.active ? "On" : "Off"}
                        </button>
                      </td>
                      <td style={{ ...tdStyle, textAlign:"center" }}>
                        <button onClick={() => openEdit(t)} title="Edit"
                          style={{ background:"none", border:"none", cursor:"pointer", fontSize:14,
                            color: selId===t._id ? "#4a90d9" : "#c0ccd8", padding:"0 2px" }}>
                          ✎
                        </button>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )

          /* ── CARDS VIEW ─────────────────────────────────────────── */
          : (
            <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(240px,1fr))", gap:10 }}>
              {visibleTeachers.map(t => (
                <div key={t._id} className="card" onClick={() => openEdit(t)}
                  style={{ cursor:"pointer",
                    borderLeft: `4px solid ${t.active ? "#4a90d9" : "#d0d0d0"}`,
                    outline: selId===t._id ? "2px solid #4a90d9" : "none",
                    opacity: t.active ? 1 : 0.58,
                    background: t.active ? "white" : "#fafafa" }}>
                  <div className="flb">
                    <div style={{ flex:1, minWidth:0 }}>
                      <div style={{ fontSize:12, fontWeight:"bold", color:"#1e2a3a", lineHeight:1.3 }}>{t.name}</div>
                      {t.title && <div style={{ fontSize:10, color:"#8a9aaa", marginTop:1 }}>{t.title}</div>}
                    </div>
                    <button onClick={e => { e.stopPropagation(); toggleActive(t); }}
                      className="badge" style={{ cursor:"pointer", border:"none", flexShrink:0, marginLeft:6,
                        background: t.active ? "#d1fae5" : "#f0f0f0",
                        color:      t.active ? "#065f46" : "#888" }}>
                      {t.active ? "Active" : "Off"}
                    </button>
                  </div>
                  <div className="fl" style={{ gap:4, marginTop:8, flexWrap:"wrap" }}>
                    {(t.blocksAvailable||[]).map(b => (
                      <span key={b} className="badge" style={{ background:"#e0f2fe", color:"#0369a1" }}>{b} days</span>
                    ))}
                    <span className="badge" style={{ background:"#f0f4f8", color:"#5a7a9a" }}>
                      {(t.assignedCourses||t.qualifiedCourses||[]).length} course{(t.assignedCourses||t.qualifiedCourses||[]).length!==1?"s":""}
                    </span>
                  </div>
                  {(t.assignedCourses||t.qualifiedCourses||[]).length > 0 && (
                    <div className="fl" style={{ gap:4, marginTop:5, flexWrap:"wrap" }}>
                      {(t.assignedCourses||t.qualifiedCourses||[]).slice(0,8).map(code => (
                        <span key={code} className="badge"
                          style={{ background:"#f0f4f8", color:"#5a7a9a", fontFamily:"monospace" }}>
                          {code}
                        </span>
                      ))}
                      {(t.assignedCourses||t.qualifiedCourses||[]).length > 8 && (
                        <span style={{ fontSize:9, color:"#8a9aaa" }}>+{(t.assignedCourses||t.qualifiedCourses||[]).length-8}</span>
                      )}
                    </div>
                  )}
                </div>
              ))}
            </div>
          )
        }
      </div>

      {/* RIGHT: Edit panel — slides in when a teacher is selected */}
      {selId && (
        <div style={{ width:360, borderLeft:"1px solid #e0e8f0", background:"white",
          overflowY:"auto", padding:20, flexShrink:0 }}>
          <div style={{ maxWidth:"100%" }}>
            <div className="flb" style={{ marginBottom:18 }}>
              <div style={{ fontSize:15, fontWeight:"bold", color:"#1e3a5f" }}>
                {selId === "new" ? "New Teacher" : form.name}
              </div>
              <button className="btn btn-secondary" onClick={() => setSelId(null)}>Cancel</button>
            </div>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
                <div>
                  <label className="field-label">Teacher ID *</label>
                  <input className="field-input" value={form.teacherId}
                    onChange={e => fld("teacherId", e.target.value)}
                    placeholder="e.g. jane.doe" disabled={selId !== "new"} />
                </div>
                <div>
                  <label className="field-label">Full Name *</label>
                  <input className="field-input" value={form.name}
                    onChange={e => fld("name", e.target.value)} placeholder="Jane Doe" />
                </div>
                <div>
                  <label className="field-label">Title</label>
                  <input className="field-input" value={form.title||""}
                    onChange={e => fld("title", e.target.value)} placeholder="English 7 Teacher" />
                </div>
                <div>
                  <label className="field-label">Email</label>
                  <input className="field-input" type="email" value={form.email||""}
                    onChange={e => fld("email", e.target.value)} />
                </div>
                <div style={{ gridColumn:"1 / -1" }}>
                  <label className="field-label" style={{ marginBottom:6 }}>Max Sections per Block</label>
                  {(() => {
                    const blockKeys = Object.keys(schoolConfig?.blocks || { A:1, B:1 }).sort();
                    return (
                      <div className="fl" style={{ gap:10 }}>
                        {blockKeys.map(blk => (
                          <div key={blk} style={{ flex:1, minWidth:80 }}>
                            <label className="field-label" style={{ fontSize:9, marginBottom:3 }}>{blk} days</label>
                            <input className="field-input" type="number" min={0} max={12} step={0.5}
                              value={(form.maxSectionsPerBlock||{})[blk] ?? 5}
                              onChange={e => fld("maxSectionsPerBlock", {
                                ...(form.maxSectionsPerBlock||{}),
                                [blk]: parseFloat(e.target.value) || 0
                              })} />
                          </div>
                        ))}
                      </div>
                    );
                  })()}
                </div>
                <div style={{ gridColumn:"1 / -1" }}>
                  <label className="field-label" style={{ marginBottom:6 }}>Lunch Assignment</label>
                  {(() => {
                    const blockKeys = Object.keys(schoolConfig?.blocks || { A:1, B:1 }).sort();
                    return (
                      <div className="fl" style={{ gap:10 }}>
                        {blockKeys.map(blk => (
                          <div key={blk} style={{ flex:1, minWidth:80 }}>
                            <label className="field-label" style={{ fontSize:9, marginBottom:3 }}>{blk} days</label>
                            <select className="field-input"
                              value={(form.lunchAssignment||{})[blk] ?? 1}
                              onChange={e => fld("lunchAssignment", {
                                ...(form.lunchAssignment||{}),
                                [blk]: parseInt(e.target.value)
                              })}>
                              <option value={1}>Lunch 1</option>
                              <option value={2}>Lunch 2</option>
                            </select>
                          </div>
                        ))}
                      </div>
                    );
                  })()}
                </div>
              </div>

              <div style={{ marginTop:14 }}>
                <label className="field-label">Unavailable Periods (e.g. A1, B5)</label>
                <input className="field-input"
                  value={(form.unavailable||[]).join(",")}
                  onChange={e => fld("unavailable", e.target.value.split(",").map(s=>s.trim().toUpperCase()).filter(Boolean))}
                  placeholder="A5,A6,B5,B6" />
              </div>
              <div style={{ marginTop:14 }}>
                <label className="field-label" style={{ marginBottom:6 }}>Prep Period</label>
                <label style={{ display:"flex", alignItems:"center", gap:8, cursor:"pointer",
                  fontSize:12, color:"#374151" }}>
                  <input type="checkbox"
                    checked={form.hasPrepPeriod !== false}
                    onChange={e => fld("hasPrepPeriod", e.target.checked)} />
                  Allow a prep period in the schedule builder
                </label>
              </div>

              <div style={{ marginTop:14 }}>
                <label className="field-label" style={{ marginBottom:8 }}>Assigned Courses</label>

                {/* Selected chips */}
                {(form.assignedCourses||[]).length > 0 && (
                  <div className="fl" style={{ flexWrap:"wrap", gap:4, marginBottom:8 }}>
                    {(form.assignedCourses||[]).map(code => {
                      const c = courses.find(x => x.code === code);
                      return (
                        <span key={code} style={{ display:"flex", alignItems:"center", gap:3,
                          background:"#e8f0fe", border:"1px solid #4a90d9", borderRadius:4,
                          padding:"2px 7px", fontSize:11 }}>
                          <span style={{ fontFamily:"monospace", fontWeight:"bold", color:"#1e5fa0", fontSize:10 }}>{code}</span>
                          {c && <span style={{ color:"#8a9aaa", fontSize:10 }}> {c.name}</span>}
                          <button onClick={() => toggleArr("assignedCourses", code)}
                            style={{ background:"none", border:"none", cursor:"pointer",
                              color:"#4a90d9", fontSize:14, padding:"0 0 0 2px", lineHeight:1 }}>×</button>
                        </span>
                      );
                    })}
                  </div>
                )}

                {courses.length === 0
                  ? <div style={{ fontSize:11, color:"#8a9aaa", fontStyle:"italic" }}>
                      No active courses found — add courses in the Courses tab first.
                    </div>
                  : <>
                      <input className="field-input" placeholder="Search courses to add…"
                        value={courseSearch} onChange={e => setCourseSearch(e.target.value)}
                        style={{ marginBottom:6 }} />
                      {(() => {
                        const q = courseSearch.toLowerCase();
                        const all = courses.slice().sort((a,b)=>a.code.localeCompare(b.code));
                        const filtered = q
                          ? all.filter(c => c.code.toLowerCase().includes(q) || c.name.toLowerCase().includes(q))
                          : all;
                        const assigned   = filtered.filter(c =>  (form.assignedCourses||[]).includes(c.code));
                        const unassigned = filtered.filter(c => !(form.assignedCourses||[]).includes(c.code));
                        const show = [...assigned, ...unassigned];
                        if (!show.length) return <div style={{ fontSize:11, color:"#8a9aaa", fontStyle:"italic" }}>No matching courses.</div>;
                        return (
                          <div style={{ maxHeight:220, overflowY:"auto", border:"1px solid #e0e8f0", borderRadius:6 }}>
                            {show.map((c, i) => {
                              const checked = (form.assignedCourses||[]).includes(c.code);
                              return (
                                <label key={c.code} style={{ display:"flex", alignItems:"center", gap:8,
                                  padding:"6px 10px", cursor:"pointer", fontSize:11,
                                  background: checked ? "#f0f7ff" : i%2===0 ? "white" : "#fafcff",
                                  borderBottom: i < show.length-1 ? "1px solid #f0f4f8" : "none" }}>
                                  <input type="checkbox" checked={checked}
                                    onChange={() => toggleArr("assignedCourses", c.code)}
                                    style={{ margin:0, width:13, height:13, flexShrink:0 }} />
                                  <span style={{ fontFamily:"monospace", fontWeight:"bold", fontSize:10,
                                    color: checked ? "#1e5fa0" : "#5a7a9a", minWidth:65 }}>{c.code}</span>
                                  <span style={{ color:"#6b7280", flex:1 }}>{c.name}</span>
                                  <span style={{ fontSize:9, color:"#b0bec8", whiteSpace:"nowrap" }}>
                                    {TOP_CAT_LABELS[c.topCategory] || c.topCategory}
                                  </span>
                                </label>
                              );
                            })}
                          </div>
                        );
                      })()}
                    </>
                }
              </div>

              <div style={{ marginTop:14 }}>
                <label className="toggle">
                  <input type="checkbox" checked={!!form.active} onChange={e => fld("active", e.target.checked)} />
                  Active
                </label>
              </div>

              <div className="fl" style={{ gap:8, marginTop:20 }}>
                <button className="btn btn-primary" onClick={saveTeacher} disabled={saving}>
                  {saving ? "Saving…" : "Save Teacher"}
                </button>
                <button className="btn btn-secondary" onClick={() => setSelId(null)}>Cancel</button>
              </div>
            </div>
          </div>
      )}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// VALIDATE SCHEDULE — loads from DB (generated schedules or saved sessions)
// Saves student schedule selections as named "validate sessions".
// ══════════════════════════════════════════════════════════════════════════════
function Scheduler({ schoolId, schoolConfig }) {
  // ── core session state ────────────────────────────────────────────────────
  const [schedule,       setSchedule]       = useState(null); // classes[]
  const [grade,          setGrade]          = useState(7);
  const [germanDLI,      setGermanDLI]      = useState(false);
  const [studentName,    setStudentName]    = useState("");
  const [s1Ids,          setS1Ids]          = useState(new Set());
  const [s2Ids,          setS2Ids]          = useState(new Set());
  const [s2Touched,      setS2Touched]      = useState(false);
  const [activeSemester, setActiveSemester] = useState(1);
  const [filterCat,      setFilterCat]      = useState("All");
  const [hoveredId,      setHoveredId]      = useState(null);

  // ── db / save state ───────────────────────────────────────────────────────
  const [dbLoading,      setDbLoading]      = useState(true);
  const [courses,        setCourses]        = useState([]);
  const [genSchedules,   setGenSchedules]   = useState([]);
  const [savedSessions,  setSavedSessions]  = useState([]);
  const [showLoadPanel,  setShowLoadPanel]  = useState(false);
  const [currentSessId,  setCurrentSessId]  = useState(null);
  const [currentSessName,setCurrentSessName]= useState("");
  const [showSaveAs,     setShowSaveAs]     = useState(false);
  const [saveAsName,     setSaveAsName]     = useState("");
  const [saving,         setSaving]         = useState(false);
  const [savedMsg,       setSavedMsg]       = useState("");
  const [sourceScheduleId,setSourceScheduleId]= useState(null);

  // ── student types + requirement groups ────────────────────────────────────
  const [studentTypes,   setStudentTypes]   = useState([]);
  const [reqGroups,      setReqGroups]      = useState([]);
  const [selectedTypeId, setSelectedTypeId] = useState(null);

  // ── schedule conflict detection ────────────────────────────────────────────
  const [scheduleConflict, setScheduleConflict] = useState(null); // null | { added:[], removed:[] }

  // ── prior-year requirement waivers ─────────────────────────────────────────
  const [waivedReqs, setWaivedReqs] = useState(new Set()); // Set of req.id strings

  // ── course map ────────────────────────────────────────────────────────────
  const courseMap = useMemo(() => {
    const m = {};
    courses.forEach(c => { m[c.code] = c; });
    return m;
  }, [courses]);

  // ── load DB data on mount ─────────────────────────────────────────────────
  useEffect(() => {
    if (!schoolId) return;
    setDbLoading(true);
    Promise.all([
      fsGetAll(schoolId, "courses"),
      fsGetAll(schoolId, "schedules"),
      fsGetAll(schoolId, "validate-sessions"),
      fsGetAll(schoolId, "student-types"),
      fsGetAll(schoolId, "requirement-groups"),
    ]).then(([cs, scheds, sessions, types, groups]) => {
      setCourses(cs.filter(c => c.active !== false));
      setStudentTypes(types);
      setReqGroups(groups);
      // Generated schedules have a `placements` array
      const gen = scheds
        .filter(s => Array.isArray(s.placements))
        .sort((a, b) => {
          const ta = a.updatedAt?.toMillis?.() || parseInt(a._id) || 0;
          const tb = b.updatedAt?.toMillis?.() || parseInt(b._id) || 0;
          return tb - ta;
        });
      setGenSchedules(gen);
      const sess = [...sessions].sort((a, b) => {
        const ta = a.updatedAt?.toMillis?.() || parseInt(a._id) || 0;
        const tb = b.updatedAt?.toMillis?.() || parseInt(b._id) || 0;
        return tb - ta;
      });
      setSavedSessions(sess);
      setDbLoading(false);
    }).catch(e => { console.error(e); setDbLoading(false); });
  }, [schoolId]);

  // ── load from a generated schedule ───────────────────────────────────────
  function loadFromGenerated(sched) {
    const classes = convertPlacements(sched.placements || [], courseMap);
    setSchedule(classes);
    setSourceScheduleId(sched._id || sched.id);
    setCurrentSessId(null); setCurrentSessName("");
    setGrade(7); setGermanDLI(false); setStudentName("");
    setS1Ids(new Set()); setS2Ids(new Set()); setS2Touched(false);
    setActiveSemester(1); setFilterCat("All");
    setScheduleConflict(null); setWaivedReqs(new Set());
    setShowLoadPanel(false);
  }

  // ── load from a saved validate session ────────────────────────────────────
  function loadFromSession(sess) {
    const sessClasses  = sess.schedule || [];
    setSchedule(sessClasses);
    setSourceScheduleId(sess.sourceScheduleId || null);
    setCurrentSessId(sess._id || sess.id);
    setCurrentSessName(sess.name || "");
    setGrade(sess.grade || 7);
    setGermanDLI(sess.germanDLI || false);
    setStudentName(sess.studentName || "");
    setS1Ids(new Set(sess.s1Ids || []));
    setS2Ids(new Set(sess.s2Ids || []));
    setS2Touched(sess.s2Touched || false);
    setActiveSemester(sess.activeSemester || 1);
    setSelectedTypeId(sess.selectedTypeId || null);
    setWaivedReqs(new Set(sess.waivedReqs || []));
    setFilterCat("All");
    setShowLoadPanel(false);

    // ── detect if the source generated schedule has changed ──────────────────
    const srcId = sess.sourceScheduleId;
    const srcSched = srcId ? genSchedules.find(s => (s._id || s.id) === srcId) : null;
    if (srcSched) {
      const currentClasses = convertPlacements(srcSched.placements || [], courseMap);
      const sessKeys    = new Set(sessClasses.map(c => `${c._courseCode}__${c.period}`));
      const currentKeys = new Set(currentClasses.map(c => `${c._courseCode}__${c.period}`));
      const removed = sessClasses
        .filter(c => !currentKeys.has(`${c._courseCode}__${c.period}`))
        .map(c => `${c.name} (${c.period})`);
      const added = currentClasses
        .filter(c => !sessKeys.has(`${c._courseCode}__${c.period}`))
        .map(c => `${c.name} (${c.period})`);
      if (removed.length || added.length) {
        setScheduleConflict({ removed, added });
      } else {
        setScheduleConflict(null);
      }
    } else {
      // No matching source schedule found
      setScheduleConflict(srcId ? { removed: [], added: [], notFound: true } : null);
    }
  }

  // ── clear / new session ───────────────────────────────────────────────────
  function newSession() {
    setSchedule(null); setSourceScheduleId(null);
    setCurrentSessId(null); setCurrentSessName("");
    setGrade(7); setGermanDLI(false); setStudentName("");
    setS1Ids(new Set()); setS2Ids(new Set()); setS2Touched(false);
    setActiveSemester(1); setFilterCat("All");
    setSelectedTypeId(null);
    setScheduleConflict(null); setWaivedReqs(new Set());
    setShowLoadPanel(false);
  }

  // ── save session ──────────────────────────────────────────────────────────
  async function saveSession() {
    if (!currentSessId || !currentSessName) {
      setShowSaveAs(true); setSaveAsName(currentSessName); return;
    }
    setSaving(true);
    try {
      const doc = {
        id: currentSessId, name: currentSessName, sourceScheduleId,
        schedule, grade, germanDLI, studentName, selectedTypeId,
        s1Ids: [...s1Ids], s2Ids: [...s2Ids], s2Touched, activeSemester,
        waivedReqs: [...waivedReqs],
        updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
      };
      await fsSave(schoolId, "validate-sessions", currentSessId, doc);
      setSavedSessions(prev => {
        const next = prev.filter(s => (s._id||s.id) !== currentSessId);
        return [{ ...doc, _id: currentSessId, updatedAt: new Date() }, ...next];
      });
      setSavedMsg("✓ Saved"); setTimeout(() => setSavedMsg(""), 2500);
    } catch(e) { setSavedMsg("Save failed"); }
    setSaving(false);
  }

  async function confirmSaveAs() {
    const name = saveAsName.trim(); if (!name) return;
    setSaving(true);
    try {
      const id  = String(Date.now());
      const doc = {
        id, name, sourceScheduleId, schedule, grade, germanDLI, studentName, selectedTypeId,
        s1Ids: [...s1Ids], s2Ids: [...s2Ids], s2Touched, activeSemester,
        waivedReqs: [...waivedReqs],
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
      };
      await fsSave(schoolId, "validate-sessions", id, doc);
      const entry = { ...doc, _id: id, createdAt: new Date(), updatedAt: new Date() };
      setSavedSessions(prev => [entry, ...prev]);
      setCurrentSessId(id); setCurrentSessName(name);
      setShowSaveAs(false); setSaveAsName("");
      setSavedMsg(`✓ Saved as "${name}"`); setTimeout(() => setSavedMsg(""), 3000);
    } catch(e) { setSavedMsg("Save failed"); }
    setSaving(false);
  }

  // ── schedule-type pair-locking ─────────────────────────────────────────────
  // "hybrid" (and legacy "core-block") enables A+B period pairing for core classes.
  // "block" and "traditional" treat every slot independently — no pair locking.
  const scheduleType = schoolConfig?.scheduleType || "hybrid";
  const pairLocking  = scheduleType === "hybrid" || scheduleType === "core-block";
  // Use this everywhere instead of the global locksAB() to respect scheduleType
  const effectiveLocksAB = (t) => pairLocking && locksAB(t);

  // ── derive usable periods from loaded schedule ─────────────────────────────
  const availablePeriods = useMemo(() => {
    if (!schedule?.length) return ALL_PERIODS;
    const found = new Set(schedule.map(c => c.period));
    // Collect all period numbers and block letters actually present
    const maxP = Math.max(...schedule.map(c => parseInt(c.period) || 1));
    const blockSet = [...new Set(schedule.map(c => c.period.slice(1)))].sort();
    const result = [];
    for (let p = 1; p <= maxP; p++) {
      blockSet.forEach(b => {
        const key = `${p}${b}`;
        if (found.has(key)) result.push(key);
      });
    }
    return result.length ? result : ALL_PERIODS;
  }, [schedule]);

  // ── grade list (from schoolConfig or default) ──────────────────────────────
  const grades = useMemo(() =>
    [...(schoolConfig?.grades || [7, 8])].sort((a, b) => a - b),
    [schoolConfig]);

  // ── auto-derive grade + germanDLI from selected student type ─────────────
  useEffect(() => {
    if (!selectedTypeId) { setGermanDLI(false); return; }
    const t = studentTypes.find(t => t._id === selectedTypeId);
    if (!t) return;
    setGermanDLI(t.immersionLanguage === "German");
    // Derive grade from first gradeRequirements entry
    const firstGradeReq = (t.gradeRequirements || [])[0];
    if (firstGradeReq?.grade) setGrade(firstGradeReq.grade);
  }, [selectedTypeId, studentTypes]);

  const requirements = useMemo(() =>
    buildTypeRequirements(selectedTypeId, grade, studentTypes, reqGroups, courseMap),
    [selectedTypeId, grade, studentTypes, reqGroups, courseMap]);

  const annotated = useMemo(() => {
    if (!schedule) return [];
    return schedule.map(cls => ({ ...cls, classType: getClassType(cls, germanDLI) }));
  }, [schedule, germanDLI]);

  const byId = useMemo(() => {
    const map = {};
    for (const cls of annotated) map[cls.id] = cls;
    return map;
  }, [annotated]);

  // ── S2 PRE-SELECTION ────────────────────────────────────────────────────────
  const s2PreselectedIds = useMemo(() => {
    const ids = new Set();
    for (const id of s1Ids) {
      const cls = byId[id]; if (!cls) continue;
      if (isFullYear(cls.classType)) {
        ids.add(id);
        if (effectiveLocksAB(cls.classType)) {
          const pair = annotated.find(c =>
            c.period === getPairedPeriod(cls.period) &&
            (cls._courseCode ? c._courseCode === cls._courseCode : c.name === cls.name)
          );
          if (pair) ids.add(pair.id);
        }
      }
    }
    return ids;
  }, [s1Ids, byId, annotated, pairLocking]);

  const effectiveS2Ids = useMemo(() => {
    if (s2Touched) return s2Ids;
    const merged = new Set([...s2Ids]);
    for (const id of s2PreselectedIds) merged.add(id);
    return merged;
  }, [s2Ids, s2PreselectedIds, s2Touched]);

  const activeIds     = activeSemester === 1 ? s1Ids : effectiveS2Ids;
  const setActiveIds  = activeSemester === 1 ? setS1Ids : setS2Ids;

  const activeLockedPeriods = useMemo(() => {
    const locked = new Set();
    for (const id of activeIds) {
      const cls = byId[id]; if (!cls) continue;
      locked.add(cls.period);
      if (effectiveLocksAB(cls.classType)) locked.add(getPairedPeriod(cls.period));
    }
    return locked;
  }, [activeIds, byId, pairLocking]);

  const takenFamilies = useMemo(() => {
    const fams = new Set();
    for (const id of activeIds) {
      const cls = byId[id]; if (!cls) continue;
      fams.add(getNameFamily(cls.name));
    }
    return fams;
  }, [activeIds, byId]);

  const activeFilledCoreCategories = useMemo(() => {
    const cats = new Set();
    for (const id of activeIds) {
      const cls = byId[id]; if (!cls) continue;
      if (effectiveLocksAB(cls.classType)) cats.add(cls.category);
    }
    return cats;
  }, [activeIds, byId, pairLocking]);

  function findCorePair(cls) {
    if (!effectiveLocksAB(cls.classType)) return null;
    const pairedPeriod = getPairedPeriod(cls.period);
    // Match the OTHER block of the exact same course, not just any course in the same category
    return annotated.find(c =>
      c.period === pairedPeriod &&
      (cls._courseCode ? c._courseCode === cls._courseCode : c.name === cls.name)
    ) || null;
  }

  function isVisible(cls) {
    // Hide immersion-language courses when the DLI flag is off
    if (cls._immersionLanguage && !germanDLI) return false;
    if (filterCat !== "All" && cls.category !== filterCat) return false;
    // Seats > 0 for the selected grade (fall back to gr7 key for unknown grades)
    const seatKey = grade === 8 ? "gr8" : "gr7";
    return (cls[seatKey] || 0) > 0;
  }

  function getStatus(cls) {
    const seatKey = grade === 8 ? "gr8" : "gr7";
    const seats = cls[seatKey] || 0;
    if (seats === 0) return "grade-na";
    // Check current semester FIRST so selected classes are always toggleable
    if (activeIds.has(cls.id)) return activeSemester===2 && s2PreselectedIds.has(cls.id) && !s2Touched ? "preselected" : "selected";
    if (activeSemester===2 && !s2Touched && s2PreselectedIds.has(cls.id)) return "preselected";
    // Check other semester (informational only — does not block selection)
    const otherIds = activeSemester === 1 ? effectiveS2Ids : s1Ids;
    if (otherIds.has(cls.id)) return "other-sem";
    // Period occupied by something else in this semester
    if (activeLockedPeriods.has(cls.period)) {
      const occupantId = [...activeIds].find(id => {
        const c = byId[id]; if (!c) return false;
        if (c.period === cls.period) return true;
        if (effectiveLocksAB(c.classType) && getPairedPeriod(c.period) === cls.period) return true;
        return false;
      });
      if (occupantId !== undefined) return "blocked";
    }
    // Core (A+B) class is blocked if its PAIRED period is occupied by anything
    if (effectiveLocksAB(cls.classType) && activeLockedPeriods.has(getPairedPeriod(cls.period))) return "blocked";
    if (effectiveLocksAB(cls.classType) && activeFilledCoreCategories.has(cls.category)) return "category-taken";
    const family = getNameFamily(cls.name);
    const n = getPeriodNumber(cls.period);
    if (takenFamilies.has(family)) {
      const occupant = [...activeIds].map(id=>byId[id]).filter(Boolean).find(c => getNameFamily(c.name)===family);
      if (occupant && getPeriodNumber(occupant.period) !== n) return "family-taken";
    }
    return "available";
  }

  function toggleClass(cls) {
    const status = getStatus(cls);
    // "other-sem" is now allowed: user can add a class to both semesters
    if (status === "blocked" || status === "category-taken" || status === "grade-na") return;

    if (activeSemester === 2 && !s2Touched) {
      setS2Touched(true);
      const initialized = new Set(s2PreselectedIds);
      const pair = findCorePair(cls);
      if (status === "preselected") {
        initialized.delete(cls.id);
        if (pair) initialized.delete(pair.id);
        setS2Ids(initialized); return;
      }
      if (status === "family-taken") return;
      initialized.add(cls.id);
      if (pair) {
        const pairBlocked = [...initialized].some(id => {
          if (id === cls.id) return false; // don't count cls itself
          const c = byId[id]; if (!c) return false;
          return c.period === pair.period || (effectiveLocksAB(c.classType) && getPairedPeriod(c.period)===pair.period);
        });
        if (!pairBlocked) initialized.add(pair.id);
      }
      setS2Ids(initialized); return;
    }

    const next = new Set(activeIds);
    const pair = findCorePair(cls);
    if (next.has(cls.id)) {
      next.delete(cls.id);
      if (pair) next.delete(pair.id);
    } else {
      if (status === "family-taken") return;
      next.add(cls.id);
      if (pair) {
        const pairBlocked = [...next].some(id => {
          if (id === cls.id) return false; // don't count cls itself
          const c = byId[id]; if (!c) return false;
          return c.period === pair.period || (effectiveLocksAB(c.classType) && getPairedPeriod(c.period)===pair.period);
        });
        if (pairBlocked) {
          // Pair period is occupied — cancel the whole core add
          next.delete(cls.id);
        } else {
          next.add(pair.id);
        }
      }
    }
    setActiveIds(next);
  }

  function changeGrade(g) {
    setGrade(g); setS1Ids(new Set()); setS2Ids(new Set()); setS2Touched(false); setWaivedReqs(new Set());
  }

  const s1Classes     = [...s1Ids].map(id => byId[id]).filter(Boolean);
  const s2Classes     = [...effectiveS2Ids].map(id => byId[id]).filter(Boolean);
  // Sets of course codes (not class ids) for the requirement evaluator
  const s1Codes = useMemo(() =>
    new Set([...s1Ids].map(id => byId[id]?._courseCode).filter(Boolean)),
    [s1Ids, byId]);
  const s2Codes = useMemo(() =>
    new Set([...effectiveS2Ids].map(id => byId[id]?._courseCode).filter(Boolean)),
    [effectiveS2Ids, byId]);
  const reqResults    = useMemo(() => evalTypeRequirements(requirements, s1Codes, s2Codes, waivedReqs), [requirements, s1Codes, s2Codes, waivedReqs]);
  const s2Needs       = useMemo(() =>
    reqResults.filter(r => r.status === "missing" || r.status === "partial").map(r => r.label),
    [reqResults]);
  const stillAvailable = annotated.filter(c => isVisible(c) && getStatus(c) === "available");
  const metCount  = reqResults.filter(r => r.status === "met" || r.status === "waived").length;
  const totalReqs = reqResults.length;

  const categories = useMemo(() => {
    if (!annotated.length) return ["All"];
    const cats = [...new Set(annotated.map(c=>c.category))].sort();
    return ["All", ...cats];
  }, [annotated]);

  const grouped = useMemo(() => {
    // topCategory sort order: core first, then required-electives, then electives
    const TOP_ORDER = { core: 0, "required-electives": 1, electives: 2 };
    const g = {};
    for (const cls of annotated) {
      if (!isVisible(cls)) continue;
      if (!g[cls.category]) g[cls.category] = { _top: cls._topCategory || "electives", byPeriod: {} };
      g[cls.category].byPeriod[cls.period] = cls;
    }
    // Sort categories: by topCategory tier, then alphabetically within each tier
    return Object.entries(g)
      .sort(([catA, a], [catB, b]) => {
        const orderDiff = (TOP_ORDER[a._top] ?? 2) - (TOP_ORDER[b._top] ?? 2);
        if (orderDiff !== 0) return orderDiff;
        return catA.localeCompare(catB);
      })
      .map(([cat, data]) => [cat, data.byPeriod, data._top]);
  }, [annotated, filterCat, grade, germanDLI]);

  function typeBadge(cls) {
    const t = cls.classType;
    if (t === "core")          return { label:"Core · A+B",          color:"#2563eb" };
    if (t === "req-year")      return { label:"Required · full year", color:"#7c3aed" };
    if (t === "req-sem")       return { label:"Required · 1 sem",    color:"#d97706" };
    if (t === "elective-year") return { label:"Elective · full year", color:"#0891b2" };
    return                            { label:"Elective · 1 sem",    color:"#6b7280" };
  }

  // ── RENDER ─────────────────────────────────────────────────────────────────
  const numPeriods = availablePeriods.length;
  const gridCols   = `150px repeat(${numPeriods}, minmax(60px,1fr))`;

  return (
    <div className="page-fill">

      {/* ── TOP BAR ─────────────────────────────────────────────────────────── */}
      <div className="panel-toolbar">

        <div className="panel-toolbar-title">Validate Schedule</div>

        {/* Current session name badge */}
        <div className="session-badge">
          <span className="session-badge-label">Session:</span>
          <span style={{ fontWeight:"bold" }}>{currentSessName || "New (unsaved)"}</span>
        </div>

        {/* Save-as inline form */}
        {showSaveAs && (
          <div className="fla flex-none" style={{ gap:"0.3125rem" }}>
            <input autoFocus value={saveAsName} onChange={e => setSaveAsName(e.target.value)}
              onKeyDown={e => { if (e.key==="Enter") confirmSaveAs(); if (e.key==="Escape") setShowSaveAs(false); }}
              placeholder="Session name…" className="save-as-input" />
            <button onClick={confirmSaveAs} disabled={!saveAsName.trim()||saving}
              className="btn btn-primary btn-sm">
              {saving ? "…" : "Save"}
            </button>
            <button onClick={() => setShowSaveAs(false)} className="btn-cancel-sm">Cancel</button>
          </div>
        )}

        <div className="flex-1" />
        {savedMsg && (
          <span className={`status-msg flex-none ${savedMsg.startsWith("✓") ? "success" : "error"}`}>
            {savedMsg}
          </span>
        )}

        {/* Action buttons */}
        <button onClick={() => setShowLoadPanel(true)} className="btn-outline flex-none">📂 Open</button>
        <button onClick={() => { setShowSaveAs(true); setSaveAsName(currentSessName); }}
          className="btn-outline flex-none">Save As…</button>
        {schedule && (
          <button className="btn btn-primary btn-sm flex-none" onClick={saveSession} disabled={saving}>
            {saving ? "Saving…" : "💾 Save"}
          </button>
        )}

        {/* Divider */}
        {schedule && <div className="toolbar-divider" />}

        {/* Per-session controls — only when a schedule is loaded */}
        {schedule && <>
          {/* Student type selector — drives grade and German DLI automatically */}
          <select value={selectedTypeId || ""}
            onChange={e => { setSelectedTypeId(e.target.value || null); setS1Ids(new Set()); setS2Ids(new Set()); setS2Touched(false); setWaivedReqs(new Set()); }}
            style={{ fontSize:11, padding:"3px 8px", border:"1px solid #c0d0e0",
              borderRadius:5, background:"#f8fafc", color:"#1e2a3a", flexShrink:0 }}>
            <option value="">— Student Type —</option>
            {studentTypes.map(t => (
              <option key={t._id} value={t._id}>{t.name}</option>
            ))}
          </select>

          <div style={{ display:"flex", borderRadius:5, overflow:"hidden", border:"2px solid #4a90d9", flexShrink:0 }}>
            {[1,2].map(s => (
              <button key={s} onClick={() => setActiveSemester(s)}
                style={{ padding:"3px 12px",
                  background: activeSemester===s ? "#4a90d9" : "#f0f7ff",
                  color:      activeSemester===s ? "white"   : "#1e5fa0",
                  border:"none", cursor:"pointer", fontSize:11, fontWeight:"bold" }}>
                S{s}
              </button>
            ))}
          </div>

          <input placeholder="Student name" value={studentName}
            onChange={e => setStudentName(e.target.value)}
            style={{ padding:"3px 9px", borderRadius:5, border:"1px solid #c0d0e0",
              background:"#f8fafc", color:"#1e2a3a", fontSize:11, width:140, flexShrink:0 }} />
        </>}
      </div>

      {/* ── SCHEDULE CONFLICT BANNER ─────────────────────────────────────── */}
      {scheduleConflict && (
        <div className="alert-banner alert-banner-warn" style={{ borderBottom:"2px solid #f97316" }}>
          <span className="flex-none" style={{ fontSize:"1rem" }}>⚠️</span>
          <div className="flex-1">
            <div style={{ fontWeight:"bold", fontSize:"var(--text-sm)", color:"#9a3412" }}>
              {scheduleConflict.notFound
                ? "Base schedule not found — the generated schedule this session was built from may have been deleted or renamed."
                : "The base schedule has changed since this session was saved."}
            </div>
            {!scheduleConflict.notFound && scheduleConflict.removed.length > 0 &&
              <div style={{ fontSize:10, color:"#7c2d12", marginTop:2 }}>
                Removed from schedule: {scheduleConflict.removed.join(", ")}
              </div>}
            {!scheduleConflict.notFound && scheduleConflict.added.length > 0 &&
              <div style={{ fontSize:10, color:"#065f46", marginTop:2 }}>
                New in schedule: {scheduleConflict.added.join(", ")}
              </div>}
          </div>
          <button onClick={() => setScheduleConflict(null)}
            style={{ background:"none", border:"none", cursor:"pointer", fontSize:16, color:"#9a3412", flexShrink:0 }}>×</button>
        </div>
      )}

      {/* ── LOAD PANEL ──────────────────────────────────────────────────────── */}
      {showLoadPanel && (
        <div className="modal-overlay" onClick={() => setShowLoadPanel(false)}>
          <div className="modal-panel" style={{ width:540, maxHeight:"75vh" }}
            onClick={e => e.stopPropagation()}>

            <div className="modal-header">
              <div className="modal-title">Open Schedule / Session</div>
              <button onClick={() => setShowLoadPanel(false)} className="btn-ghost" style={{ fontSize:"1.125rem" }}>×</button>
            </div>

            <div className="modal-body">

              {/* New blank session */}
              <div onClick={newSession} className="list-row list-row-new">
                <span className="list-row-icon">➕</span>
                <div>
                  <div className="list-row-label" style={{ color:"var(--color-text-secondary)" }}>New blank session</div>
                  <div className="list-row-meta">Clear everything and start over</div>
                </div>
              </div>

              {/* Generated Schedules */}
              {genSchedules.length > 0 && (
                <div className="list-group-header">Generated Schedules</div>
              )}
              {dbLoading && (
                <div className="text-center-muted" style={{ padding:"1rem" }}>Loading…</div>
              )}
              {!dbLoading && genSchedules.length === 0 && (
                <div className="list-row-meta" style={{ padding:"0.75rem 1rem", fontStyle:"italic", borderBottom:"1px solid var(--color-surface-hover)" }}>
                  No generated schedules found. Build one in the Generate Schedule tab first.
                </div>
              )}
              {genSchedules.map(sched => {
                const sid  = sched._id || sched.id;
                const name = sched.name || sched.semester || sid;
                const ts   = sched.updatedAt?.toDate?.() || (parseInt(sid) ? new Date(parseInt(sid)) : null);
                const dateStr = ts ? ts.toLocaleDateString(undefined, { month:"short", day:"numeric", year:"numeric" }) : "";
                const isCurrent = sid === sourceScheduleId && !currentSessId;
                return (
                  <div key={sid} onClick={() => loadFromGenerated(sched)}
                    className={`list-row${isCurrent ? " is-current" : ""}`}>
                    <span className="list-row-icon">🤖</span>
                    <div style={{ flex:1, minWidth:0 }}>
                      <div className="list-row-label">{name}{isCurrent ? " ✓" : ""}</div>
                      <div className="list-row-meta">
                        {(sched.placements||[]).length} placements
                        {dateStr ? ` · ${dateStr}` : ""}
                      </div>
                    </div>
                  </div>
                );
              })}

              {/* Saved Validate Sessions */}
              <div className="list-group-header list-group-divider">Saved Validate Sessions</div>
              {!dbLoading && savedSessions.length === 0 && (
                <div className="list-row-meta" style={{ padding:"0.75rem 1rem", fontStyle:"italic" }}>
                  No saved sessions yet.
                </div>
              )}
              {savedSessions.map(sess => {
                const sid  = sess._id || sess.id;
                const name = sess.name || sid;
                const ts   = sess.updatedAt?.toDate?.() || (parseInt(sid) ? new Date(parseInt(sid)) : null);
                const dateStr = ts ? ts.toLocaleDateString(undefined, { month:"short", day:"numeric", year:"numeric" }) : "";
                const isCurrent = sid === currentSessId;
                return (
                  <div key={sid} onClick={() => loadFromSession(sess)}
                    className={`list-row${isCurrent ? " is-current" : ""}`}>
                    <span className="list-row-icon">📅</span>
                    <div style={{ flex:1, minWidth:0 }}>
                      <div className="list-row-label">{name}{isCurrent ? " ✓" : ""}</div>
                      <div className="list-row-meta">
                        {sess.studentName ? `${sess.studentName} · ` : ""}
                        Grade {sess.grade || "?"}
                        {dateStr ? ` · ${dateStr}` : ""}
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      )}

      {/* ── EMPTY STATE ─────────────────────────────────────────────────────── */}
      {!schedule && (
        <div className="empty-state">
          <div className="empty-state-icon">📅</div>
          <div className="empty-state-title">Open a schedule to begin</div>
          <div className="empty-state-desc">
            Load a generated schedule from the database, or continue from a previously saved session.
          </div>
          <button onClick={() => setShowLoadPanel(true)} className="btn-open-primary">
            📂 Open Schedule or Session
          </button>
        </div>
      )}

      {/* ── MAIN CONTENT ────────────────────────────────────────────────────── */}
      {schedule && (
        <div style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden" }}>

          {/* S2 banner */}
          {activeSemester === 2 && (
            <div style={{ flexShrink:0, background:"#fffbeb", borderBottom:"1px solid #fde68a",
              padding:"5px 22px", fontSize:11, color:"#92400e",
              display:"flex", gap:14, alignItems:"center", flexWrap:"wrap" }}>
              <span>↩ <strong>Full-year classes from S1</strong> are pre-selected. Click any to remove.</span>
              {s2Needs.length > 0 && <span style={{ color:"#dc2626" }}>Still needed: <strong>{s2Needs.join(", ")}</strong></span>}
              {s2Needs.length === 0 && s1Classes.length > 0 && <span style={{ color:"#16a34a" }}>All requirements covered ✓</span>}
            </div>
          )}

          {/* Row: LEFT grid + RIGHT panel */}
          <div style={{ flex:1, display:"flex", overflow:"hidden" }}>

          {/* LEFT — schedule grid */}
          <div style={{ flex:1, overflowX:"auto", overflowY:"auto", padding:"12px 12px 12px 20px" }}>

            {/* Category filter dropdown */}
            <div style={{ display:"flex", alignItems:"center", gap:7, marginBottom:10 }}>
              <span style={{ fontSize:10, color:"#8a9aaa", fontWeight:600, textTransform:"uppercase",
                letterSpacing:0.5, flexShrink:0 }}>Filter:</span>
              <select value={filterCat} onChange={e => setFilterCat(e.target.value)}
                style={{ fontSize:11, padding:"3px 8px", border:"1px solid #c0d0e0",
                  borderRadius:5, background:"#f8fafc", color:"#1e2a3a", minWidth:180 }}>
                {categories.map(cat => (
                  <option key={cat} value={cat}>{cat}</option>
                ))}
              </select>
              {filterCat !== "All" && (
                <button onClick={() => setFilterCat("All")}
                  style={{ fontSize:10, padding:"2px 8px", borderRadius:4,
                    border:"1px solid #c0d0e0", background:"white", color:"#6b7280", cursor:"pointer" }}>
                  Clear
                </button>
              )}
            </div>

            {/* Period headers */}
            <div style={{ display:"grid", gridTemplateColumns:gridCols, gap:2, marginBottom:3 }}>
              <div />
              {availablePeriods.map(p => {
                const takenActive = activeLockedPeriods.has(p);
                const isA = p.endsWith("A");
                return (
                  <div key={p} style={{ textAlign:"center", padding:"4px 1px", borderRadius:3,
                    background: takenActive ? "#fee2e2" : isA ? "#eff6ff" : "#f0f9ff",
                    border:`1px solid ${takenActive?"#fca5a5":isA?"#bfdbfe":"#bae6fd"}`,
                    fontSize:10, fontWeight:"bold",
                    color: takenActive ? "#dc2626" : isA ? "#1d4ed8" : "#0369a1" }}>
                    <div>P{getPeriodNumber(p)}{p.endsWith("A")?"A":"B"}</div>
                    {takenActive
                      ? <div style={{ fontSize:8 }}>✗</div>
                      : <div style={{ fontSize:8, opacity:0.4 }}>✓</div>}
                  </div>
                );
              })}
            </div>

            {/* Class rows — grouped is now an array of [cat, byPeriod, topCat] */}
            {grouped.map(([cat, byPeriod, topCat]) => {
              const color      = catColor(cat);
              const isCoreRow  = topCat === "core"
                || CORE_CATEGORIES_7.includes(cat) || CORE_CATEGORIES_8.includes(cat);
              const isGermanRow= cat.toLowerCase().includes("german") && !cat.toLowerCase().includes("culture");
              const hasDbCore  = Object.values(byPeriod).some(c => c._courseBlocks === "both");
              return (
                <div key={cat} style={{ display:"grid", gridTemplateColumns:gridCols,
                  gap:2, marginBottom:2, alignItems:"stretch" }}>
                  <div style={{ display:"flex", alignItems:"center", paddingRight:7,
                    borderRight:`3px solid ${color}`, minHeight:54 }}>
                    <div>
                      <div style={{ fontSize:11, fontWeight:"bold", color, lineHeight:1.2 }}>{cat}</div>
                      {(isCoreRow || (isGermanRow && germanDLI) || hasDbCore) &&
                        <span style={{ fontSize:8, background:color+"18", color, borderRadius:3,
                          padding:"1px 4px", border:`1px solid ${color}33` }}>CORE · A+B</span>}
                      {cat==="German Culture" &&
                        <span style={{ fontSize:8, background:"#fef2f2", color:"#dc2626", borderRadius:3,
                          padding:"1px 4px", border:"1px solid #fecaca" }}>DLI · 1 sem</span>}
                    </div>
                  </div>

                  {availablePeriods.map(period => {
                    const cls = byPeriod[period];
                    if (!cls) return (
                      <div key={period} style={{ minHeight:54, borderRadius:3,
                        background:"#f0f2f5", border:"1px solid #e4e8ed" }} />
                    );

                    const status        = getStatus(cls);
                    const seats         = cls[grade===8?"gr8":"gr7"] || 0;
                    const isHov         = hoveredId === cls.id;
                    const otherSemLabel = activeSemester===1 ? "S2" : "S1";
                    const pair          = findCorePair(cls);
                    const pairSelected  = pair && activeIds.has(pair.id);
                    const pairPre       = pair && !s2Touched && s2PreselectedIds.has(pair.id);
                    const isLinked      = (status==="selected"||status==="preselected") && (pairSelected||pairPre);
                    const isCore        = effectiveLocksAB(cls.classType);
                    const clickable     = status !== "blocked" && status !== "category-taken"
                                       && status !== "grade-na" && status !== "other-sem";

                    const s = {
                      available:        { bg:"white",     border:`1.5px solid ${color}`,   text:color,     cursor:"pointer"     },
                      selected:         { bg:color,       border:`1.5px solid ${color}`,   text:"white",   cursor:"pointer"     },
                      preselected:      { bg:color+"55",  border:`2px dashed ${color}`,    text:"white",   cursor:"pointer"     },
                      "other-sem":      { bg:color+"1a",  border:`1.5px solid ${color}55`, text:color+"99",cursor:"default"     },
                      blocked:          { bg:"#f5f5f5",   border:"1.5px solid #e0e0e0",    text:"#bbb",    cursor:"not-allowed" },
                      "category-taken": { bg:"#fafafa",   border:"1.5px dashed #d8d8d8",   text:"#ccc",    cursor:"not-allowed" },
                      "family-taken":   { bg:"#fafafa",   border:"1.5px dashed #fbbf24",   text:"#d97706", cursor:"pointer"     },
                      "grade-na":       { bg:"#f8f8f8",   border:"1px solid #ebebeb",      text:"#ddd",    cursor:"default"     },
                    }[status] || { bg:"#f8f8f8", border:"1px solid #eee", text:"#ddd", cursor:"default" };

                    return (
                      <div key={period}
                        onClick={() => toggleClass(cls)}
                        onMouseEnter={() => setHoveredId(cls.id)}
                        onMouseLeave={() => setHoveredId(null)}
                        title={
                          status==="blocked"         ? `Period ${period} is taken` :
                          status==="other-sem"       ? `Assigned in ${otherSemLabel}` :
                          status==="preselected"     ? "Pre-selected from S1 — click to remove" :
                          status==="grade-na"        ? `Not offered for grade ${grade}` :
                          status==="category-taken"  ? "Core subject already assigned this semester" :
                          status==="family-taken"    ? `Already taking a ${getNameFamily(cls.name)} class` :
                          isCore                     ? `${cls.name} — selects both A & B days` :
                          `${cls.name} · ${seats} seats`
                        }
                        style={{
                          minHeight:54, borderRadius:3, background:s.bg, border:s.border,
                          display:"flex", flexDirection:"column", alignItems:"center",
                          justifyContent:"center", cursor:s.cursor,
                          padding:"3px 2px", textAlign:"center", transition:"all 0.1s",
                          transform: isHov && clickable ? "scale(1.04)" : "scale(1)",
                          boxShadow: isHov && clickable ? `0 2px 8px ${color}44` : "none",
                          outline: isLinked ? "2px solid white" : "none",
                          outlineOffset: isLinked ? "-3px" : "0",
                        }}>
                        <div style={{ fontSize:9, fontWeight:"bold", color:s.text, lineHeight:1.2 }}>{cls.name}</div>
                        {status!=="grade-na" && seats>0 &&
                          <div style={{ fontSize:8, color:s.text, opacity:0.65, marginTop:1 }}>{seats} seats</div>}
                        {(status==="selected"||status==="preselected") && isCore &&
                          <div style={{ fontSize:8, color:"white", marginTop:1 }}>✓ A+B</div>}
                        {(status==="selected"||status==="preselected") && !isCore &&
                          <div style={{ fontSize:8, color:"white", marginTop:1 }}>✓ S{activeSemester}</div>}
                        {status==="preselected" &&
                          <div style={{ fontSize:7, color:"rgba(255,255,255,0.8)" }}>↩ from S1</div>}
                        {status==="other-sem" &&
                          <div style={{ fontSize:8, color:s.text, marginTop:1 }}>{otherSemLabel}✓</div>}
                        {status==="family-taken" &&
                          <div style={{ fontSize:7, color:s.text, marginTop:1 }}>duplicate</div>}
                      </div>
                    );
                  })}
                </div>
              );
            })}

            {/* Legend */}
            <div style={{ marginTop:12, display:"flex", gap:10, flexWrap:"wrap", fontSize:10,
              color:"#8a9aaa", borderTop:"1px solid #dde3ec", paddingTop:10 }}>
