// STUDENT TYPES TAB
// Manages requirement groups (sets of interchangeable courses) and student
// types (grade-level bundles of required classes + groups).
// Inheritance: a student type may "extend" another, inheriting all its
// grade requirements additively. The editor always shows the full merged
// picture — inherited rows are visible but locked.
// ══════════════════════════════════════════════════════════════════════════════

// ── Shared: resolve a type's full inherited requirements ───────────────────
function resolveInherited(extendsId, allTypes, visited = new Set()) {
  if (!extendsId || visited.has(extendsId)) return [];
  visited.add(extendsId);
  const parent = allTypes.find(t => t._id === extendsId);
  if (!parent) return [];
  const grandparent = resolveInherited(parent.extends, allTypes, visited);
  // Merge grandparent into parent (additive per grade)
  const merged = grandparent.map(gr => ({ ...gr,
    requiredClasses: [...(gr.requiredClasses||[])],
    requiredGroups:  [...(gr.requiredGroups||[])],
  }));
  (parent.gradeRequirements||[]).forEach(pgr => {
    const existing = merged.find(m => m.grade === pgr.grade);
    if (existing) {
      existing.requiredClasses = [...new Set([...existing.requiredClasses, ...(pgr.requiredClasses||[])])];
      existing.requiredGroups  = [...new Set([...existing.requiredGroups,  ...(pgr.requiredGroups||[])])];
    } else {
      merged.push({ grade: pgr.grade,
        requiredClasses: [...(pgr.requiredClasses||[])],
        requiredGroups:  [...(pgr.requiredGroups||[])],
      });
    }
  });
  return merged.sort((a,b) => a.grade - b.grade);
}

// ── Requirement Group Editor ───────────────────────────────────────────────
function RequirementGroupEditor({ group, courses, studentTypes, isNew, schoolId, onSaved, onClose }) {
  const [form, setForm] = useState({
    id:          group._id   || "",
    name:        group.name        || "",
    description: group.description || "",
    category:    group.category    || "required-electives",
    courses:     group.courses     || [],
  });
  const [saving, setSaving] = useState(false);
  const [search, setSearch] = useState("");

  function fld(k, v) { setForm(f => ({ ...f, [k]: v })); }
  function toggleCourse(code) {
    setForm(f => ({
      ...f,
      courses: f.courses.includes(code) ? f.courses.filter(c => c !== code) : [...f.courses, code],
    }));
  }

  async function save() {
    if (!form.id.trim() || !form.name.trim()) { alert("ID and name required."); return; }
    setSaving(true);
    try {
      const id = form.id.trim().toLowerCase().replace(/\s+/g,"-");
      await fsSave(schoolId, "requirement-groups", id, { ...form, id });
      onSaved();
    } catch(e) { alert("Save failed: " + e.message); }
    setSaving(false);
  }

  // Who uses this group?
  const usedBy = useMemo(() =>
    studentTypes.flatMap(t =>
      (t.gradeRequirements||[])
        .filter(gr => (gr.requiredGroups||[]).includes(group._id))
        .map(gr => `${t.name} · Grade ${gr.grade}`)
    ), [studentTypes, group._id]
  );

  // Courses organised by subcategory, filtered by search
  const grouped = useMemo(() => {
    const q = search.toLowerCase();
    const g = {};
    courses
      .filter(c => !q || c.name.toLowerCase().includes(q) || c.code.toLowerCase().includes(q))
      .forEach(c => {
        const key = `${TOP_CAT_LABELS[c.topCategory]||c.topCategory} / ${c.subcategory||"Other"}`;
        if (!g[key]) g[key] = [];
        g[key].push(c);
      });
    return g;
  }, [courses, search]);

  const catColor = { core:"#1e3a5f","required-electives":"#7c3aed", electives:"#0891b2" };

  return (
    <div style={{ display:"flex", flexDirection:"column", height:"100%", overflow:"hidden" }}>
      {/* Header */}
      <div className="flb" style={{ padding:"14px 20px", borderBottom:"1px solid #e0e8f0", flexShrink:0 }}>
        <div style={{ fontSize:14, fontWeight:"bold", color:"#1e3a5f" }}>
          {isNew ? "New Requirement Group" : `Edit Group · ${group._id}`}
        </div>
        <button className="btn-ghost" onClick={onClose}>×</button>
      </div>

      <div style={{ flex:1, overflowY:"auto", padding:"16px 20px" }}>
        {/* Meta fields */}
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom:14 }}>
          <div>
            <label className="field-label">Group ID *</label>
            <input className="field-input" value={form.id}
              onChange={e => fld("id", e.target.value)} disabled={!isNew}
              placeholder="e.g. language-arts-7" />
          </div>
          <div>
            <label className="field-label">Display Name *</label>
            <input className="field-input" value={form.name}
              onChange={e => fld("name", e.target.value)} placeholder="e.g. 7th Grade Language Arts" />
          </div>
          <div style={{ gridColumn:"1/-1" }}>
            <label className="field-label">Description</label>
            <input className="field-input" value={form.description}
              onChange={e => fld("description", e.target.value)}
              placeholder="Students must satisfy one course from this group." />
          </div>
          <div>
            <label className="field-label">Category</label>
            <select className="field-input" value={form.category} onChange={e => fld("category", e.target.value)}>
              {TOP_CATS.map(t => <option key={t} value={t}>{TOP_CAT_LABELS[t]}</option>)}
            </select>
          </div>
        </div>

        {/* Selected courses summary */}
        <div style={{ marginBottom:10 }}>
          <label className="field-label" style={{ marginBottom:6 }}>
            Courses in this group ({form.courses.length}) — satisfy any one
          </label>
          {form.courses.length === 0
            ? <div style={{ fontSize:11, color:"#b0bec8", fontStyle:"italic" }}>No courses selected yet.</div>
            : <div className="fl" style={{ flexWrap:"wrap", gap:5 }}>
                {form.courses.map(code => {
                  const c = courses.find(x => x.code === code);
                  return (
                    <span key={code} style={{ fontSize:11, padding:"3px 8px", borderRadius:4,
                      background: catColor[c?.topCategory] ? catColor[c.topCategory]+"15" : "#f0f4f8",
                      border: `1px solid ${catColor[c?.topCategory]||"#c0d0e0"}`,
                      color: catColor[c?.topCategory]||"#5a7a9a", display:"flex", alignItems:"center", gap:5 }}>
                      <span style={{ fontFamily:"monospace", fontWeight:"bold" }}>{code}</span>
                      {c && <span style={{ color:"#8a9aaa", fontSize:10 }}>{c.name}</span>}
                      <button onClick={() => toggleCourse(code)}
                        style={{ background:"none", border:"none", cursor:"pointer", color:"#b91c1c", fontSize:13, lineHeight:1, padding:0 }}>×</button>
                    </span>
                  );
                })}
              </div>
          }
        </div>

        {/* Course picker */}
        <div style={{ border:"1px solid #e0e8f0", borderRadius:6, overflow:"hidden" }}>
          <div style={{ padding:"8px 12px", background:"#f8fafc", borderBottom:"1px solid #e0e8f0" }}>
            <input className="field-input" style={{ background:"white" }}
              placeholder="🔍 Search courses…" value={search}
              onChange={e => setSearch(e.target.value)} />
          </div>
          <div style={{ maxHeight:280, overflowY:"auto", padding:"8px 12px" }}>
            {Object.entries(grouped).map(([subcat, cats]) => (
              <div key={subcat} style={{ marginBottom:10 }}>
                <div style={{ fontSize:9, fontWeight:"bold", color:"#8a9aaa", textTransform:"uppercase",
                  letterSpacing:0.5, marginBottom:5 }}>{subcat}</div>
                <div className="fl" style={{ flexWrap:"wrap", gap:4 }}>
                  {cats.map(c => {
                    const checked = form.courses.includes(c.code);
                    return (
                      <label key={c.code} style={{ display:"flex", alignItems:"center", gap:4,
                        padding:"3px 8px", borderRadius:4, cursor:"pointer", fontSize:11,
                        border:`1px solid ${checked ? catColor[c.topCategory]||"#4a90d9" : "#e0e8f0"}`,
                        background: checked ? (catColor[c.topCategory]||"#4a90d9")+"15" : "white" }}>
                        <input type="checkbox" checked={checked} onChange={() => toggleCourse(c.code)}
                          style={{ margin:0, width:12, height:12 }} />
                        <span style={{ fontFamily:"monospace", fontSize:10,
                          color: checked ? catColor[c.topCategory]||"#1e5fa0" : "#5a7a9a" }}>{c.code}</span>
                        <span style={{ color:"#8a9aaa", fontSize:10 }}>{c.name}</span>
                      </label>
                    );
                  })}
                </div>
              </div>
            ))}
            {Object.keys(grouped).length === 0 && (
              <div style={{ color:"#b0bec8", fontSize:11, textAlign:"center", padding:"12px 0" }}>No courses match.</div>
            )}
          </div>
        </div>

        {/* Used by */}
        {usedBy.length > 0 && (
          <div style={{ marginTop:14, padding:"8px 12px", borderRadius:5, background:"#fffbeb", border:"1px solid #fde68a" }}>
            <div style={{ fontSize:10, fontWeight:"bold", color:"#92400e", marginBottom:4 }}>Used by</div>
            {usedBy.map(u => <div key={u} style={{ fontSize:11, color:"#78350f" }}>· {u}</div>)}
          </div>
        )}
      </div>

      <div className="fl" style={{ gap:8, padding:"12px 20px", borderTop:"1px solid #e0e8f0", flexShrink:0 }}>
        <button className="btn btn-primary" onClick={save} disabled={saving} style={{ flex:1 }}>
          {saving ? "Saving…" : "Save Group"}
        </button>
        <button className="btn btn-secondary" onClick={onClose}>Cancel</button>
      </div>
    </div>
  );
}

// ── Student Type Editor ────────────────────────────────────────────────────
const EMPTY_STYPE = { id:"", name:"", description:"", extends:"", immersionLanguage:"", gradeRequirements:[] };

function StudentTypeEditor({ typeData, allTypes, allGroups, allCourses, isNew, schoolId, onSaved, onClose }) {
  const [form, setForm] = useState({ ...EMPTY_STYPE, ...typeData,
    gradeRequirements: (typeData.gradeRequirements||[]).map(gr => ({
      grade: gr.grade,
      requiredClasses: [...(gr.requiredClasses||[])],
      requiredGroups:  [...(gr.requiredGroups||[])],
    })),
  });
  const [saving, setSaving] = useState(false);
  const [openPicker, setOpenPicker] = useState(null); // { gradeIdx, field } | null

  function fld(k, v) { setForm(f => ({ ...f, [k]: v })); }

  // Full inherited requirements (resolved recursively)
  const inherited = useMemo(() =>
    resolveInherited(form.extends, allTypes),
    [form.extends, allTypes]
  );

  const parentName = useMemo(() => {
    const p = allTypes.find(t => t._id === form.extends);
    return p ? p.name : null;
  }, [form.extends, allTypes]);

  // All grades that are either inherited or defined by this type
  const allGrades = useMemo(() => {
    const gs = new Set([
      ...inherited.map(r => r.grade),
      ...form.gradeRequirements.map(r => r.grade),
    ]);
    return [...gs].sort((a,b) => a-b);
  }, [inherited, form.gradeRequirements]);

  // Grades available to add (not already in this type's own list)
  const unusedGrades = [7, 8].filter(g => !form.gradeRequirements.find(r => r.grade === g));

  function getOwnGradeReq(grade) {
    return form.gradeRequirements.find(r => r.grade === grade);
  }
  function getInheritedGradeReq(grade) {
    return inherited.find(r => r.grade === grade);
  }

  function addGrade(grade) {
    setForm(f => ({
      ...f,
      gradeRequirements: [...f.gradeRequirements, { grade, requiredClasses:[], requiredGroups:[] }]
        .sort((a,b) => a.grade - b.grade),
    }));
  }

  function removeGrade(grade) {
    setForm(f => ({ ...f, gradeRequirements: f.gradeRequirements.filter(r => r.grade !== grade) }));
  }

  function toggleItem(grade, field, value) {
    setForm(f => ({
      ...f,
      gradeRequirements: f.gradeRequirements.map(r => {
        if (r.grade !== grade) return r;
        const arr = r[field]||[];
        return { ...r, [field]: arr.includes(value) ? arr.filter(x=>x!==value) : [...arr, value] };
      }),
    }));
  }

  async function save() {
    if (!form.id.trim() || !form.name.trim()) { alert("ID and name required."); return; }
    setSaving(true);
    try {
      const id = form.id.trim().toLowerCase().replace(/\s+/g,"-");
      await fsSave(schoolId, "student-types", id, { ...form, id });
      onSaved();
    } catch(e) { alert("Save failed: " + e.message); }
    setSaving(false);
  }

  // Chip for a single required class or group — locked or editable
  function Chip({ label, sublabel, color, locked, onRemove, title }) {
    return (
      <span title={title} style={{ display:"inline-flex", alignItems:"center", gap:4,
        padding:"3px 8px 3px 8px", borderRadius:4, fontSize:11,
        border:`1px solid ${locked ? "#d0d0d0" : color+"55"}`,
        background: locked ? "#f4f4f4" : color+"12",
        color: locked ? "#888" : color,
        opacity: locked ? 0.8 : 1 }}>
        {locked && <span style={{ fontSize:9 }}>🔒</span>}
        <span style={{ fontFamily:"monospace", fontWeight:"bold" }}>{label}</span>
        {sublabel && <span style={{ fontSize:9, opacity:0.7 }}>{sublabel}</span>}
        {!locked && onRemove && (
          <button onClick={onRemove} style={{ background:"none", border:"none", cursor:"pointer",
            color:"#b91c1c", fontSize:13, lineHeight:1, padding:0, marginLeft:1 }}>×</button>
        )}
      </span>
    );
  }

  // Inline picker dropdown for adding classes or groups to a grade
  function Picker({ grade, field, rect, onClose: closePicker }) {
    const own = getOwnGradeReq(grade);
    const inh = getInheritedGradeReq(grade);
    const alreadyAdded = new Set([
      ...(own?.[field]||[]),
      ...(inh?.[field]||[]),
    ]);
    const [q, setQ] = useState("");
    const ref = useRef(null);

    React.useEffect(() => {
      function handleDown(e) {
        if (ref.current && !ref.current.contains(e.target)) closePicker();
      }
      document.addEventListener("mousedown", handleDown);
      return () => document.removeEventListener("mousedown", handleDown);
    }, []);

    const options = field === "requiredClasses"
      ? allCourses.filter(c => !alreadyAdded.has(c.code) &&
          (!q || c.name.toLowerCase().includes(q) || c.code.toLowerCase().includes(q)))
      : allGroups.filter(g => !alreadyAdded.has(g._id) &&
          (!q || (g.name||g._id).toLowerCase().includes(q)));

    return (
      <div ref={ref} style={{ position:"fixed", zIndex:9999,
        top: (rect?.bottom ?? 0) + 4, left: rect?.left ?? 0,
        width:320, background:"white", border:"1px solid #c0d0e0", borderRadius:6,
        boxShadow:"0 4px 16px rgba(0,0,0,0.14)", overflow:"hidden" }}>
        <div style={{ padding:8, borderBottom:"1px solid #e0e8f0" }}>
          <input className="field-input" style={{ background:"#f8fafc" }}
            autoFocus placeholder={field==="requiredClasses" ? "Search courses…" : "Search groups…"}
            value={q} onChange={e => setQ(e.target.value)} />
        </div>
        <div style={{ maxHeight:220, overflowY:"auto" }}>
          {options.length === 0
            ? <div style={{ padding:"12px", fontSize:11, color:"#b0bec8", textAlign:"center" }}>Nothing to add.</div>
            : options.map(opt => {
                const label = field === "requiredClasses" ? opt.code : opt._id;
                const sub   = field === "requiredClasses" ? opt.name : opt.name;
                return (
                  <div key={label} onClick={() => { toggleItem(grade, field, label); closePicker(); }}
                    style={{ padding:"7px 12px", cursor:"pointer", fontSize:11,
                      display:"flex", gap:8, alignItems:"center" }}
                    onMouseEnter={e => e.currentTarget.style.background="#f0f4f8"}
                    onMouseLeave={e => e.currentTarget.style.background="white"}>
                    <span style={{ fontFamily:"monospace", fontWeight:"bold", color:"#1e3a5f", minWidth:70 }}>{label}</span>
                    <span style={{ color:"#8a9aaa" }}>{sub}</span>
                  </div>
                );
              })
          }
        </div>
      </div>
    );
  }

  const grpColor  = "#7c3aed";
  const classColor = "#0891b2";

  return (
    <div style={{ display:"flex", flexDirection:"column", height:"100%", overflow:"hidden" }}>
      {/* Header */}
      <div className="flb" style={{ padding:"14px 20px", borderBottom:"1px solid #e0e8f0", flexShrink:0 }}>
        <div style={{ fontSize:14, fontWeight:"bold", color:"#1e3a5f" }}>
          {isNew ? "New Student Type" : `Edit · ${typeData.name || typeData._id}`}
        </div>
        <button className="btn-ghost" onClick={onClose}>×</button>
      </div>

      <div style={{ flex:1, overflowY:"auto", padding:"16px 20px" }}>
        {/* Meta fields */}
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom:20 }}>
          <div>
            <label className="field-label">Type ID *</label>
            <input className="field-input" value={form.id}
              onChange={e => fld("id", e.target.value)} disabled={!isNew}
              placeholder="e.g. german-immersion" />
          </div>
          <div>
            <label className="field-label">Name *</label>
            <input className="field-input" value={form.name}
              onChange={e => fld("name", e.target.value)} placeholder="e.g. German Immersion" />
          </div>
          <div style={{ gridColumn:"1/-1" }}>
            <label className="field-label">Description</label>
            <input className="field-input" value={form.description}
              onChange={e => fld("description", e.target.value)}
              placeholder="Describe this student type…" />
          </div>
          <div>
            <label className="field-label">Extends (inherits from)</label>
            <select className="field-input" value={form.extends||""}
              onChange={e => fld("extends", e.target.value)}>
              <option value="">— None —</option>
              {allTypes.filter(t => t._id !== (typeData._id||"__new__")).map(t => (
                <option key={t._id} value={t._id}>{t.name} ({t._id})</option>
              ))}
            </select>
          </div>
          <div>
            <label className="field-label">Immersion Language</label>
            <input className="field-input" value={form.immersionLanguage||""}
              onChange={e => fld("immersionLanguage", e.target.value)}
              placeholder="e.g. German (leave blank if none)" />
          </div>
        </div>

        {/* Grade requirements */}
        <div className="section-title" style={{ marginBottom:12 }}>Grade Requirements</div>

        {allGrades.length === 0 && (
          <div style={{ fontSize:12, color:"#8a9aaa", fontStyle:"italic", marginBottom:12 }}>
            No grade requirements defined yet.{form.extends ? "" : " Add a grade below."}
          </div>
        )}

        {allGrades.map(grade => {
          const own = getOwnGradeReq(grade);
          const inh = getInheritedGradeReq(grade);
          const pickerKey = g => `${g}-classes`;
          const pickerKeyG = g => `${g}-groups`;

          return (
            <div key={grade} style={{ marginBottom:16, borderRadius:8, border:"1px solid #e0e8f0",
              overflow:"hidden", background:"white" }}>

              {/* Grade header */}
              <div className="flb" style={{ padding:"10px 14px",
                background: own ? "#f0f4ff" : "#fafafa",
                borderBottom:"1px solid #e0e8f0" }}>
                <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                  <span style={{ fontSize:13, fontWeight:"bold", color:"#1e3a5f" }}>Grade {grade}</span>
                  {!own && inh && (
                    <span style={{ fontSize:10, color:"#8a9aaa", fontStyle:"italic" }}>inherited only — no additions from this type</span>
                  )}
                </div>
                {own
                  ? <button onClick={() => removeGrade(grade)}
                      className="btn btn-secondary"
                      style={{ fontSize:10, padding:"2px 8px", color:"#b91c1c", borderColor:"#fecaca" }}>
                      Remove
                    </button>
                  : <button onClick={() => addGrade(grade)}
                      className="btn btn-secondary"
                      style={{ fontSize:10, padding:"2px 8px", color:"#15803d", borderColor:"#bbf7d0" }}>
                      + Add to this type
                    </button>
                }
              </div>

              {/* Inherited block */}
              {inh && (
                <div style={{ padding:"10px 14px", background:"#fafafa",
                  borderBottom: own ? "1px dashed #e0e8f0" : "none" }}>
                  <div style={{ fontSize:9, fontWeight:"bold", color:"#8a9aaa", textTransform:"uppercase",
                    letterSpacing:0.5, marginBottom:7 }}>
                    🔒 Inherited from {parentName}
                  </div>
                  {/* Inherited required classes */}
                  {inh.requiredClasses?.length > 0 && (
                    <div style={{ marginBottom:6 }}>
                      <div style={{ fontSize:10, color:"#0891b2", fontWeight:600, marginBottom:4 }}>
                        Required Classes (must take all):
                      </div>
                      <div className="fl" style={{ flexWrap:"wrap", gap:4 }}>
                        {inh.requiredClasses.map(code => {
                          const c = allCourses.find(x => x.code === code);
                          return <Chip key={code} label={code} sublabel={c?.name} color={classColor} locked title={`Inherited · ${c?.name||code}`} />;
                        })}
                      </div>
                    </div>
                  )}
                  {/* Inherited required groups */}
                  {inh.requiredGroups?.length > 0 && (
                    <div>
                      <div style={{ fontSize:10, color:"#7c3aed", fontWeight:600, marginBottom:4 }}>
                        Required Groups (satisfy one from each):
                      </div>
                      <div className="fl" style={{ flexWrap:"wrap", gap:4 }}>
                        {inh.requiredGroups.map(gid => {
                          const g = allGroups.find(x => x._id === gid);
                          return <Chip key={gid} label={gid} sublabel={g?.name} color={grpColor} locked title={`Inherited · ${g?.name||gid}`} />;
                        })}
                      </div>
                    </div>
                  )}
                </div>
              )}

              {/* Own editable block */}
              {own && (
                <div style={{ padding:"10px 14px" }}>
                  {form.extends && (
                    <div style={{ fontSize:9, fontWeight:"bold", color:"#4a90d9", textTransform:"uppercase",
                      letterSpacing:0.5, marginBottom:8 }}>
                      ✏ This type adds for Grade {grade}
                    </div>
                  )}

                  {/* Own required classes */}
                  <div style={{ marginBottom:10 }}>
                    <div style={{ fontSize:10, color:classColor, fontWeight:600, marginBottom:5 }}>
                      Required Classes (must take all):
                    </div>
                    <div className="fl" style={{ flexWrap:"wrap", gap:4, alignItems:"center", position:"relative" }}>
                      {own.requiredClasses?.map(code => {
                        const c = allCourses.find(x => x.code === code);
                        return <Chip key={code} label={code} sublabel={c?.name} color={classColor}
                          onRemove={() => toggleItem(grade, "requiredClasses", code)} />;
                      })}
                      <div style={{ position:"relative" }}>
                        <button className="btn btn-secondary"
                          style={{ fontSize:10, padding:"3px 8px", color:classColor, borderColor:classColor+"44" }}
                          onClick={e => {
                            const r = e.currentTarget.getBoundingClientRect();
                            setOpenPicker(p =>
                              p?.grade===grade && p?.field==="requiredClasses" ? null : { grade, field:"requiredClasses", rect:r }
                            );
                          }}>
                          + Class
                        </button>
                        {openPicker?.grade===grade && openPicker?.field==="requiredClasses" && (
                          <Picker grade={grade} field="requiredClasses" rect={openPicker.rect}
                            onClose={() => setOpenPicker(null)} />
                        )}
                      </div>
                    </div>
                  </div>

                  {/* Own required groups */}
                  <div>
                    <div style={{ fontSize:10, color:grpColor, fontWeight:600, marginBottom:5 }}>
                      Required Groups (satisfy one from each):
                    </div>
                    <div className="fl" style={{ flexWrap:"wrap", gap:4, alignItems:"center", position:"relative" }}>
                      {own.requiredGroups?.map(gid => {
                        const g = allGroups.find(x => x._id === gid);
                        return <Chip key={gid} label={gid} sublabel={g?.name} color={grpColor}
                          onRemove={() => toggleItem(grade, "requiredGroups", gid)} />;
                      })}
                      <div style={{ position:"relative" }}>
                        <button className="btn btn-secondary"
                          style={{ fontSize:10, padding:"3px 8px", color:grpColor, borderColor:grpColor+"44" }}
                          onClick={e => {
                            const r = e.currentTarget.getBoundingClientRect();
                            setOpenPicker(p =>
                              p?.grade===grade && p?.field==="requiredGroups" ? null : { grade, field:"requiredGroups", rect:r }
                            );
                          }}>
                          + Group
                        </button>
                        {openPicker?.grade===grade && openPicker?.field==="requiredGroups" && (
                          <Picker grade={grade} field="requiredGroups" rect={openPicker.rect}
                            onClose={() => setOpenPicker(null)} />
                        )}
                      </div>
                    </div>
                  </div>
                </div>
              )}
            </div>
          );

        })}

        {/* Add grade buttons */}
        {unusedGrades.length > 0 && (
          <div className="fl" style={{ gap:7, marginTop:4 }}>
            {unusedGrades.map(g => (
              <button key={g} className="btn btn-secondary"
                style={{ fontSize:11, color:"#1e3a5f", borderStyle:"dashed" }}
                onClick={() => addGrade(g)}>
                + Add Grade {g} requirements
              </button>
            ))}
          </div>
        )}
      </div>

      <div className="fl" style={{ gap:8, padding:"12px 20px", borderTop:"1px solid #e0e8f0", flexShrink:0 }}>
        <button className="btn btn-primary" onClick={save} disabled={saving} style={{ flex:1 }}>
          {saving ? "Saving…" : "Save Student Type"}
        </button>
        <button className="btn btn-secondary" onClick={onClose}>Cancel</button>
      </div>
    </div>
  );
}

// ── Student Types Tab wrapper ──────────────────────────────────────────────
function StudentTypesTab({ schoolId }) {
  const [studentTypes, setStudentTypes] = useState([]);
  const [groups,       setGroups]       = useState([]);
  const [courses,      setCourses]      = useState([]);
  const [loading,      setLoading]      = useState(true);
  const [sel,          setSel]          = useState(null); // { kind:"type"|"group", id:"_id"|"new" }
  const [importMsg,    setImportMsg]    = useState("");
  const importRef = useRef(null);

  useEffect(() => { loadAll(); }, [schoolId]);

  async function loadAll() {
    setLoading(true);
    try {
      const [t, g, c] = await Promise.all([
        fsGetAll(schoolId, "student-types"),
        fsGetAll(schoolId, "requirement-groups"),
        fsGetAll(schoolId, "courses").then(cs => cs.filter(x => x.active)),
      ]);
      setStudentTypes(t.sort((a,b) => (a.name||a._id).localeCompare(b.name||b._id)));
      setGroups(g.sort((a,b) => (a._id).localeCompare(b._id)));
      setCourses(c);
    } catch(e) { console.error(e); }
    setLoading(false);
  }

  async function onSaved() { await loadAll(); setSel(null); }

  function exportStudentTypes() {
    const wb = XLSX.utils.book_new();

    // Sheet 1 — Student Types (one row per type)
    const typeRows = [["ID","Name","Description","Extends","Immersion Language"]];
    studentTypes.forEach(t => {
      typeRows.push([t._id, t.name||"", t.description||"", t.extends||"", t.immersionLanguage||""]);
    });
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(typeRows), "Student Types");

    // Sheet 2 — Grade Requirements (one row per type × grade)
    const gradeRows = [["Type ID","Grade","Required Classes","Required Groups"]];
    studentTypes.forEach(t => {
      (t.gradeRequirements||[]).forEach(gr => {
        gradeRows.push([
          t._id,
          gr.grade,
          (gr.requiredClasses||[]).join("|"),
          (gr.requiredGroups||[]).join("|"),
        ]);
      });
    });
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(gradeRows), "Grade Requirements");

    // Sheet 3 — Requirement Groups
    const groupRows = [["ID","Name","Category","Courses"]];
    groups.forEach(g => {
      groupRows.push([g._id, g.name||"", g.category||"", (g.courses||[]).join("|")]);
    });
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(groupRows), "Requirement Groups");

    XLSX.writeFile(wb, "student-types-export.xlsx");
  }

  async function importStudentTypes(e) {
    const file = e.target.files?.[0];
    if (!file) return;
    if (importRef.current) importRef.current.value = "";
    setImportMsg("Importing…");
    try {
      const buf = await file.arrayBuffer();
      const wb  = XLSX.read(buf, { type:"array" });

      function sheetRows(name) {
        const ws = wb.Sheets[name];
        if (!ws) throw new Error(`Sheet "${name}" not found. Expected: "Student Types", "Grade Requirements", "Requirement Groups".`);
        return XLSX.utils.sheet_to_json(ws, { defval:"" });
      }

      const typeRowsRaw  = sheetRows("Student Types");
      const gradeRowsRaw = sheetRows("Grade Requirements");
      const groupRowsRaw = sheetRows("Requirement Groups");

      // Build grade requirements map keyed by type ID
      const gradeMap = {};
      gradeRowsRaw.forEach(r => {
        const tid   = String(r["Type ID"]||"").trim();
        const grade = Number(r["Grade"]);
        if (!tid || !grade) return;
        if (!gradeMap[tid]) gradeMap[tid] = [];
        gradeMap[tid].push({
          grade,
          requiredClasses: String(r["Required Classes"]||"").split("|").map(s=>s.trim()).filter(Boolean),
          requiredGroups:  String(r["Required Groups"]||"").split("|").map(s=>s.trim()).filter(Boolean),
        });
      });

      const batch = db.batch();
      const col = c => db.collection("schools").doc(schoolId).collection(c);

      // Import requirement groups first (student types reference them)
      let groupCount = 0;
      groupRowsRaw.forEach(r => {
        const id = String(r["ID"]||"").trim().toLowerCase();
        if (!id) return;
        batch.set(col("requirement-groups").doc(id), {
          id,
          name:     String(r["Name"]||"").trim(),
          category: String(r["Category"]||"").trim(),
          courses:  String(r["Courses"]||"").split("|").map(s=>s.trim()).filter(Boolean),
        }, { merge: true });
        groupCount++;
      });

      // Import student types
      let typeCount = 0;
      typeRowsRaw.forEach(r => {
        const id = String(r["ID"]||"").trim().toLowerCase().replace(/\s+/g,"-");
        if (!id) return;
        batch.set(col("student-types").doc(id), {
          id,
          name:              String(r["Name"]||"").trim(),
          description:       String(r["Description"]||"").trim(),
          extends:           String(r["Extends"]||"").trim(),
          immersionLanguage: String(r["Immersion Language"]||"").trim(),
          gradeRequirements: (gradeMap[id]||[]).sort((a,b) => a.grade - b.grade),
        }, { merge: true });
        typeCount++;
      });

      await batch.commit();
      await loadAll();
      setImportMsg(`✓ Imported ${typeCount} student type${typeCount!==1?"s":""} and ${groupCount} requirement group${groupCount!==1?"s":""}.`);
    } catch(err) { setImportMsg("Import failed: " + err.message); }
  }

  const selType  = sel?.kind === "type"  ? (sel.id === "new" ? EMPTY_STYPE : studentTypes.find(t => t._id === sel.id)) : null;
  const selGroup = sel?.kind === "group" ? (sel.id === "new" ? {} : groups.find(g => g._id === sel.id)) : null;

  const grpCatColor = { core:"#1e3a5f", "required-electives":"#7c3aed", electives:"#0891b2" };

  return (
    <div style={{ display:"flex", height:"calc(100vh - 48px)", overflow:"hidden" }}>

      {/* LEFT: Two-section sidebar */}
      <div style={{ width:268, background:"white", borderRight:"1px solid #e0e8f0",
        display:"flex", flexDirection:"column", flexShrink:0, overflowY:"auto" }}>

        {/* ── Export / Import toolbar ── */}
        <div style={{ padding:"7px 10px", borderBottom:"1px solid #e0e8f0",
          display:"flex", gap:6, justifyContent:"flex-end" }}>
          <button className="btn btn-secondary" style={{ fontSize:10, padding:"3px 8px" }}
            onClick={exportStudentTypes} disabled={loading || (studentTypes.length===0 && groups.length===0)}
            title="Export student types and requirement groups to Excel">
            ⬇ Export
          </button>
          <label className="btn btn-secondary"
            style={{ fontSize:10, padding:"3px 8px", cursor:"pointer", margin:0 }}
            title="Import student types and requirement groups from Excel">
            ⬆ Import
            <input ref={importRef} type="file" accept=".xlsx,.xls"
              onChange={importStudentTypes} style={{ display:"none" }} />
          </label>
        </div>
        {importMsg && (
          <div style={{ margin:"6px 10px 0", padding:"5px 10px", borderRadius:5, fontSize:11,
            background: importMsg.startsWith("✓") ? "#f0fdf4" : importMsg === "Importing…" ? "#f0f7ff" : "#fff5f5",
            color:      importMsg.startsWith("✓") ? "#15803d" : importMsg === "Importing…" ? "#1e3a5f" : "#b91c1c",
            border: `1px solid ${importMsg.startsWith("✓") ? "#bbf7d0" : importMsg === "Importing…" ? "#bfdbfe" : "#fecaca"}` }}>
            {importMsg}
            {importMsg !== "Importing…" &&
              <button style={{ background:"none", border:"none", cursor:"pointer", marginLeft:6, fontSize:10 }}
                onClick={() => setImportMsg("")}>✕</button>}
          </div>
        )}

        {/* ── Student Types section ── */}
        <div style={{ padding:"10px 14px 6px", borderBottom:"1px solid #f0f4f8" }}>
          <div className="flb">
            <div className="section-title">Student Types</div>
            <button className="btn btn-primary" style={{ fontSize:10, padding:"3px 8px" }}
              onClick={() => setSel({ kind:"type", id:"new" })}>+ Add</button>
          </div>
        </div>
        {loading
          ? <div style={{ padding:"12px 14px", fontSize:11, color:"#8a9aaa" }}>Loading…</div>
          : studentTypes.length === 0
          ? <div style={{ padding:"12px 14px", fontSize:11, color:"#8a9aaa", fontStyle:"italic" }}>None yet.</div>
          : studentTypes.map(t => {
              const active = sel?.kind==="type" && sel?.id===t._id;
              return (
                <div key={t._id} onClick={() => setSel({ kind:"type", id:t._id })}
                  style={{ padding:"9px 14px", cursor:"pointer",
                    borderLeft:`3px solid ${active ? "#4a90d9" : "transparent"}`,
                    background: active ? "#f0f7ff" : "white", borderBottom:"1px solid #f4f6f8" }}>
                  <div style={{ fontSize:12, fontWeight:"bold", color:"#1e2a3a" }}>{t.name||t._id}</div>
                  <div style={{ fontSize:10, color:"#8a9aaa", marginTop:1 }}>
                    {t.extends ? `↑ extends ${t.extends}` : "base type"}{t.immersionLanguage ? ` · ${t.immersionLanguage}` : ""}
                  </div>
                  {(t.gradeRequirements||[]).length > 0 && (
                    <div className="fl" style={{ gap:4, marginTop:4 }}>
                      {(t.gradeRequirements||[]).map(gr => (
                        <span key={gr.grade} className="badge"
                          style={{ background:"#f0f4f8", color:"#5a7a9a" }}>
                          Gr {gr.grade}
                        </span>
                      ))}
                    </div>
                  )}
                </div>
              );
            })
        }

        {/* ── Requirement Groups section ── */}
        <div style={{ padding:"12px 14px 6px", borderTop:"2px solid #e0e8f0", borderBottom:"1px solid #f0f4f8", marginTop:4 }}>
          <div className="flb">
            <div className="section-title">Requirement Groups</div>
            <button className="btn btn-primary" style={{ fontSize:10, padding:"3px 8px" }}
              onClick={() => setSel({ kind:"group", id:"new" })}>+ Add</button>
          </div>
        </div>
        {loading
          ? <div style={{ padding:"12px 14px", fontSize:11, color:"#8a9aaa" }}>Loading…</div>
          : groups.length === 0
          ? <div style={{ padding:"12px 14px", fontSize:11, color:"#8a9aaa", fontStyle:"italic" }}>None yet.</div>
          : groups.map(g => {
              const active = sel?.kind==="group" && sel?.id===g._id;
              const cc = grpCatColor[g.category] || "#6b7280";
              return (
                <div key={g._id} onClick={() => setSel({ kind:"group", id:g._id })}
                  style={{ padding:"8px 14px", cursor:"pointer",
                    borderLeft:`3px solid ${active ? cc : "transparent"}`,
                    background: active ? cc+"0e" : "white", borderBottom:"1px solid #f4f6f8" }}>
                  <div style={{ fontSize:11, fontWeight:"bold", color:"#1e2a3a", fontFamily:"monospace" }}>{g._id}</div>
                  {g.name && <div style={{ fontSize:10, color:"#6b7280", marginTop:1 }}>{g.name}</div>}
                  <div className="fl" style={{ gap:4, marginTop:4, flexWrap:"wrap" }}>
                    <span className="badge" style={{ background: cc+"15", color:cc }}>
                      {TOP_CAT_LABELS[g.category]||g.category}
                    </span>
                    <span className="badge" style={{ background:"#f0f4f8", color:"#5a7a9a" }}>
                      {(g.courses||[]).length} course{(g.courses||[]).length!==1?"s":""}
                    </span>
                  </div>
                </div>
              );
            })
        }
      </div>

      {/* RIGHT: Editor */}
      <div style={{ flex:1, background:"#f8fafc", overflow:"hidden", display:"flex", flexDirection:"column" }}>
        {!sel && (
          <div className="flc fld" style={{ height:"100%", gap:12, color:"#8a9aaa" }}>
            <div style={{ fontSize:32 }}>📋</div>
            <div style={{ fontSize:14 }}>Select a student type or requirement group to edit.</div>
            <div className="fl" style={{ gap:8 }}>
              <button className="btn btn-primary" onClick={() => setSel({ kind:"type", id:"new" })}>
                + New Student Type
              </button>
              <button className="btn btn-secondary" onClick={() => setSel({ kind:"group", id:"new" })}>
                + New Requirement Group
              </button>
            </div>
          </div>
        )}

        {sel?.kind === "group" && selGroup !== undefined && (
          <div style={{ background:"white", height:"100%" }}>
            <RequirementGroupEditor
              key={sel.id}
              group={selGroup || {}}
              courses={courses}
              studentTypes={studentTypes}
              isNew={sel.id === "new"}
              schoolId={schoolId}
              onSaved={onSaved}
              onClose={() => setSel(null)} />
          </div>
        )}

        {sel?.kind === "type" && selType !== undefined && (
          <div style={{ background:"white", height:"100%" }}>
            <StudentTypeEditor
              key={sel.id}
              typeData={selType || EMPTY_STYPE}
              allTypes={studentTypes}
              allGroups={groups}
              allCourses={courses}
              isNew={sel.id === "new"}
              schoolId={schoolId}
              onSaved={onSaved}
              onClose={() => setSel(null)} />
          </div>
        )}
      </div>
    </div>
  );
}

function LoginScreen() {
  const [busy, setBusy] = useState(false);
  const [err,  setErr]  = useState("");

  async function signIn() {
    setBusy(true); setErr("");
    try { await auth.signInWithPopup(googleProvider); }
    catch(e) { setErr(e.code === "auth/popup-closed-by-user" ? "" : (e.message || "Sign-in failed.")); }
    setBusy(false);
  }

  return (
    <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center",
      background:"linear-gradient(150deg,#1e3a5f 0%,#2d5a9e 100%)" }}>
      <div style={{ background:"white", borderRadius:14, padding:44, maxWidth:380, width:"92%",
        boxShadow:"0 12px 40px rgba(0,0,0,0.25)", textAlign:"center" }}>
        <div style={{ fontSize:44, marginBottom:10 }}>📅</div>
        <div style={{ fontSize:22, fontWeight:"bold", color:"#1e3a5f", marginBottom:6 }}>Course Scheduler</div>
        <div style={{ fontSize:13, color:"#8a9aaa", marginBottom:30, lineHeight:1.5 }}>
          School administration platform
        </div>
        <button onClick={signIn} disabled={busy}
          style={{ display:"flex", alignItems:"center", gap:10, margin:"0 auto",
            padding:"11px 22px", borderRadius:7, border:"1px solid #c0d0e0",
            background:"white", cursor:"pointer", fontSize:13, fontWeight:600,
            color:"#1e2a3a", boxShadow:"0 1px 4px rgba(0,0,0,0.08)" }}>
          <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width={18} height={18} alt="" />
          {busy ? "Signing in…" : "Sign in with Google"}
        </button>
        {err && <div style={{ marginTop:14, fontSize:11, color:"#b91c1c" }}>{err}</div>}
      </div>
    </div>
  );
}

// mode "initial" = new / rejected user, not yet active anywhere
// mode "add"     = already active user adding access to another school
function SchoolPickerScreen({ user, mode = "initial", enrolledSchoolIds = [], onClose }) {
  const [schools,    setSchools]    = useState([]);
  const [loading,    setLoading]    = useState(true);
  const [selected,   setSelected]   = useState(null);
  const [busy,       setBusy]       = useState(false);
  const [sent,       setSent]       = useState(false);
  // "create new school" mode
  const [creating,   setCreating]   = useState(false);
  const [newName,    setNewName]    = useState("");
  const [newId,      setNewId]      = useState("");
  const [idManual,   setIdManual]   = useState(false); // true once user hand-edits the ID

  useEffect(() => {
    db.collection("schools").where("active","==",true).get()
      .then(s => { setSchools(s.docs.map(d => ({ id:d.id, ...d.data() }))); setLoading(false); })
      .catch(() => setLoading(false));
  }, []);

  // Auto-derive a Firestore-safe school ID from the name while the user types,
  // unless they've manually overridden it.
  function handleNameChange(val) {
    setNewName(val);
    if (!idManual) {
      setNewId(val.toLowerCase().trim()
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-+|-+$/g, "")
        .slice(0, 40));
    }
  }

  async function requestAccess() {
    if (!selected) return;
    setBusy(true);
    try {
      const now       = firebase.firestore.FieldValue.serverTimestamp();
      const baseData  = {
        uid: user.uid, email: user.email,
        displayName: user.displayName || user.email,
        photoURL: user.photoURL || null,
      };

      // Check if the target school has any active users — works the same in
      // both modes.  If the school is empty, the requester becomes admin
      // automatically.  This is the only way to recover a school that lost
      // all its users due to a bug or accidental removal.
      const existingSnap = await db.collection("schools").doc(selected)
        .collection("access").where("status","==","active").limit(1).get();
      const isFirst = existingSnap.empty;

      if (mode === "add") {
        // Already active at another school — add a map entry without changing
        // the current session.  Use update() + dot notation so other entries
        // in the schools map are preserved.
        const statusVal = isFirst ? "active" : "pending";
        const roleVal   = isFirst ? "admin"  : null;
        const batch = db.batch();
        batch.update(db.collection("users").doc(user.uid), {
          [`schools.${selected}`]: { status: statusVal, role: roleVal },
          updatedAt: now,
        });
        batch.set(
          db.collection("schools").doc(selected).collection("access").doc(user.uid),
          { ...baseData, status: statusVal, role: roleVal, requestedAt: now, updatedAt: now },
          { merge: true }
        );
        await batch.commit();
        setSent(true);
        return;
      }

      // ── initial mode ───────────────────────────────────────────────────────
      // (isFirst already computed above)

      const statusVal = isFirst ? "active" : "pending";
      const roleVal   = isFirst ? "admin"  : null;
      const userFields = isFirst
        ? { ...baseData, status:"active", schoolId:selected, role:"admin",
            requestedSchoolId:selected, requestedAt:now, updatedAt:now,
            schools:{ [selected]: { role:"admin", status:"active" } } }
        : { ...baseData, status:"pending", requestedSchoolId:selected, requestedAt:now,
            schools:{ [selected]: { role:null,    status:"pending" } } };

      const batch = db.batch();
      batch.set(db.collection("users").doc(user.uid), userFields, { merge:true });
      batch.set(db.collection("schools").doc(selected).collection("access").doc(user.uid),
        { ...baseData, status:statusVal, role:roleVal, requestedAt:now, updatedAt:now },
        { merge:true });
      if (isFirst) {
        batch.set(db.collection("schools").doc(selected),
          { name: schools.find(s=>s.id===selected)?.name || selected, active:true },
          { merge:true });
      }
      await batch.commit();
      setSent(true);
    } catch(e) { alert("Request failed: " + e.message); }
    setBusy(false);
  }

  async function createSchool() {
    const name = newName.trim();
    const id   = newId.trim();
    if (!name) { alert("School name is required."); return; }
    if (!id || !/^[a-z0-9][a-z0-9-]*[a-z0-9]$/.test(id)) {
      alert("School ID must be lowercase letters, numbers, and hyphens (no leading/trailing hyphens).");
      return;
    }
    setBusy(true);
    try {
      const existing = await db.collection("schools").doc(id).get();
      if (existing.exists) {
        alert(`The ID "${id}" is already in use. Please choose a different ID.`);
        setBusy(false);
        return;
      }
      const now      = firebase.firestore.FieldValue.serverTimestamp();
      const baseData = {
        uid: user.uid, email: user.email,
        displayName: user.displayName || user.email,
        photoURL: user.photoURL || null,
      };
      const batch = db.batch();
      batch.set(db.collection("schools").doc(id), { name, active:true });
      batch.set(db.collection("schools").doc(id).collection("access").doc(user.uid), {
        ...baseData, status:"active", role:"admin", requestedAt:now, updatedAt:now,
      }, { merge:true });

      if (mode === "add") {
        // Keep current session; just add the new school to the map
        batch.update(db.collection("users").doc(user.uid), {
          [`schools.${id}`]: { role:"admin", status:"active" },
          updatedAt: now,
        });
      } else {
        // New user — set as primary school
        batch.set(db.collection("users").doc(user.uid), {
          ...baseData, status:"active", schoolId:id, role:"admin",
          requestedSchoolId:id, requestedAt:now, updatedAt:now,
          schools:{ [id]: { role:"admin", status:"active" } },
        }, { merge:true });
      }
      await batch.commit();
      setSent(true);
    } catch(e) { alert("Create failed: " + e.message); }
    setBusy(false);
  }

  // In add mode, "sent" just closes the overlay; in initial mode the
  // AuthProvider listener auto-re-renders the gate.
  if (sent) {
    if (mode === "add" && onClose) onClose();
    return null;
  }

  // ── Card wrapper ────────────────────────────────────────────────────────────
  const card = (title, subtitle, body, footer) => (
    <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center",
      background:"linear-gradient(150deg,#1e3a5f 0%,#2d5a9e 100%)" }}>
      <div style={{ background:"white", borderRadius:14, padding:32, maxWidth:480, width:"92%",
        boxShadow:"0 12px 40px rgba(0,0,0,0.25)" }}>
        <div style={{ marginBottom:18 }}>
          <div style={{ fontSize:17, fontWeight:"bold", color:"#1e3a5f", marginBottom:4 }}>{title}</div>
          <div style={{ fontSize:12, color:"#8a9aaa" }}>{subtitle}</div>
        </div>
        {body}
        <div className="fl" style={{ gap:8, justifyContent:"flex-end", marginTop:18 }}>{footer}</div>
      </div>
    </div>
  );

  const signOutBtn = mode === "add"
    ? <button className="btn btn-secondary" style={{ fontSize:12 }}
        onClick={() => onClose && onClose()}>Cancel</button>
    : <button className="btn btn-secondary" style={{ fontSize:12 }}
        onClick={() => auth.signOut()}>Sign out</button>;

  // ── Create new school form ──────────────────────────────────────────────────
  if (creating) {
    return card(
      "Create New School",
      <>Signed in as <strong>{user.email}</strong>. You'll be set as the first admin.</>,
      <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
        <div>
          <label style={{ fontSize:12, color:"#4a5568", fontWeight:600, display:"block", marginBottom:4 }}>
            School Name <span style={{ color:"#e53e3e" }}>*</span>
          </label>
          <input className="inp" style={{ width:"100%", boxSizing:"border-box" }}
            placeholder="e.g. Northview Middle School"
            value={newName} onChange={e => handleNameChange(e.target.value)} autoFocus />
        </div>
        <div>
          <label style={{ fontSize:12, color:"#4a5568", fontWeight:600, display:"block", marginBottom:4 }}>
            School ID <span style={{ color:"#e53e3e" }}>*</span>
            <span style={{ fontWeight:400, color:"#8a9aaa", marginLeft:6 }}>
              (used in the database — lowercase, no spaces)
            </span>
          </label>
          <input className="inp" style={{ width:"100%", boxSizing:"border-box", fontFamily:"monospace", fontSize:13 }}
            placeholder="e.g. northview-middle"
            value={newId}
            onChange={e => { setIdManual(true); setNewId(e.target.value.toLowerCase().replace(/[^a-z0-9-]/g,"")); }} />
        </div>
        <div style={{ fontSize:11, color:"#8a9aaa", background:"#f8fafc",
          border:"1px solid #e0e8f0", borderRadius:6, padding:"8px 12px" }}>
          💡 The School ID cannot be changed after creation. Keep it short and descriptive.
        </div>
      </div>,
      <>
        {signOutBtn}
        <button className="btn btn-secondary" style={{ fontSize:12 }}
          onClick={() => { setCreating(false); setNewName(""); setNewId(""); setIdManual(false); }}>
          ← Back
        </button>
        <button className="btn btn-primary" style={{ fontSize:12 }}
          onClick={createSchool} disabled={!newName.trim() || !newId.trim() || busy}>
          {busy ? "Creating…" : "Create School"}
        </button>
      </>
    );
  }

  // ── School picker ───────────────────────────────────────────────────────────
  // In "add" mode, hide schools the user already belongs to
  const visibleSchools = mode === "add"
    ? schools.filter(s => !enrolledSchoolIds.includes(s.id))
    : schools;

  return card(
    mode === "add" ? "Request Access to Another School" : "Select Your School",
    <>Signed in as <strong>{user.email}</strong>.{mode === "add" ? " Select a school to request access." : " Choose your school below."}</>,
    loading
      ? <div style={{ textAlign:"center", padding:28, color:"#8a9aaa", fontSize:12 }}>Loading schools…</div>
      : <>
          {visibleSchools.length === 0
            ? <div style={{ textAlign:"center", padding:"20px 0 8px", color:"#8a9aaa", fontSize:13 }}>
                {mode === "add" ? "No other schools available." : "No schools have been set up yet."}
              </div>
            : <div style={{ maxHeight:260, overflowY:"auto", border:"1px solid #e0e8f0",
                borderRadius:8, marginBottom:12 }}>
                {visibleSchools.map((s, i) => (
                  <div key={s.id} onClick={() => setSelected(s.id)}
                    style={{ padding:"11px 16px", cursor:"pointer", display:"flex",
                      alignItems:"center", gap:10,
                      background: selected===s.id ? "#f0f7ff" : i%2===0 ? "white" : "#fafcff",
                      borderBottom: i < visibleSchools.length-1 ? "1px solid #f0f4f8" : "none",
                      borderLeft: `3px solid ${selected===s.id ? "#4a90d9" : "transparent"}` }}>
                    <input type="radio" readOnly checked={selected===s.id} style={{ flexShrink:0 }} />
                    <div>
                      <div style={{ fontSize:13, fontWeight:"bold", color:"#1e2a3a" }}>{s.name}</div>
                      <div style={{ fontSize:10, color:"#b0bec8", fontFamily:"monospace" }}>{s.id}</div>
                    </div>
                  </div>
                ))}
              </div>
          }
          <div style={{ textAlign:"center", padding:"6px 0 0" }}>
            <button style={{ background:"none", border:"none", color:"#4a90d9", fontSize:12,
              cursor:"pointer", textDecoration:"underline" }}
              onClick={() => setCreating(true)}>
              + Create a new school
            </button>
          </div>
        </>,
    <>
      {signOutBtn}
      {visibleSchools.length > 0 &&
        <button className="btn btn-primary" style={{ fontSize:12 }}
          onClick={requestAccess} disabled={!selected || busy}>
          {busy ? "Sending…" : "Request Access"}
        </button>
      }
    </>
  );
}

function PendingScreen({ user, userDoc }) {
  const [schoolName, setSchoolName] = useState("");
  const [withdrawing, setWithdrawing] = useState(false);
  const [retrying,    setRetrying]    = useState(false);

  // Derive the pending school from the schools map (not just requestedSchoolId,
  // which may be stale for users with multiple school entries).
  const pendingSchoolId = (() => {
    const schools = userDoc?.schools || {};
    const entry = Object.entries(schools).find(([, s]) => s.status === "pending");
    return entry ? entry[0] : (userDoc?.requestedSchoolId || null);
  })();

  useEffect(() => {
    if (!pendingSchoolId) return;
    db.collection("schools").doc(pendingSchoolId).get()
      .then(s => { if (s.exists) setSchoolName(s.data().name || pendingSchoolId); })
      .catch(() => {});
  }, [pendingSchoolId]);

  // Withdraw the pending request and show the school picker so the user can
  // either pick a different school or re-request the same one.  If the school
  // is empty (no active admins), re-requesting will auto-approve them as admin.
  async function withdraw() {
    if (!confirm("Withdraw your request to join " + (schoolName || pendingSchoolId) + "?")) return;
    setWithdrawing(true);
    try {
      const now = firebase.firestore.FieldValue.serverTimestamp();
      const batch = db.batch();
      if (pendingSchoolId) {
        // Remove the pending entry from the schools map
        batch.update(db.collection("users").doc(user.uid), {
          [`schools.${pendingSchoolId}`]: firebase.firestore.FieldValue.delete(),
          updatedAt: now,
        });
        // Update the access doc so the school's admin panel reflects the withdrawal
        batch.update(
          db.collection("schools").doc(pendingSchoolId).collection("access").doc(user.uid),
          { status: "withdrawn", updatedAt: now }
        );
      }
      await batch.commit();
      setRetrying(true);
    } catch(e) {
      alert("Withdraw failed: " + e.message);
      setWithdrawing(false);
    }
  }

  if (retrying) return <SchoolPickerScreen user={user} mode="initial" />;

  return (
    <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center",
      background:"linear-gradient(150deg,#1e3a5f 0%,#2d5a9e 100%)" }}>
      <div style={{ background:"white", borderRadius:14, padding:40, maxWidth:400, width:"92%",
        boxShadow:"0 12px 40px rgba(0,0,0,0.25)", textAlign:"center" }}>
        <div style={{ fontSize:44, marginBottom:14 }}>⏳</div>
        <div style={{ fontSize:18, fontWeight:"bold", color:"#1e3a5f", marginBottom:8 }}>
          Access Pending
        </div>
        <div style={{ fontSize:13, color:"#4a6080", lineHeight:1.6, marginBottom:8 }}>
          Your request to join <strong>{schoolName || pendingSchoolId}</strong> has been submitted.
          An administrator will review it shortly.
        </div>
        <div style={{ fontSize:11, color:"#b0bec8", marginBottom:24 }}>
          This page updates automatically when approved — no refresh needed.
        </div>
        <div className="fl" style={{ gap:8, justifyContent:"center" }}>
          <button className="btn btn-secondary" style={{ fontSize:12 }}
            onClick={() => auth.signOut()}>Sign out</button>
          <button className="btn btn-secondary"
            style={{ fontSize:12, color:"#b45309", borderColor:"#fde68a" }}
            disabled={withdrawing}
            onClick={withdraw}>
            {withdrawing ? "Withdrawing…" : "Withdraw & try different school"}
          </button>
        </div>
      </div>
    </div>
  );
}

function RejectedScreen({ user, userDoc }) {
  const [retrying, setRetrying] = useState(false);

  function retry() { setRetrying(true); }

  // Show the school picker in "add" mode so requestAccess() uses dot-notation
  // update() — this preserves all existing school map entries and only adds
  // the new pending entry.  onClose takes them back to this screen (cancel),
  // but once they submit a request useAuth() detects the new pending entry
  // and AuthGate transitions to PendingScreen automatically.
  if (retrying) return (
    <SchoolPickerScreen user={user} mode="add" enrolledSchoolIds={[]}
      onClose={() => setRetrying(false)} />
  );

  return (
    <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center",
      background:"linear-gradient(150deg,#1e3a5f 0%,#2d5a9e 100%)" }}>
      <div style={{ background:"white", borderRadius:14, padding:40, maxWidth:400, width:"92%",
        boxShadow:"0 12px 40px rgba(0,0,0,0.25)", textAlign:"center" }}>
        <div style={{ fontSize:44, marginBottom:14 }}>🚫</div>
        <div style={{ fontSize:18, fontWeight:"bold", color:"#1e3a5f", marginBottom:8 }}>
          Access Not Approved
        </div>
        <div style={{ fontSize:13, color:"#4a6080", lineHeight:1.6, marginBottom:24 }}>
          Your access request was not approved. Please contact your school administrator,
          or request access to a different school.
        </div>
        <div className="fl" style={{ gap:8, justifyContent:"center" }}>
          <button className="btn btn-secondary" style={{ fontSize:12 }}
            onClick={() => auth.signOut()}>Sign out</button>
          <button className="btn btn-primary" style={{ fontSize:12 }}
            onClick={retry}>Request Different School</button>
        </div>
      </div>
    </div>
  );
}

function AuthGate() {
  const { loading, user, userDoc, effectiveStatus, schoolId } = useAuth();
  if (loading)                                       return <LoadingScreen />;
  if (!user)                                         return <LoginScreen />;
  // No user doc yet — first sign-in, needs to join a school.
  if (!userDoc)                                      return <SchoolPickerScreen user={user} />;
  // effectiveStatus is derived from the schools map (with back-compat for
  // legacy docs), so these checks work regardless of top-level field state.
  if (effectiveStatus === "pending")                 return <PendingScreen user={user} userDoc={userDoc} />;
  if (effectiveStatus === "rejected")                return <RejectedScreen user={user} userDoc={userDoc} />;
  // Active but no active school resolved (removed from only school, or brand
  // new before approval) → show picker so they can request access.
  if (effectiveStatus === "active" && !schoolId) {
    const enrolledIds = Object.keys(userDoc.schools || {});
    return <SchoolPickerScreen user={user} enrolledSchoolIds={enrolledIds} />;
  }
  if (effectiveStatus === "active")                  return <App />;
  // Fallback: no recognisable status (truly blank doc) → show picker.
  return <SchoolPickerScreen user={user} />;
}

// ══════════════════════════════════════════════════════════════════════════════
// USERS PANEL  (admin view: approve/reject access requests + manage active users)
// ══════════════════════════════════════════════════════════════════════════════
function UsersPanel({ schoolId }) {
  const { role, userId } = useAuth();
  const [users,   setUsers]   = useState([]);
  const [loading, setLoading] = useState(true);
  const [busyId,  setBusyId]  = useState(null);

  useEffect(() => { loadUsers(); }, [schoolId]);

  async function loadUsers() {
    setLoading(true);
    try {
      const snap = await db.collection("schools").doc(schoolId).collection("access").get();
      setUsers(snap.docs.map(d => ({ uid:d.id, ...d.data() }))
        .sort((a,b) => {
          const order = { pending:0, active:1, rejected:2, removed:3 };
          return (order[a.status]??9) - (order[b.status]??9) ||
                 (a.displayName||"").localeCompare(b.displayName||"");
        }));
    } catch(e) { console.error(e); }
    setLoading(false);
  }

  async function approve(uid, accessRole) {
    setBusyId(uid);
    try {
      const now = firebase.firestore.FieldValue.serverTimestamp();

      // Read the target's doc only to decide whether they already have an
      // active school.  If not (first-ever approval), we also set the
      // top-level session fields so useAuth() picks them up immediately.
      // If they're already active somewhere, useAuth()'s background healer
      // will keep the top-level fields correct — we don't touch them here.
      const targetSnap = await db.collection("users").doc(uid).get();
      const targetDoc  = targetSnap.exists ? targetSnap.data() : {};
      const schoolsMap = targetDoc.schools || {};
      // Back-compat: a legacy user may be active at a school that predates
      // the map feature — their schoolId is set but not in the map.  Treat
      // that as an active school so we don't clobber their session.
      const mapHasActive    = Object.values(schoolsMap).some(s => s.status === "active");
      const legacyActive    = targetDoc.status === "active" && !!targetDoc.schoolId
                              && !schoolsMap[targetDoc.schoolId];
      const hasActiveSchool = mapHasActive || legacyActive;

      const userUpdate = {
        [`schools.${schoolId}`]: { role: accessRole, status: "active" },
        updatedAt: now,
      };
      if (!hasActiveSchool) {
        // First approval — seed the top-level session fields.
        userUpdate.status   = "active";
        userUpdate.schoolId = schoolId;
        userUpdate.role     = accessRole;
      }

      const batch = db.batch();
      batch.update(db.collection("users").doc(uid), userUpdate);
      batch.set(
        db.collection("schools").doc(schoolId).collection("access").doc(uid),
        { status: "active", role: accessRole, updatedAt: now },
        { merge: true }
      );
      await batch.commit();
      await loadUsers();
    } catch(e) { alert("Approve failed: " + e.message); }
    setBusyId(null);
  }

  async function reject(uid) {
    if (!confirm("Reject this access request?")) return;
    setBusyId(uid);
    try {
      const now = firebase.firestore.FieldValue.serverTimestamp();
      // Only update this school's map entry and access doc.
      // Never touch top-level status/schoolId — the user may be active
      // at a completely different school.
      const batch = db.batch();
      batch.update(db.collection("users").doc(uid), {
        [`schools.${schoolId}`]: { status:"rejected", role:null },
        updatedAt: now,
      });
      batch.update(db.collection("schools").doc(schoolId).collection("access").doc(uid),
        { status:"rejected", updatedAt:now });
      await batch.commit();
      await loadUsers();
    } catch(e) { alert("Reject failed: " + e.message); }
    setBusyId(null);
  }

  // Returns true if uid is the sole active admin for this school.
  function isLastAdmin(uid) {
    const activeAdmins = users.filter(u => u.status === "active" && u.role === "admin");
    return activeAdmins.length === 1 && activeAdmins[0].uid === uid;
  }

  async function removeUser(uid) {
    if (isLastAdmin(uid)) {
      alert("Cannot remove the only admin. Assign another admin first.");
      return;
    }
    if (!confirm("Remove this user's access?")) return;
    setBusyId(uid);
    try {
      const now = firebase.firestore.FieldValue.serverTimestamp();

      // ONLY mark this school's map entry as removed and update the access doc.
      // We deliberately do NOT read the user's doc or touch any top-level
      // fields.  useAuth()'s schools-map derivation + background healer will
      // detect that this school is gone and re-derive the correct session
      // (switching to another active school, or clearing to "pending" if none).
      const batch = db.batch();
      batch.update(db.collection("users").doc(uid), {
        [`schools.${schoolId}`]: { status: "removed", role: null },
        updatedAt: now,
      });
      batch.update(
        db.collection("schools").doc(schoolId).collection("access").doc(uid),
        { status: "removed", updatedAt: now }
      );
      await batch.commit();
      await loadUsers();
    } catch(e) { alert("Remove failed: " + e.message); }
    setBusyId(null);
  }

  async function changeRole(uid, newRole) {
    if (newRole !== "admin" && isLastAdmin(uid)) {
      alert("Cannot demote the only admin. Assign another admin first.");
      return;
    }
    setBusyId(uid);
    try {
      const now = firebase.firestore.FieldValue.serverTimestamp();

      // ONLY touch this school's map entry and access doc.
      // We deliberately do NOT read the user's doc or write the top-level
      // role field.  useAuth()'s background healer will update the top-level
      // role the next time the user's doc snapshot fires (i.e. immediately,
      // since we're writing to it now), so the change takes effect without
      // any manual top-level manipulation here.
      const batch = db.batch();
      batch.update(db.collection("users").doc(uid), {
        [`schools.${schoolId}`]: { role: newRole, status: "active" },
        updatedAt: now,
      });
      batch.update(
        db.collection("schools").doc(schoolId).collection("access").doc(uid),
        { role: newRole, updatedAt: now }
      );
      await batch.commit();
      setUsers(us => us.map(u => u.uid === uid ? { ...u, role: newRole } : u));
    } catch(e) { alert("Role change failed: " + e.message); }
    setBusyId(null);
  }

  if (role !== "admin") {
    return (
      <div style={{ padding:40, textAlign:"center", color:"#8a9aaa", fontSize:13 }}>
        Only school administrators can manage users.
      </div>
    );
  }

  const pending  = users.filter(u => u.status === "pending");
  const active   = users.filter(u => u.status === "active");
  const inactive = users.filter(u => u.status === "rejected" || u.status === "removed" || u.status === "withdrawn");

  const UserRow = ({ u, actions }) => (
    <div style={{ display:"flex", alignItems:"center", gap:10, padding:"10px 16px",
      borderBottom:"1px solid #f0f4f8", opacity: busyId===u.uid ? 0.5 : 1 }}>
      {u.photoURL
        ? <img src={u.photoURL} style={{ width:32, height:32, borderRadius:"50%", flexShrink:0 }} alt="" />
        : <div style={{ width:32, height:32, borderRadius:"50%", background:"#e0e8f0",
            display:"flex", alignItems:"center", justifyContent:"center",
            fontSize:14, color:"#5a7a9a", flexShrink:0 }}>
            {(u.displayName||u.email||"?")[0].toUpperCase()}
          </div>
      }
      <div style={{ flex:1, minWidth:0 }}>
        <div style={{ fontSize:13, fontWeight:"bold", color:"#1e2a3a", overflow:"hidden",
          textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
          {u.displayName || u.email}
          {u.uid === userId && <span style={{ fontSize:10, color:"#4a90d9", marginLeft:6 }}>(you)</span>}
        </div>
        <div style={{ fontSize:10, color:"#8a9aaa", overflow:"hidden", textOverflow:"ellipsis",
          whiteSpace:"nowrap" }}>
          {u.email}
        </div>
      </div>
      {actions}
    </div>
  );

  return (
    <div style={{ overflowY:"auto", height:"100%" }}>
      <div style={{ maxWidth:700, margin:"0 auto", padding:28 }}>
        <div style={{ fontSize:18, fontWeight:"bold", color:"#1e3a5f", marginBottom:4 }}>Users & Access</div>
        <div style={{ fontSize:12, color:"#8a9aaa", marginBottom:24 }}>
          Manage who can access this school's data. When users sign in for the first time,
          they appear here as pending requests.
        </div>

        {loading
          ? <div style={{ textAlign:"center", padding:32, color:"#8a9aaa" }}>Loading…</div>
          : <>
            {/* Pending requests */}
            {pending.length > 0 && (
              <div style={{ background:"white", borderRadius:8, border:"1px solid #fde68a",
                marginBottom:16, overflow:"hidden" }}>
                <div style={{ padding:"10px 16px", background:"#fffbeb", borderBottom:"1px solid #fde68a",
                  display:"flex", alignItems:"center", gap:8 }}>
                  <span style={{ fontSize:16 }}>⏳</span>
                  <span style={{ fontSize:13, fontWeight:"bold", color:"#92400e" }}>
                    Pending Requests ({pending.length})
                  </span>
                </div>
                {pending.map(u => (
                  <UserRow key={u.uid} u={u} actions={
                    <div className="fl" style={{ gap:6, flexShrink:0 }}>
                      <select
                        id={`role-${u.uid}`}
                        defaultValue="staff"
                        style={{ border:"1px solid #c0d0e0", borderRadius:4, fontSize:11,
                          padding:"3px 6px", color:"#1e2a3a", background:"white" }}>
                        <option value="staff">Staff</option>
                        <option value="admin">Admin</option>
                      </select>
                      <button className="btn btn-primary" style={{ fontSize:11, padding:"4px 10px" }}
                        disabled={busyId===u.uid}
                        onClick={() => {
                          const sel = document.getElementById(`role-${u.uid}`);
                          approve(u.uid, sel?.value || "staff");
                        }}>
                        Approve
                      </button>
                      <button className="btn btn-secondary"
                        style={{ fontSize:11, padding:"4px 10px", color:"#b91c1c", borderColor:"#fecaca" }}
                        disabled={busyId===u.uid}
                        onClick={() => reject(u.uid)}>
                        Reject
                      </button>
                    </div>
                  } />
                ))}
              </div>
            )}

            {/* Active users */}
            <div style={{ background:"white", borderRadius:8, border:"1px solid #e0e8f0",
              marginBottom:16, overflow:"hidden" }}>
              <div style={{ padding:"10px 16px", background:"#f8fafc",
                borderBottom:"1px solid #e0e8f0", display:"flex", alignItems:"center", gap:8 }}>
                <span style={{ fontSize:16 }}>✅</span>
                <span style={{ fontSize:13, fontWeight:"bold", color:"#1e3a5f" }}>
                  Active Users ({active.length})
                </span>
              </div>
              {active.length === 0
                ? <div style={{ padding:16, fontSize:12, color:"#8a9aaa", fontStyle:"italic" }}>
                    No active users yet.
                  </div>
                : active.map(u => (
                  <UserRow key={u.uid} u={u} actions={
                    <div className="fl" style={{ gap:6, alignItems:"center", flexShrink:0 }}>
                      <select value={u.role||"staff"} disabled={u.uid===userId}
                        onChange={e => changeRole(u.uid, e.target.value)}
                        style={{ border:"1px solid #c0d0e0", borderRadius:4, fontSize:11,
                          padding:"3px 6px", color:"#1e2a3a", background:"white",
                          opacity: u.uid===userId ? 0.5 : 1 }}>
                        <option value="staff">Staff</option>
                        <option value="admin">Admin</option>
                      </select>
                      {u.uid !== userId && (
                        <button className="btn btn-secondary"
                          style={{ fontSize:11, padding:"4px 8px", color:"#b91c1c", borderColor:"#fecaca" }}
                          disabled={busyId===u.uid}
                          onClick={() => removeUser(u.uid)}>
                          Remove
                        </button>
                      )}
                    </div>
                  } />
              ))}
            </div>

            {/* Rejected/removed */}
            {inactive.length > 0 && (
              <div style={{ background:"white", borderRadius:8, border:"1px solid #e0e8f0",
                overflow:"hidden", opacity:0.8 }}>
                <div style={{ padding:"10px 16px", background:"#f8fafc",
                  borderBottom:"1px solid #e0e8f0", fontSize:13, fontWeight:"bold", color:"#8a9aaa" }}>
                  Rejected / Removed ({inactive.length})
                </div>
                {inactive.map(u => (
                  <UserRow key={u.uid} u={u} actions={
                    <div className="fl" style={{ gap:6, flexShrink:0 }}>
                      <select
                        id={`reinstate-role-${u.uid}`}
                        defaultValue="staff"
                        style={{ border:"1px solid #c0d0e0", borderRadius:4, fontSize:11,
                          padding:"3px 6px", color:"#1e2a3a", background:"white" }}>
                        <option value="staff">Staff</option>
                        <option value="admin">Admin</option>
                      </select>
                      <button className="btn btn-secondary"
                        style={{ fontSize:11, padding:"4px 10px", color:"#065f46", borderColor:"#bbf7d0" }}
                        disabled={busyId===u.uid}
                        title="Restore this user's access"
                        onClick={() => {
                          const sel = document.getElementById(`reinstate-role-${u.uid}`);
                          approve(u.uid, sel?.value || "staff");
                        }}>
                        Reinstate
                      </button>
                    </div>
                  } />
                ))}
              </div>
            )}
          </>
        }
      </div>
    </div>
  );
}

/// ── School page: wraps Configuration + Users sub-tabs ──────────────────────

  const sub    = initialSub || "config";

    <div style={{ display:"flex", flexDirection:"column", height:"calc(100vh - 48px)" }}>
      <div style={{ display:"flex", background:"white", borderBottom:"1px solid #e0e8f0",
        padding:"0 20px", flexShrink:0 }}>
        {[["config","⚙ Configuration"],["users","👥 Users & Access"]].map(([id,lbl]) => (
          <button key={id} onClick={() => setSub(id)}
            style={{ padding:"10px 18px", border:"none", cursor:"pointer", fontSize:12,
              background:"none", fontWeight: sub===id ? "bold" : "normal",

              borderBottom: sub===id ? "2px solid #4a90d9" : "2px solid transparent" }}>
            {lbl}
          </button>
        ))}
      </div>
      <div style={{ flex:1, overflow:"hidden" }}>
        {sub === "config" && <SchoolConfig schoolId={schoolId} onConfigSaved={onConfigSaved} />}

  );
}
