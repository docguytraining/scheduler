        };
        batch.set(fsCol(schoolId, "teachers").doc(id), teacher, { merge: true });
        count++;
      });

      await batch.commit();
      await fsGetAll(schoolId, "teachers").then(setTeachers);
      setImportMsg(`✓ Imported ${count} teacher${count !== 1 ? "s" : ""}.`);
    } catch(err) { setImportMsg("Import failed: " + err.message); }
  }

  const thStyle = { padding:"7px 10px", textAlign:"left", fontSize:10, fontWeight:"bold",
    color:"#5a7a9a", textTransform:"uppercase", letterSpacing:0.4, whiteSpace:"nowrap" };
  const tdStyle = { padding:"5px 10px", verticalAlign:"middle", fontSize:11 };

  return (
    <div style={{ display:"flex", height:"calc(100vh - 48px)", overflow:"hidden" }}>

      {/* CENTER: cards / list */}
      <div style={{ flex:1, overflowY:"auto", padding:18, background:"#f8fafc" }}>

        {/* ── Toolbar ── */}
        <div className="flb" style={{ marginBottom:14, flexWrap:"wrap", gap:8, alignItems:"center" }}>
          <div>
            <div style={{ fontSize:15, fontWeight:"bold", color:"#1e3a5f" }}>Teachers</div>
            <div style={{ fontSize:11, color:"#8a9aaa" }}>
              {visibleTeachers.length} teacher{visibleTeachers.length !== 1 ? "s" : ""}
              {search ? ` matching "${search}"` : ` (${teachers.length} total)`}
            </div>
          </div>
          <div className="fla" style={{ gap:7, flexWrap:"wrap", alignItems:"center" }}>
            <input className="field-input"
              style={{ width:180, fontSize:11, padding:"4px 9px" }}
              placeholder="Search name, title, course…"
              value={search}
              onChange={e => setSearch(e.target.value)} />
            <div style={{ display:"flex", border:"1px solid #c0d0e0", borderRadius:5, overflow:"hidden" }}>
              {[["cards","⊞ Cards"],["list","≡ List"]].map(([m, label], i) => (
                <button key={m} onClick={() => setViewMode(m)}
                  style={{ padding:"4px 11px", fontSize:11, border:"none", cursor:"pointer",
                    borderLeft: i > 0 ? "1px solid #c0d0e0" : "none",
                    background: viewMode === m ? "#1e3a5f" : "white",
                    color:      viewMode === m ? "white"   : "#6b7280" }}>
                  {label}
                </button>
              ))}
            </div>
            <button className="btn btn-secondary" style={{ fontSize:11 }} onClick={exportTeachers}>⬇ Export</button>
            <label className="btn btn-secondary" style={{ fontSize:11, cursor:"pointer" }}>
              ⬆ Import
              <input type="file" accept=".xlsx,.xls" onChange={importTeachers} style={{ display:"none" }} />
            </label>
            <button className="btn btn-primary" style={{ fontSize:11 }} onClick={openNew}>+ Add Teacher</button>
          </div>
        </div>

        {importMsg && (
          <div style={{ marginBottom:12, fontSize:11, padding:"5px 10px", borderRadius:4,
            background: importMsg.startsWith("✓") ? "#f0fdf4" : importMsg === "Importing…" ? "#f0f7ff" : "#fff5f5",
            color:      importMsg.startsWith("✓") ? "#15803d" : importMsg === "Importing…" ? "#1e3a5f" : "#b91c1c",
            border: `1px solid ${importMsg.startsWith("✓") ? "#bbf7d0" : importMsg === "Importing…" ? "#bfdbfe" : "#fecaca"}` }}>
          {importMsg}
          {importMsg !== "Importing…" &&
            <button style={{ background:"none", border:"none", cursor:"pointer", marginLeft:8, fontSize:11 }} onClick={() => setImportMsg("")}>✕</button>}
          </div>
        )}

        {loading
          ? <div style={{ textAlign:"center", color:"#8a9aaa", fontSize:12, paddingTop:48 }}>Loading teachers…</div>
          : visibleTeachers.length === 0
          ? <div style={{ textAlign:"center", color:"#8a9aaa", fontSize:13, paddingTop:48 }}>
              {search ? `No teachers match "${search}".` : "No teachers yet."}
              {!search && <div style={{ marginTop:12 }}><button className="btn btn-primary" onClick={openNew}>+ Add First Teacher</button></div>}
            </div>

          : viewMode === "list"
          /* ── LIST VIEW ─────────────────────────────────────────── */
          ? (
            <div style={{ background:"white", borderRadius:8, border:"1px solid #e0e8f0", overflow:"hidden" }}>
              <table style={{ width:"100%", borderCollapse:"collapse", fontSize:11 }}>
                <thead>
                  <tr style={{ background:"#f0f4f8", borderBottom:"2px solid #c8d4e0" }}>
                    <th style={thStyle}>ID</th>
                    <th style={{ ...thStyle, minWidth:160 }}>Name</th>
                    <th style={thStyle}>Title</th>
                    <th style={thStyle}>Assigned Courses</th>
                    <th style={thStyle}>Blocks</th>
                    <th style={{ ...thStyle, width:64 }}>Active</th>
                    <th style={{ ...thStyle, width:32 }}></th>
                  </tr>
                </thead>
                <tbody>
                  {visibleTeachers.map((t, i) => (
                    <tr key={t._id} style={{
                      background: selId===t._id ? "#eef3ff" : i%2===0 ? "white" : "#fafcff",
                      opacity: t.active ? 1 : 0.52,
                      borderBottom:"1px solid #eef2f6" }}>
                      <td style={{ ...tdStyle, fontFamily:"monospace", fontWeight:"bold", color:"#4a90d9", cursor:"pointer", whiteSpace:"nowrap" }}
                        onClick={() => openEdit(t)}>
                        {t.teacherId}
                      </td>
                      <td style={{ ...tdStyle, minWidth:160, fontWeight:"bold", color:"#1e2a3a", cursor:"pointer" }}
                        onClick={() => openEdit(t)}>
                        {t.name}
                      </td>
                      <td style={{ ...tdStyle, color:"#6b7280" }}>{t.title||"—"}</td>
                      <td style={tdStyle}>
                        <div className="fl" style={{ gap:3, flexWrap:"wrap" }}>
                          {(t.assignedCourses||t.qualifiedCourses||[]).slice(0,6).map(code => (
                            <span key={code} className="badge"
                              style={{ background:"#f0f4f8", color:"#5a7a9a", fontFamily:"monospace", padding:"1px 5px" }}>
                              {code}
                            </span>
                          ))}
                          {(t.assignedCourses||t.qualifiedCourses||[]).length > 6 &&
                            <span style={{ fontSize:9, color:"#8a9aaa" }}>+{(t.assignedCourses||t.qualifiedCourses||[]).length-6}</span>}
                        </div>
                      </td>
                      <td style={{ ...tdStyle, color:"#5a7a9a", whiteSpace:"nowrap" }}>
                        {(t.blocksAvailable||[]).join(", ")}
                      </td>
                      <td style={{ ...tdStyle, textAlign:"center" }}>
                        <button onClick={() => toggleActive(t)}
                          style={{ fontSize:10, padding:"1px 7px", borderRadius:3, cursor:"pointer", border:"1px solid",
                            background:   t.active ? "#d1fae5" : "#f3f4f6",
                            color:        t.active ? "#065f46" : "#6b7280",
                            borderColor:  t.active ? "#a7f3d0" : "#d1d5db" }}>
                          {t.active ? "On" : "Off"}
                        </button>
                      </td>
                      <td style={{ ...tdStyle, textAlign:"center" }}>
                        <button onClick={() => openEdit(t)} title="Edit"
                          style={{ background:"none", border:"none", cursor:"pointer", fontSize:14,
                            color: selId===t._id ? "#4a90d9" : "#c0ccd8", padding:"0 2px" }}>
                          ✎
                        </button>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )

          /* ── CARDS VIEW ─────────────────────────────────────────── */
          : (
            <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(240px,1fr))", gap:10 }}>
              {visibleTeachers.map(t => (
                <div key={t._id} className="card" onClick={() => openEdit(t)}
                  style={{ cursor:"pointer",
                    borderLeft: `4px solid ${t.active ? "#4a90d9" : "#d0d0d0"}`,
                    outline: selId===t._id ? "2px solid #4a90d9" : "none",
                    opacity: t.active ? 1 : 0.58,
                    background: t.active ? "white" : "#fafafa" }}>
                  <div className="flb">
                    <div style={{ flex:1, minWidth:0 }}>
                      <div style={{ fontSize:12, fontWeight:"bold", color:"#1e2a3a", lineHeight:1.3 }}>{t.name}</div>
                      {t.title && <div style={{ fontSize:10, color:"#8a9aaa", marginTop:1 }}>{t.title}</div>}
                    </div>
                    <button onClick={e => { e.stopPropagation(); toggleActive(t); }}
                      className="badge" style={{ cursor:"pointer", border:"none", flexShrink:0, marginLeft:6,
                        background: t.active ? "#d1fae5" : "#f0f0f0",
                        color:      t.active ? "#065f46" : "#888" }}>
                      {t.active ? "Active" : "Off"}
                    </button>
                  </div>
                  <div className="fl" style={{ gap:4, marginTop:8, flexWrap:"wrap" }}>
                    {(t.blocksAvailable||[]).map(b => (
                      <span key={b} className="badge" style={{ background:"#e0f2fe", color:"#0369a1" }}>{b} days</span>
                    ))}
                    <span className="badge" style={{ background:"#f0f4f8", color:"#5a7a9a" }}>
                      {(t.assignedCourses||t.qualifiedCourses||[]).length} course{(t.assignedCourses||t.qualifiedCourses||[]).length!==1?"s":""}
                    </span>
                  </div>
                  {(t.assignedCourses||t.qualifiedCourses||[]).length > 0 && (
                    <div className="fl" style={{ gap:4, marginTop:5, flexWrap:"wrap" }}>
                      {(t.assignedCourses||t.qualifiedCourses||[]).slice(0,8).map(code => (
                        <span key={code} className="badge"
                          style={{ background:"#f0f4f8", color:"#5a7a9a", fontFamily:"monospace" }}>
                          {code}
                        </span>
                      ))}
                      {(t.assignedCourses||t.qualifiedCourses||[]).length > 8 && (
                        <span style={{ fontSize:9, color:"#8a9aaa" }}>+{(t.assignedCourses||t.qualifiedCourses||[]).length-8}</span>
                      )}
                    </div>
                  )}
                </div>
              ))}
            </div>
          )
        }
      </div>

      {/* RIGHT: Edit panel — slides in when a teacher is selected */}
      {selId && (
        <div style={{ width:360, borderLeft:"1px solid #e0e8f0", background:"white",
          overflowY:"auto", padding:20, flexShrink:0 }}>
          <div style={{ maxWidth:"100%" }}>
            <div className="flb" style={{ marginBottom:18 }}>
              <div style={{ fontSize:15, fontWeight:"bold", color:"#1e3a5f" }}>
                {selId === "new" ? "New Teacher" : form.name}
              </div>
              <button className="btn btn-secondary" onClick={() => setSelId(null)}>Cancel</button>
            </div>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
                <div>
                  <label className="field-label">Teacher ID *</label>
                  <input className="field-input" value={form.teacherId}
                    onChange={e => fld("teacherId", e.target.value)}
                    placeholder="e.g. jane.doe" disabled={selId !== "new"} />
                </div>
                <div>
                  <label className="field-label">Full Name *</label>
                  <input className="field-input" value={form.name}
                    onChange={e => fld("name", e.target.value)} placeholder="Jane Doe" />
                </div>
                <div>
                  <label className="field-label">Title</label>
                  <input className="field-input" value={form.title||""}
                    onChange={e => fld("title", e.target.value)} placeholder="English 7 Teacher" />
                </div>
                <div>
                  <label className="field-label">Email</label>
                  <input className="field-input" type="email" value={form.email||""}
                    onChange={e => fld("email", e.target.value)} />
                </div>
                <div style={{ gridColumn:"1 / -1" }}>
                  <label className="field-label" style={{ marginBottom:6 }}>Max Sections per Block</label>
                  {(() => {
                    const blockKeys = Object.keys(schoolConfig?.blocks || { A:1, B:1 }).sort();
                    return (
                      <div className="fl" style={{ gap:10 }}>
                        {blockKeys.map(blk => (
                          <div key={blk} style={{ flex:1, minWidth:80 }}>
                            <label className="field-label" style={{ fontSize:9, marginBottom:3 }}>{blk} days</label>
                            <input className="field-input" type="number" min={0} max={12} step={0.5}
                              value={(form.maxSectionsPerBlock||{})[blk] ?? 5}
                              onChange={e => fld("maxSectionsPerBlock", {
                                ...(form.maxSectionsPerBlock||{}),
                                [blk]: parseFloat(e.target.value) || 0
                              })} />
                          </div>
                        ))}
                      </div>
                    );
                  })()}
                </div>
                <div style={{ gridColumn:"1 / -1" }}>
                  <label className="field-label" style={{ marginBottom:6 }}>Lunch Assignment</label>
                  {(() => {
                    const blockKeys = Object.keys(schoolConfig?.blocks || { A:1, B:1 }).sort();
                    return (
                      <div className="fl" style={{ gap:10 }}>
                        {blockKeys.map(blk => (
                          <div key={blk} style={{ flex:1, minWidth:80 }}>
                            <label className="field-label" style={{ fontSize:9, marginBottom:3 }}>{blk} days</label>
                            <select className="field-input"
                              value={(form.lunchAssignment||{})[blk] ?? 1}
                              onChange={e => fld("lunchAssignment", {
                                ...(form.lunchAssignment||{}),
                                [blk]: parseInt(e.target.value)
                              })}>
                              <option value={1}>Lunch 1</option>
                              <option value={2}>Lunch 2</option>
                            </select>
                          </div>
                        ))}
                      </div>
                    );
                  })()}
                </div>
              </div>

              <div style={{ marginTop:14 }}>
                <label className="field-label">Unavailable Periods (e.g. A1, B5)</label>
                <input className="field-input"
                  value={(form.unavailable||[]).join(",")}
                  onChange={e => fld("unavailable", e.target.value.split(",").map(s=>s.trim().toUpperCase()).filter(Boolean))}
                  placeholder="A5,A6,B5,B6" />
              </div>

              <div style={{ marginTop:14 }}>
                <label className="field-label" style={{ marginBottom:8 }}>Assigned Courses</label>

                {/* Selected chips */}
                {(form.assignedCourses||[]).length > 0 && (
                  <div className="fl" style={{ flexWrap:"wrap", gap:4, marginBottom:8 }}>
                    {(form.assignedCourses||[]).map(code => {
                      const c = courses.find(x => x.code === code);
                      return (
                        <span key={code} style={{ display:"flex", alignItems:"center", gap:3,
                          background:"#e8f0fe", border:"1px solid #4a90d9", borderRadius:4,
                          padding:"2px 7px", fontSize:11 }}>
                          <span style={{ fontFamily:"monospace", fontWeight:"bold", color:"#1e5fa0", fontSize:10 }}>{code}</span>
                          {c && <span style={{ color:"#8a9aaa", fontSize:10 }}> {c.name}</span>}
                          <button onClick={() => toggleArr("assignedCourses", code)}
                            style={{ background:"none", border:"none", cursor:"pointer",
                              color:"#4a90d9", fontSize:14, padding:"0 0 0 2px", lineHeight:1 }}>×</button>
                        </span>
                      );
                    })}
                  </div>
                )}

                {courses.length === 0
                  ? <div style={{ fontSize:11, color:"#8a9aaa", fontStyle:"italic" }}>
                      No active courses found — add courses in the Courses tab first.
                    </div>
                  : <>
                      <input className="field-input" placeholder="Search courses to add…"
                        value={courseSearch} onChange={e => setCourseSearch(e.target.value)}
                        style={{ marginBottom:6 }} />
                      {(() => {
                        const q = courseSearch.toLowerCase();
                        const all = courses.slice().sort((a,b)=>a.code.localeCompare(b.code));
                        const filtered = q
                          ? all.filter(c => c.code.toLowerCase().includes(q) || c.name.toLowerCase().includes(q))
                          : all;
                        const assigned   = filtered.filter(c =>  (form.assignedCourses||[]).includes(c.code));
                        const unassigned = filtered.filter(c => !(form.assignedCourses||[]).includes(c.code));
                        const show = [...assigned, ...unassigned];
                        if (!show.length) return <div style={{ fontSize:11, color:"#8a9aaa", fontStyle:"italic" }}>No matching courses.</div>;
                        return (
                          <div style={{ maxHeight:220, overflowY:"auto", border:"1px solid #e0e8f0", borderRadius:6 }}>
                            {show.map((c, i) => {
                              const checked = (form.assignedCourses||[]).includes(c.code);
                              return (
                                <label key={c.code} style={{ display:"flex", alignItems:"center", gap:8,
                                  padding:"6px 10px", cursor:"pointer", fontSize:11,
                                  background: checked ? "#f0f7ff" : i%2===0 ? "white" : "#fafcff",
                                  borderBottom: i < show.length-1 ? "1px solid #f0f4f8" : "none" }}>
                                  <input type="checkbox" checked={checked}
                                    onChange={() => toggleArr("assignedCourses", c.code)}
                                    style={{ margin:0, width:13, height:13, flexShrink:0 }} />
                                  <span style={{ fontFamily:"monospace", fontWeight:"bold", fontSize:10,
                                    color: checked ? "#1e5fa0" : "#5a7a9a", minWidth:65 }}>{c.code}</span>
                                  <span style={{ color:"#6b7280", flex:1 }}>{c.name}</span>
                                  <span style={{ fontSize:9, color:"#b0bec8", whiteSpace:"nowrap" }}>
                                    {TOP_CAT_LABELS[c.topCategory] || c.topCategory}
                                  </span>
                                </label>
                              );
                            })}
                          </div>
                        );
                      })()}
                    </>
                }
              </div>

              <div style={{ marginTop:14 }}>
                <label className="toggle">
                  <input type="checkbox" checked={!!form.active} onChange={e => fld("active", e.target.checked)} />
                  Active
                </label>
              </div>

              <div className="fl" style={{ gap:8, marginTop:20 }}>
                <button className="btn btn-primary" onClick={saveTeacher} disabled={saving}>
                  {saving ? "Saving…" : "Save Teacher"}
                </button>
                <button className="btn btn-secondary" onClick={() => setSelId(null)}>Cancel</button>
              </div>
            </div>
        }
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// SCHEDULER (Schedule Validation) — existing logic, versions panel added
// ══════════════════════════════════════════════════════════════════════════════
function Scheduler({ schoolId }) {
  const [schedule,       setSchedule]       = useState(null);
  const [loadError,      setLoadError]      = useState(null);
  const [grade,          setGrade]          = useState(7);
  const [germanDLI,      setGermanDLI]      = useState(false);
  const [studentName,    setStudentName]    = useState("");
  const [s1Ids,          setS1Ids]          = useState(new Set());
  const [s2Ids,          setS2Ids]          = useState(new Set());
  const [s2Touched,      setS2Touched]      = useState(false);
  const [activeSemester, setActiveSemester] = useState(1);
  const [filterCat,      setFilterCat]      = useState("All");
  const [hoveredId,      setHoveredId]      = useState(null);
  const [showVersions,   setShowVersions]   = useState(false);

  const handleFile = useCallback((e) => {
    const file = e.target.files?.[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = (evt) => {
      try {
        const wb = XLSX.read(evt.target.result, { type:"array" });
        const parsed = parseScheduleFromWorkbook(wb);
        if (!parsed.length) { setLoadError("No class data found."); return; }
        setSchedule(parsed); setLoadError(null);
        setS1Ids(new Set()); setS2Ids(new Set()); setS2Touched(false);
      } catch(err) { setLoadError("Could not parse file: " + err.message); }
    };
    reader.readAsArrayBuffer(file);
  }, []);

  function loadVersion(classes) {
    setSchedule(classes); setLoadError(null);
    setS1Ids(new Set()); setS2Ids(new Set()); setS2Touched(false);
  }

  const requirements = useMemo(() => getRequirements(grade, germanDLI), [grade, germanDLI]);

  const annotated = useMemo(() => {
    if (!schedule) return [];
    return schedule.map(cls => ({ ...cls, classType: getClassType(cls, germanDLI) }));
  }, [schedule, germanDLI]);

  const byId = useMemo(() => {
    const map = {};
    for (const cls of annotated) map[cls.id] = cls;
    return map;
  }, [annotated]);

  // ── S2 PRE-SELECTION ────────────────────────────────────────────────────────
  const s2PreselectedIds = useMemo(() => {
    const ids = new Set();
    for (const id of s1Ids) {
      const cls = byId[id]; if (!cls) continue;
      if (isFullYear(cls.classType)) {
        ids.add(id);
        if (locksAB(cls.classType)) {
          const pair = annotated.find(c => c.period === getPairedPeriod(cls.period) && c.name === cls.name);
          if (pair) ids.add(pair.id);
        }
      }
    }
    return ids;
  }, [s1Ids, byId, annotated]);

  const effectiveS2Ids = useMemo(() => {
    if (s2Touched) return s2Ids;
    const merged = new Set([...s2Ids]);
    for (const id of s2PreselectedIds) merged.add(id);
    return merged;
  }, [s2Ids, s2PreselectedIds, s2Touched]);

  const activeIds     = activeSemester === 1 ? s1Ids : effectiveS2Ids;
  const setActiveIds  = activeSemester === 1 ? setS1Ids : setS2Ids;

  const activeLockedPeriods = useMemo(() => {
    const locked = new Set();
    for (const id of activeIds) {
      const cls = byId[id]; if (!cls) continue;
      locked.add(cls.period);
      if (locksAB(cls.classType)) locked.add(getPairedPeriod(cls.period));
    }
    return locked;
  }, [activeIds, byId]);

  const takenFamilies = useMemo(() => {
    const fams = new Set();
    for (const id of activeIds) {
      const cls = byId[id]; if (!cls) continue;
      fams.add(getNameFamily(cls.name));
    }
    return fams;
  }, [activeIds, byId]);

  const activeFilledCoreCategories = useMemo(() => {
    const cats = new Set();
    for (const id of activeIds) {
      const cls = byId[id]; if (!cls) continue;
      if (locksAB(cls.classType)) cats.add(cls.category);
    }
    return cats;
  }, [activeIds, byId]);

  function findCorePair(cls) {
    if (!locksAB(cls.classType)) return null;
    const pairedPeriod = getPairedPeriod(cls.period);
    return annotated.find(c => c.period === pairedPeriod && c.category === cls.category) || null;
  }

  function isVisible(cls) {
    if (filterCat !== "All" && cls.category !== filterCat) return false;
    const seats = cls[grade===7?"gr7":"gr8"];
    return seats > 0;
  }

  function getStatus(cls) {
    const seats = cls[grade===7?"gr7":"gr8"];
    if (seats === 0) return "grade-na";
    const otherIds = activeSemester === 1 ? effectiveS2Ids : s1Ids;
    if (otherIds.has(cls.id)) return "other-sem";
    if (activeIds.has(cls.id)) return activeSemester===2 && s2PreselectedIds.has(cls.id) && !s2Touched ? "preselected" : "selected";
    if (activeSemester===2 && !s2Touched && s2PreselectedIds.has(cls.id)) return "preselected";
    if (activeLockedPeriods.has(cls.period)) {
      const occupantId = [...activeIds].find(id => {
        const c = byId[id]; if (!c) return false;
        if (c.period === cls.period) return true;
        if (locksAB(c.classType) && getPairedPeriod(c.period) === cls.period) return true;
        return false;
      });
      if (occupantId !== undefined) return "blocked";
    }
    if (locksAB(cls.classType) && activeFilledCoreCategories.has(cls.category)) return "category-taken";
    const family = getNameFamily(cls.name);
    const n = getPeriodNumber(cls.period);
    if (takenFamilies.has(family)) {
      const occupant = [...activeIds].map(id=>byId[id]).filter(Boolean).find(c => getNameFamily(c.name)===family);
      if (occupant && getPeriodNumber(occupant.period) !== n) return "family-taken";
    }
    return "available";
  }

  function toggleClass(cls) {
    const status = getStatus(cls);
    if (status === "blocked" || status === "category-taken" || status === "grade-na" || status === "other-sem") return;

    if (activeSemester === 2 && !s2Touched) {
      setS2Touched(true);
      const initialized = new Set(s2PreselectedIds);
      const pair = findCorePair(cls);
      if (status === "preselected") {
        initialized.delete(cls.id);
        if (pair) initialized.delete(pair.id);
        setS2Ids(initialized); return;
      }
      if (status === "family-taken") return;
      initialized.add(cls.id);
      if (pair) {
        const fam = getNameFamily(cls.name);
        const n = getPeriodNumber(pair.period);
        const pairBlocked = [...initialized].some(id => {
          const c = byId[id]; if (!c) return false;
          return c.period === pair.period || (locksAB(c.classType) && getPairedPeriod(c.period)===pair.period);
        });
        if (!pairBlocked) initialized.add(pair.id);
      }
      setS2Ids(initialized); return;
    }

    const next = new Set(activeIds);
    const pair = findCorePair(cls);
    if (next.has(cls.id)) {
      next.delete(cls.id);
      if (pair) next.delete(pair.id);
    } else {
      if (status === "family-taken") return;
      next.add(cls.id);
      if (pair) {
        const fam = getNameFamily(cls.name);
        const n = getPeriodNumber(pair.period);
        const pairBlocked = [...next].some(id => {
          const c = byId[id]; if (!c) return false;
          return c.period === pair.period || (locksAB(c.classType) && getPairedPeriod(c.period)===pair.period);
        });
        if (!pairBlocked) next.add(pair.id);
      }
    }
    setActiveIds(next);
  }

  function changeGrade(g) {
    setGrade(g); setS1Ids(new Set()); setS2Ids(new Set()); setS2Touched(false);
  }

  const reqResults    = useMemo(() => evalRequirements(requirements, s1Ids, effectiveS2Ids, byId, germanDLI), [requirements, s1Ids, effectiveS2Ids, byId, germanDLI]);
  const s1Classes     = [...s1Ids].map(id => byId[id]).filter(Boolean);
  const s2Classes     = [...effectiveS2Ids].map(id => byId[id]).filter(Boolean);
  const s2Needs       = useMemo(() => requirements.filter(r => {
    if (r.type !== "req-sem" && r.type !== "req-year") return false;
    const inS2 = s2Classes.some(c => r.matchFn ? r.matchFn(c.name) : c.category === r.category);
    return !inS2;
  }).map(r => r.label), [requirements, s2Classes]);
  const stillAvailable = annotated.filter(c => isVisible(c) && getStatus(c) === "available");
  const metCount  = reqResults.filter(r => r.status === "met").length;
  const totalReqs = reqResults.length;

  const categories = useMemo(() => {
    if (!annotated.length) return ["All"];
    const cats = [...new Set(annotated.map(c=>c.category))].sort();
    return ["All", ...cats];
  }, [annotated]);

  const grouped = useMemo(() => {
    const g = {};
    for (const cls of annotated) {
      if (!isVisible(cls)) continue;
      if (!g[cls.category]) g[cls.category] = {};
      g[cls.category][cls.period] = cls;
    }
    return g;
  }, [annotated, filterCat, grade]);

  function typeBadge(cls) {
    const t = cls.classType;
    if (t === "core")          return { label:"Core · A+B",          color:"#2563eb" };
    if (t === "req-year")      return { label:"Required · full year", color:"#7c3aed" };
    if (t === "req-sem")       return { label:"Required · 1 sem",    color:"#d97706" };
    if (t === "elective-year") return { label:"Elective · full year", color:"#0891b2" };
    return                            { label:"Elective · 1 sem",    color:"#6b7280" };
  }

  // ── RENDER ─────────────────────────────────────────────────────────────────
  return (
    <div style={{ fontFamily:"'Palatino Linotype',Palatino,'Book Antiqua',serif", minHeight:"calc(100vh - 48px)", background:"#f4f6f9", color:"#1e2a3a" }}>

      {/* TOP BAR */}
      <div style={{ background:"#fff", borderBottom:"1px solid #dde3ec", padding:"11px 24px",
        display:"flex", alignItems:"center", gap:14, flexWrap:"wrap",
        boxShadow:"0 1px 4px rgba(0,0,0,0.05)" }}>

        <div>
          <div style={{ fontSize:14, fontWeight:"bold", color:"#1e3a5f" }}>Validate Schedule</div>
          <div style={{ fontSize:10, color:"#8a9aaa" }}>Lincoln Middle School</div>
        </div>
        <div style={{ flex:1 }} />

        <label style={{ cursor:"pointer", padding:"5px 12px", borderRadius:6,
          border:"1px dashed #4a90d9", background:"#f0f7ff", fontSize:11, color:"#1e5fa0",
          display:"flex", alignItems:"center", gap:6 }}>
          📂 {schedule ? "Reload Schedule" : "Load Schedule (.xlsx)"}
          <input type="file" accept=".xlsx,.xls" onChange={handleFile} style={{ display:"none" }} />
        </label>

        <button onClick={() => setShowVersions(v => !v)}
          style={{ padding:"5px 12px", borderRadius:6, fontSize:11, fontWeight:600,
            border: showVersions ? "1.5px solid #4a90d9" : "1px solid #c0d0e0",
            background: showVersions ? "#f0f7ff" : "white",
            color: showVersions ? "#1e5fa0" : "#5a7a9a", cursor:"pointer" }}>
          📁 History
        </button>

        {schedule && <>
          <div style={{ display:"flex", borderRadius:6, overflow:"hidden", border:"1px solid #c0d0e0" }}>
            {[7,8].map(g => (
              <button key={g} onClick={() => changeGrade(g)}
                style={{ padding:"5px 16px", background:grade===g?"#1e3a5f":"#f8fafc",
                  color:grade===g?"white":"#5a7a9a", border:"none", cursor:"pointer",
                  fontWeight:"bold", fontSize:12 }}>
                Grade {g}
              </button>
            ))}
          </div>

          <div style={{ display:"flex", borderRadius:6, overflow:"hidden", border:"2px solid #4a90d9" }}>
            {[1,2].map(s => (
              <button key={s} onClick={() => setActiveSemester(s)}
                style={{ padding:"5px 18px",
                  background:activeSemester===s?"#4a90d9":"#f0f7ff",
                  color:activeSemester===s?"white":"#1e5fa0",
                  border:"none", cursor:"pointer", fontSize:12, fontWeight:"bold" }}>
                Semester {s}
              </button>
            ))}
          </div>

          <label style={{ display:"flex", alignItems:"center", gap:5, fontSize:11, color:"#5a7a9a", cursor:"pointer" }}>
            <input type="checkbox" checked={germanDLI}
              onChange={e => { setGermanDLI(e.target.checked); setS1Ids(new Set()); setS2Ids(new Set()); setS2Touched(false); }}
              style={{ accentColor:"#dc2626" }} />
            German DLI
          </label>

          <input placeholder="Student name" value={studentName}
            onChange={e => setStudentName(e.target.value)}
            style={{ padding:"5px 10px", borderRadius:6, border:"1px solid #c0d0e0",
              background:"#f8fafc", color:"#1e2a3a", fontSize:12, width:160 }} />
        </>}
      </div>

      {loadError && (
        <div style={{ background:"#fff0f0", color:"#b91c1c", padding:"8px 24px", fontSize:12, borderBottom:"1px solid #fecaca" }}>
          ⚠ {loadError}
        </div>
      )}

      {/* S2 banner */}
      {schedule && activeSemester === 2 && (
        <div style={{ background:"#fffbeb", borderBottom:"1px solid #fde68a", padding:"7px 24px",
          fontSize:11, color:"#92400e", display:"flex", gap:16, alignItems:"center", flexWrap:"wrap" }}>
          <span>↩ <strong>Full-year classes from S1</strong> are pre-selected here. You can freely change, drop, or replace any of them.</span>
          {s2Needs.length > 0 && <span style={{ color:"#dc2626" }}>· Still needed in S2: <strong>{s2Needs.join(", ")}</strong></span>}
          {s2Needs.length === 0 && s1Classes.length > 0 && <span style={{ color:"#16a34a" }}>· All semester requirements covered ✓</span>}
        </div>
      )}

      {!schedule && !loadError && (
        <div style={{ display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", height:"70vh", gap:18 }}>
          <div style={{ fontSize:44 }}>📅</div>
          <div style={{ fontSize:20, color:"#1e3a5f" }}>Load a master schedule to begin</div>
          <div style={{ fontSize:12, color:"#8a9aaa", maxWidth:400, textAlign:"center" }}>
            Upload your Excel file, or load a saved version from History.
          </div>
          <label style={{ cursor:"pointer", padding:"10px 24px", borderRadius:8,
            border:"2px solid #4a90d9", background:"#f0f7ff", fontSize:13, color:"#1e5fa0" }}>
            📂 Choose Excel File
            <input type="file" accept=".xlsx,.xls" onChange={handleFile} style={{ display:"none" }} />
          </label>
        </div>
      )}

      {schedule && (
        <div style={{ display:"grid", gridTemplateColumns:"1fr 290px", minHeight:"calc(100vh - 100px)" }}>

          {/* LEFT */}
          <div style={{ padding:"14px 14px 14px 22px", overflowX:"auto", overflowY:"auto" }}>

            {/* Filter pills */}
            <div style={{ display:"flex", gap:5, flexWrap:"wrap", marginBottom:12 }}>
              {categories.map(cat => {
                const color  = catColor(cat);
                const active = filterCat === cat;
                return (
                  <button key={cat} onClick={() => setFilterCat(cat)}
                    style={{ padding:"2px 9px", borderRadius:20,
                      border: `1.5px solid ${active ? color : "#d0dae6"}`,
                      background: active ? color : "white",
                      color: active ? "white" : "#5a7a9a",
                      cursor:"pointer", fontSize:10, fontWeight:600 }}>
                    {cat}
                  </button>
                );
              })}
            </div>

            {/* Period headers */}
            <div style={{ display:"grid", gridTemplateColumns:"150px repeat(12, minmax(62px,1fr))", gap:2, marginBottom:4 }}>
              <div />
              {ALL_PERIODS.map(p => {
                const takenActive = activeLockedPeriods.has(p);
                const isA = p.endsWith("A");
                return (
                  <div key={p} style={{ textAlign:"center", padding:"4px 1px", borderRadius:3,
                    background: takenActive?"#fee2e2":isA?"#eff6ff":"#f0f9ff",
                    border:`1px solid ${takenActive?"#fca5a5":isA?"#bfdbfe":"#bae6fd"}`,
                    fontSize:10, fontWeight:"bold",
                    color: takenActive?"#dc2626":isA?"#1d4ed8":"#0369a1" }}>
                    <div>P{getPeriodNumber(p)}{isA?"A":"B"}</div>
                    {takenActive ? <div style={{ fontSize:8 }}>✗</div> : <div style={{ fontSize:8, opacity:0.4 }}>✓</div>}
                  </div>
                );
              })}
            </div>

            {/* Class rows */}
            {Object.entries(grouped).map(([cat, byPeriod]) => {
              const color    = catColor(cat);
              const isCoreRow   = CORE_CATEGORIES_7.includes(cat) || CORE_CATEGORIES_8.includes(cat);
              const isGermanRow = cat.toLowerCase().includes("german") && !cat.toLowerCase().includes("culture");
              return (
                <div key={cat} style={{ display:"grid", gridTemplateColumns:"150px repeat(12, minmax(62px,1fr))", gap:2, marginBottom:2, alignItems:"stretch" }}>
                  <div style={{ display:"flex", alignItems:"center", paddingRight:7, borderRight:`3px solid ${color}`, minHeight:54 }}>
                    <div>
                      <div style={{ fontSize:11, fontWeight:"bold", color, lineHeight:1.2 }}>{cat}</div>
                      {(isCoreRow || (isGermanRow && germanDLI)) &&
                        <span style={{ fontSize:8, background:color+"18", color, borderRadius:3, padding:"1px 4px", border:`1px solid ${color}33` }}>CORE · A+B</span>}
                      {cat==="German Culture" &&
                        <span style={{ fontSize:8, background:"#fef2f2", color:"#dc2626", borderRadius:3, padding:"1px 4px", border:"1px solid #fecaca" }}>DLI · 1 sem</span>}
                    </div>
                  </div>

                  {ALL_PERIODS.map(period => {
                    const cls = byPeriod[period];
                    if (!cls) return <div key={period} style={{ minHeight:54, borderRadius:3, background:"#f0f2f5", border:"1px solid #e4e8ed" }} />;

                    const status       = getStatus(cls);
                    const seats        = cls[grade===7?"gr7":"gr8"];
                    const isHov        = hoveredId === cls.id;
                    const otherSemLabel = activeSemester===1?"S2":"S1";
                    const pair         = findCorePair(cls);
                    const pairSelected    = pair && activeIds.has(pair.id);
                    const pairPreselected = pair && !s2Touched && s2PreselectedIds.has(pair.id);
                    const isLinked     = (status==="selected"||status==="preselected") && (pairSelected||pairPreselected);
                    const isCore       = locksAB(cls.classType);

                    const s = {
                      available:        { bg:"white",     border:`1.5px solid ${color}`,     text:color,       cursor:"pointer"     },
                      selected:         { bg:color,       border:`1.5px solid ${color}`,     text:"white",     cursor:"pointer"     },
                      preselected:      { bg:color+"55",  border:`2px dashed ${color}`,      text:"white",     cursor:"pointer"     },
                      "other-sem":      { bg:color+"1a",  border:`1.5px solid ${color}55`,   text:color+"99",  cursor:"default"     },
                      blocked:          { bg:"#f5f5f5",   border:"1.5px solid #e0e0e0",      text:"#bbb",      cursor:"not-allowed" },
                      "category-taken": { bg:"#fafafa",   border:"1.5px dashed #d8d8d8",     text:"#ccc",      cursor:"not-allowed" },
                      "family-taken":   { bg:"#fafafa",   border:"1.5px dashed #fbbf24",     text:"#d97706",   cursor:"not-allowed" },
                      "grade-na":       { bg:"#f8f8f8",   border:"1px solid #ebebeb",        text:"#ddd",      cursor:"default"     },
                    }[status] || { bg:"#f8f8f8", border:"1px solid #eee", text:"#ddd", cursor:"default" };

                    return (
                      <div key={period}
                        onClick={() => toggleClass(cls)}
                        onMouseEnter={() => setHoveredId(cls.id)}
                        onMouseLeave={() => setHoveredId(null)}
                        title={
                          status==="blocked"         ? `Period ${period} is taken` :
                          status==="other-sem"       ? `Assigned in ${otherSemLabel}` :
                          status==="preselected"     ? `Pre-selected from S1 — click to remove or replace` :
                          status==="grade-na"        ? `Not offered for grade ${grade}` :
                          status==="category-taken"  ? "This core subject already assigned this semester" :
                          status==="family-taken"    ? `Already taking a ${getNameFamily(cls.name)} class` :
                          isCore                     ? `${cls.name} — click to select both A & B days` :
                          `${cls.name} · ${seats} seats`
                        }
                        style={{
                          minHeight:54, borderRadius:3, background:s.bg, border:s.border,
                          display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center",
                          cursor:s.cursor, padding:"3px 2px", textAlign:"center", transition:"all 0.1s",
                          transform: isHov && status==="available" ? "scale(1.04)" : "scale(1)",
                          boxShadow: isHov && status==="available" ? `0 2px 8px ${color}44` : "none",
                          outline: isLinked ? "2px solid white" : "none",
                          outlineOffset: isLinked ? "-3px" : "0",
                        }}>
                        <div style={{ fontSize:9, fontWeight:"bold", color:s.text, lineHeight:1.2 }}>{cls.name}</div>
