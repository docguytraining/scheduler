// ── Hash routing ───────────────────────────────────────────────────────────────
// Keeps window.location.hash in sync with app navigation so pages are
// bookmarkable and the browser back/forward buttons work.
// Hash format:  #<page>  or  #<page>/<sub>
// Examples:     #courses   #school/users   #student-types
function useHashRoute(defaultPage) {
  function parse() {
    const raw  = window.location.hash.replace(/^#/, "");
    const [p, s] = raw.split("/");
    return { page: p || defaultPage, sub: s || null };
  }
  const [route, setRoute] = useState(parse);
  useEffect(() => {
    function onHashChange() { setRoute(parse()); }
    window.addEventListener("hashchange", onHashChange);
    return () => window.removeEventListener("hashchange", onHashChange);
  }, []);
  function navigate(page, sub) {
    const hash = sub ? `${page}/${sub}` : page;
    window.location.hash = hash;
    setRoute({ page, sub: sub || null });
  }
  return [route, navigate];
}

// APP — top-level navigation
// ══════════════════════════════════════════════════════════════════════════════
function App() {
  const { schoolId, user, userDoc } = useAuth();
  const [route,        navigate]        = useHashRoute("validate");
  const page = route.page;
  const [schoolConfig,  setSchoolConfig]  = useState(null);
  const [showUserMenu,  setShowUserMenu]  = useState(false);
  const [addSchoolOpen, setAddSchoolOpen] = useState(false);

  // Switch to a school the user already has active access to
  async function switchSchool(targetId) {
    try {
      const targetRole = (userDoc?.schools || {})[targetId]?.role || "staff";
      await db.collection("users").doc(user.uid).update({
        schoolId:  targetId,
        role:      targetRole,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
      });
      setShowUserMenu(false);
      // AuthProvider onSnapshot fires → App re-renders with new schoolId
    } catch(e) { alert("Switch failed: " + e.message); }
  }

  useEffect(() => {
    if (!schoolId) return;
    fsGetDoc(schoolId, "config", "school").then(doc => {
      if (doc) { const { _id, ...rest } = doc; setSchoolConfig(rest); }
    }).catch(() => {});
  }, [schoolId]);

  const schoolName = schoolConfig?.name || "Course Scheduler";

  return (
    <div style={{ minHeight:"100vh" }}>
      <nav className="nav-bar">
        <div style={{ flexShrink:0 }}>
          <div className="nav-logo">{schoolName}</div>
        </div>
        <div style={{ display:"flex", gap:4, marginLeft:8, overflowX:"auto" }}>
          {[
            { id:"validate",      label:"📅 Validate Schedule"  },
            { id:"courses",       label:"📚 Courses"            },
            { id:"teachers",      label:"👩‍🏫 Teachers"           },
            { id:"student-types", label:"📋 Student Types"      },
            { id:"school",        label:"⚙ School"              },
            { id:"generate",      label:"🤖 Generate Schedule", soon:true },
          ].map(({ id, label, soon }) => (
            <button key={id}
              className={`nav-tab${page===id?" active":""}${soon?" soon":""}`}
              onClick={() => !soon && navigate(id)}
              title={soon ? "Coming soon — AI-assisted schedule generation" : undefined}>
              {label}{soon ? " ·· soon" : ""}
            </button>
          ))}
        </div>
        <div style={{ flex:1 }} />

        {/* User avatar / sign-out */}
        <div style={{ position:"relative", flexShrink:0 }}>
          <button onClick={() => setShowUserMenu(m => !m)}
            style={{ display:"flex", alignItems:"center", gap:7, background:"rgba(255,255,255,0.1)",
              border:"none", borderRadius:20, padding:"4px 10px 4px 4px",
              cursor:"pointer", color:"white" }}>
            {user?.photoURL
              ? <img src={user.photoURL} style={{ width:26, height:26, borderRadius:"50%" }} alt="" />
              : <div style={{ width:26, height:26, borderRadius:"50%", background:"rgba(255,255,255,0.25)",
                  display:"flex", alignItems:"center", justifyContent:"center", fontSize:12, fontWeight:"bold" }}>
                  {(user?.displayName || user?.email || "?")[0].toUpperCase()}
                </div>
            }
            <span style={{ fontSize:11, maxWidth:120, overflow:"hidden", textOverflow:"ellipsis",
              whiteSpace:"nowrap" }}>
              {user?.displayName || user?.email}
            </span>
          </button>
          {showUserMenu && (
            <div style={{ position:"absolute", right:0, top:"calc(100% + 6px)", background:"white",
              borderRadius:8, boxShadow:"0 4px 16px rgba(0,0,0,0.15)", border:"1px solid #e0e8f0",
              minWidth:220, zIndex:200 }}>

              {/* Identity */}
              <div style={{ padding:"10px 14px", borderBottom:"1px solid #f0f4f8" }}>
                <div style={{ fontSize:12, fontWeight:"bold", color:"#1e2a3a" }}>
                  {user?.displayName || user?.email}
                </div>
                <div style={{ fontSize:10, color:"#8a9aaa" }}>{user?.email}</div>
                <div style={{ fontSize:10, color:"#8a9aaa", marginTop:2 }}>
                  {userDoc?.role} · {schoolId}
                </div>
              </div>

              {/* School switcher — shows other active schools */}
              {(() => {
                const allSchools   = userDoc?.schools || {};
                const activeOthers = Object.entries(allSchools)
                  .filter(([id, s]) => id !== schoolId && s.status === "active");
                const pendingOthers = Object.entries(allSchools)
                  .filter(([id, s]) => s.status === "pending");
                if (activeOthers.length === 0 && pendingOthers.length === 0) return null;
                return (
                  <div style={{ borderBottom:"1px solid #f0f4f8" }}>
                    <div style={{ padding:"6px 14px 2px", fontSize:10, color:"#8a9aaa",
                      textTransform:"uppercase", letterSpacing:"0.06em" }}>
                      Your Schools
                    </div>
                    {/* Current school */}
                    <div style={{ padding:"5px 14px 5px 10px", display:"flex",
                      alignItems:"center", gap:8 }}>
                      <span style={{ fontSize:10, color:"#4a90d9" }}>✓</span>
                      <span style={{ fontSize:12, color:"#1e2a3a", fontWeight:"bold" }}>
                        {schoolId}
                      </span>
                      <span style={{ fontSize:10, color:"#8a9aaa", marginLeft:"auto" }}>current</span>
                    </div>
                    {/* Other active schools — click to switch */}
                    {activeOthers.map(([id]) => (
                      <button key={id} onClick={() => switchSchool(id)}
                        style={{ width:"100%", textAlign:"left", padding:"5px 14px 5px 22px",
                          border:"none", cursor:"pointer", fontSize:12, color:"#4a90d9",
                          background:"none", display:"block" }}>
                        Switch to {id}
                      </button>
                    ))}
                    {/* Pending requests — non-interactive */}
                    {pendingOthers.map(([id]) => (
                      <div key={id} style={{ padding:"5px 14px 5px 22px", fontSize:12,
                        color:"#8a9aaa", fontStyle:"italic" }}>
                        {id} — pending…
                      </div>
                    ))}
                  </div>
                );
              })()}

              {/* Request access to another school */}
              <button onClick={() => { setShowUserMenu(false); setAddSchoolOpen(true); }}
                style={{ width:"100%", textAlign:"left", padding:"9px 14px", border:"none",
                  cursor:"pointer", fontSize:12, color:"#4a6080", background:"none",
                  borderBottom:"1px solid #f0f4f8" }}>
                + Request access to another school
              </button>

              {/* Sign out */}
              <button onClick={() => { setShowUserMenu(false); auth.signOut(); }}
                style={{ width:"100%", textAlign:"left", padding:"9px 14px", border:"none",
                  cursor:"pointer", fontSize:12, color:"#b91c1c", background:"none" }}>
                Sign out
              </button>
            </div>
          )}
        </div>
      </nav>

      {page === "validate"      && <Scheduler      schoolId={schoolId} />}
      {page === "courses"       && <CourseSetup    schoolId={schoolId} />}
      {page === "teachers"      && <TeacherSetup   schoolId={schoolId} schoolConfig={schoolConfig} />}
      {page === "student-types" && <StudentTypesTab schoolId={schoolId} />}
      {page === "school"        && (
        <SchoolPage schoolId={schoolId} schoolConfig={schoolConfig}
          onConfigSaved={cfg => setSchoolConfig(cfg)}
          initialSub={route.sub || "config"}
          onSubChange={sub => navigate("school", sub)} />
      )}

      {/* "Add another school" overlay — full-screen SchoolPickerScreen in add mode */}
      {addSchoolOpen && (
        <div style={{ position:"fixed", inset:0, zIndex:500 }}>
          <SchoolPickerScreen
            user={user}
            mode="add"
            enrolledSchoolIds={Object.keys(userDoc?.schools || {})}
            onClose={() => setAddSchoolOpen(false)} />
        </div>
      )}
    </div>
  );
}

    <AuthGate />
  </AuthProvider>
);
  </script>
