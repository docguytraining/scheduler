# School Info

school:
  id: 00123 #uniqe value given by app
  name: Summit Academy Independence #name of school
  address: 123 Main St. Bluffdale, UT 84065 #address of school
  calendar-year-start: 2026 #year school starts calendar
  calendar-year-end: 2027 #year school ends calendar
  schedule-type: core-block #type of schedule school uses [traditional, block, core-block, hybrid]
  immersion: true #if school has immersion program
  immersion-languages:
  #  - Spanish
    - German
  grades: [7,8]
  blocks:
    - A: [1,2,3,4,5,6]
    - B: [1,2,3,4,5,6]
  semesters: [Fall, Spring]


requiremennt-groups:
  - core:
    - language-arts-7: [ENG7, ENG7F, ENG7H]
    - language-arts-8: [ENG8, ENG8F, ENG8H]
    - math-7: [MATH7, MATH7F, MATH7H]
    - math-8: [MATH8, MATH8F, MATH8H, MATHS1]
    - science-7: [SCI7, SCI7F, SCI7H]
    - science-8: [SCI8, SCI8F, SCI8H]
    - german-7: [GER1, GER2]
    - german-8: [GER2,GER3]
  - required-electives:
    - physical-education: [PE,FITNESS,YOGA,CARDIO]

student-types:
  - standard: # unique value given by app
    description: Students in this program take a standard schedule of classes, and can choose from all available electives. # description of student type, used for filtering 
    grade-requirements:
      - grade: 7
        required-classes: [CCA, HISTUT]
        required-groups: [language-arts-7, math-7, science-7, physical-education]
      - grade: 8
        required-classes: [DIGLIT, HISTUS, HEALTH]
        required-groups: [language-arts-8, math-8, science-8, physical-education]
  - german-immersion: # unique value given by app
    description: Students in this program take German immersion full year, and German Culture one semester.  # description of student type, used for filtering 
    immersion-language: German
    extends: standard # if this student type has the same requirements as another student type, you can use "extends" to reference that student type and only list the differences in requirements below
    grade-requirements:
      - grade: 7
        required-classes: [GERC]
        required-groups: [german-7]
      - grade: 8
        required-classes: [GERC]
        required-groups: [german-8]

